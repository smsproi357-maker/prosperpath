<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Module 1.1 — What Markets Actually Are | ProsperPath Market Mechanics">
    <title>What Markets Actually Are | ProsperPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --m-bg: #0d0e10;
            --m-surf: #141618;
            --m-surf2: #18191c;
            --m-bdr: #1e2023;
            --m-bdrhi: #2e3035;
            --m-txt: #e0e1e3;
            --m-muted: #5e626a;
            --m-muted2: #3a3d44;
            --m-gold: #a07c2e;
            --m-gold-dim: rgba(160, 124, 46, .13);
            --m-gold-line: rgba(160, 124, 46, .38);
            --m-green: rgba(120, 210, 160, .15);
            --m-green-txt: #7ed8a8;
            --m-red: rgba(220, 100, 80, .15);
            --m-red-txt: #e08070;
            --m-blue: rgba(100, 160, 255, .1);
            --m-blue-txt: #7eb3ff;
            --m-rad: 6px;
            --m-tr: 150ms ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--m-bg);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            min-height: 100vh
        }

        #ai-chat-fab,
        .ai-fab-btn,
        .floating-action-btn,
        [class*="fab"],
        [id*="fab"] {
            display: none !important
        }

        /* ── Shell ── */
        #module-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        /* Top Bar */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--m-bdr);
            background: var(--m-surf);
            flex-shrink: 0;
            gap: 1rem
        }

        #topbar-left {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        #back-btn {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-size: .78rem;
            padding: .38rem .85rem;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #back-btn:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        #back-btn:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        #topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            color: var(--m-txt)
        }

        #progress-label {
            font-size: .75rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            white-space: nowrap
        }

        #progress-bar-wrap {
            width: 80px;
            height: 2px;
            background: var(--m-bdr);
            border-radius: 1px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: var(--m-gold);
            border-radius: 1px;
            transition: width .4s ease
        }

        /* Body */
        #shell-body {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* Section Navigator */
        #section-nav {
            width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--m-bdr);
            background: var(--m-surf);
            overflow-y: auto;
            padding: 1rem 0
        }

        .sn-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem 1rem;
            font-size: .75rem;
            color: var(--m-muted);
            cursor: pointer;
            transition: color var(--m-tr), background var(--m-tr);
            border-left: 2px solid transparent;
            line-height: 1.3
        }

        .sn-item:hover {
            color: var(--m-txt);
            background: rgba(255, 255, 255, .025)
        }

        .sn-item:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: -2px
        }

        .sn-item.visited {
            color: var(--m-txt)
        }

        .sn-item.current {
            color: var(--m-gold);
            border-left-color: var(--m-gold);
            background: var(--m-gold-dim)
        }

        .sn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--m-muted2);
            flex-shrink: 0;
            transition: background var(--m-tr)
        }

        .sn-item.visited .sn-dot {
            background: var(--m-muted)
        }

        .sn-item.current .sn-dot {
            background: var(--m-gold)
        }

        /* Main Stage */
        #main-stage {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1.5rem
        }

        .screen {
            width: 100%;
            max-width: 640px;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* Typography */
        .scr-eyebrow {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: 1.2rem
        }

        .scr-h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--m-txt);
            letter-spacing: -.02em;
            line-height: 1.15;
            margin-bottom: .75rem
        }

        .scr-h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .9rem
        }

        .scr-meta {
            font-size: .78rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            margin-bottom: 2rem
        }

        .scr-body {
            font-size: .95rem;
            color: var(--m-muted);
            line-height: 1.7;
            margin-bottom: 1.5rem
        }

        .scr-body p {
            margin-bottom: .55rem
        }

        .scr-body p:last-child {
            margin-bottom: 0
        }

        .concept-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--m-txt);
            padding: .45rem 0;
            border-bottom: 1px solid var(--m-bdr)
        }

        .concept-line:last-child {
            border-bottom: none
        }

        /* Buttons */
        .btn-primary {
            background: transparent;
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: .65rem 1.5rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background var(--m-tr), border-color var(--m-tr);
            margin-right: .6rem
        }

        .btn-primary:hover {
            background: var(--m-gold-dim);
            border-color: var(--m-gold)
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .04em;
            padding: .62rem 1.2rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        .btn-ghost:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .btn-ghost:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-top: 1.75rem
        }

        /* Clarify trigger */
        .clarify-btn {
            background: none;
            border: none;
            color: var(--m-gold);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .04em;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            padding: 0;
            font-family: 'Inter', sans-serif
        }

        .clarify-btn:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        /* Order Book */
        .ob-wrap {
            display: flex;
            gap: 1rem;
            margin: 1.25rem 0
        }

        .ob-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .ob-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .5rem
        }

        .ob-row {
            height: 28px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            padding: 0 .6rem;
            font-size: .72rem;
            font-weight: 500;
            transition: opacity .4s ease, height .4s ease
        }

        .ob-row.bid {
            background: rgba(120, 210, 160, .12);
            color: var(--m-green-txt)
        }

        .ob-row.ask {
            background: rgba(220, 100, 80, .12);
            color: var(--m-red-txt)
        }

        .ob-row.consumed {
            opacity: 0;
            height: 0 !important;
            padding: 0;
            overflow: hidden
        }

        .ob-price {
            font-size: .78rem;
            font-weight: 600;
            color: var(--m-muted);
            text-align: center;
            padding: .4rem 0;
            letter-spacing: .04em
        }

        .ob-spread {
            font-size: .65rem;
            color: var(--m-muted);
            text-align: center;
            letter-spacing: .06em;
            text-transform: uppercase;
            margin: .2rem 0
        }

        /* Bid/Ask ladder for screen 1.2 */
        .bba-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: .5rem;
            margin: 1.25rem 0
        }

        .bba-col-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            padding: .3rem .6rem
        }

        .bba-cell {
            padding: .45rem .6rem;
            border-radius: 3px;
            font-size: .78rem
        }

        .bba-cell.bid-cell {
            background: rgba(120, 210, 160, .1);
            color: var(--m-green-txt)
        }

        .bba-cell.ask-cell {
            background: rgba(220, 100, 80, .1);
            color: var(--m-red-txt)
        }

        .bba-spread-col {
            display: flex;
            align-items: center;
            justify-content: center
        }

        .bba-spread-line {
            width: 1px;
            height: 100%;
            background: var(--m-gold-line);
            position: relative
        }

        .spread-label {
            position: absolute;
            background: var(--m-surf);
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-size: .6rem;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            padding: .15rem .4rem;
            border-radius: 2px;
            white-space: nowrap;
            top: 50%;
            transform: translateY(-50%)
        }

        .bba-pair {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: .35rem 0
        }

        /* Answer feedback */
        .feedback-box {
            padding: .85rem 1rem;
            border-radius: 4px;
            font-size: .85rem;
            line-height: 1.5;
            margin-top: .85rem
        }

        .feedback-box.correct {
            background: rgba(120, 210, 160, .1);
            border: 1px solid rgba(120, 210, 160, .25);
            color: var(--m-green-txt)
        }

        .feedback-box.incorrect {
            background: rgba(220, 100, 80, .1);
            border: 1px solid rgba(220, 100, 80, .2);
            color: var(--m-red-txt)
        }

        /* Option buttons */
        .opt-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            text-align: left;
            padding: .75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: .5rem;
            transition: border-color var(--m-tr), background var(--m-tr)
        }

        .opt-btn:hover {
            border-color: var(--m-bdrhi);
            background: rgba(255, 255, 255, .025)
        }

        .opt-btn:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 1px
        }

        .opt-btn.selected {
            border-color: var(--m-gold-line);
            background: var(--m-gold-dim);
            color: var(--m-gold)
        }

        .opt-btn.correct-ans {
            border-color: rgba(120, 210, 160, .5);
            background: rgba(120, 210, 160, .1);
            color: var(--m-green-txt)
        }

        .opt-btn.wrong-ans {
            border-color: rgba(220, 100, 80, .4);
            background: rgba(220, 100, 80, .1);
            color: var(--m-red-txt)
        }

        .dir-btn {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            font-weight: 500;
            padding: .75rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: border-color var(--m-tr), background var(--m-tr);
            margin-right: .6rem
        }

        .dir-btn:hover {
            border-color: var(--m-bdrhi);
            background: rgba(255, 255, 255, .025)
        }

        /* Assessment */
        .assessment-prog {
            font-size: .72rem;
            color: var(--m-muted);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 1.5rem
        }

        .assessment-q {
            font-size: 1rem;
            color: var(--m-txt);
            margin-bottom: 1.25rem;
            line-height: 1.55
        }

        /* Reflection */
        .ref-label {
            font-size: .85rem;
            font-weight: 500;
            color: var(--m-txt);
            margin-bottom: .5rem;
            display: block
        }

        .ref-area {
            width: 100%;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .87rem;
            padding: .85rem 1rem;
            border-radius: 4px;
            resize: vertical;
            min-height: 90px;
            transition: border-color var(--m-tr)
        }

        .ref-area:focus {
            outline: none;
            border-color: var(--m-bdrhi)
        }

        .ref-group {
            margin-bottom: 1.25rem
        }

        /* Result screen */
        .result-box {
            text-align: center;
            padding: 2rem 1rem
        }

        .result-icon {
            font-size: 2rem;
            margin-bottom: 1rem
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--m-txt);
            margin-bottom: .5rem
        }

        .result-gold {
            color: var(--m-gold)
        }

        .result-body {
            font-size: .9rem;
            color: var(--m-muted);
            line-height: 1.6;
            margin-bottom: 1.75rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto
        }

        /* Market Reality illustration */
        .mr-chart {
            height: 80px;
            position: relative;
            margin: 1.25rem 0;
            border-bottom: 1px solid var(--m-bdr)
        }

        .mr-liq-bar {
            position: absolute;
            background: rgba(220, 100, 80, .18);
            border: 1px solid rgba(220, 100, 80, .3);
            border-radius: 2px;
            font-size: .62rem;
            color: var(--m-red-txt);
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: .04em
        }

        .mr-news-tag {
            position: absolute;
            background: var(--m-gold-dim);
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-size: .62rem;
            font-weight: 600;
            padding: .15rem .4rem;
            border-radius: 2px;
            letter-spacing: .05em
        }

        .mr-price-line {
            position: absolute;
            height: 2px;
            background: var(--m-gold);
            border-radius: 1px;
            transition: width .5s ease
        }

        .mr-bullet {
            padding: .55rem 0;
            font-size: .88rem;
            color: var(--m-muted);
            border-bottom: 1px solid var(--m-bdr);
            line-height: 1.5
        }

        .mr-bullet:last-child {
            border-bottom: none
        }

        .mr-bullet strong {
            color: var(--m-txt);
            font-weight: 500
        }

        /* ClarifyPanel */
        #clarify-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 900;
            display: none;
            align-items: flex-start;
            justify-content: flex-end
        }

        #clarify-overlay.open {
            display: flex
        }

        #clarify-panel {
            width: 340px;
            max-width: 90vw;
            height: 100%;
            background: #16181b;
            border-left: 1px solid var(--m-bdr);
            overflow-y: auto;
            padding: 2rem 1.5rem;
            animation: slideInRight .22s ease
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        .cp-term {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .25rem
        }

        .cp-section {
            margin-top: 1.25rem
        }

        .cp-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .4rem
        }

        .cp-text {
            font-size: .85rem;
            color: var(--m-muted);
            line-height: 1.55
        }

        .cp-text strong {
            color: var(--m-txt);
            font-weight: 500
        }

        #cp-close {
            margin-top: 2rem;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .78rem;
            padding: .5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #cp-close:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        /* Mobile nav drawer */
        @media(max-width:700px) {
            #section-nav {
                position: fixed;
                inset: 0 auto 0 0;
                z-index: 800;
                transform: translateX(-100%);
                transition: transform .3s ease;
                width: 240px
            }

            #section-nav.open {
                transform: translateX(0)
            }

            #nav-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                z-index: 799;
                display: none
            }

            #nav-backdrop.open {
                display: block
            }

            #topbar-title {
                font-size: .82rem
            }

            #clarify-panel {
                width: 100%;
                height: 60vh;
                border-left: none;
                border-top: 1px solid var(--m-bdr);
                position: fixed;
                bottom: 0;
                left: 0
            }

            #clarify-overlay {
                align-items: flex-end;
                justify-content: center
            }

            #main-stage {
                padding: 1.5rem 1rem
            }
        }

        .nav-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            padding: .36rem .7rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: .75rem
        }

        @media(max-width:700px) {
            .nav-toggle {
                display: inline-flex;
                align-items: center;
                gap: .4rem
            }
        }
    </style>
</head>

<body>
    <div id="module-shell">

        <!-- Top Bar -->
        <div id="topbar">
            <div id="topbar-left">
                <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNavDrawer()"
                    aria-label="Open section navigator">&#9776; Sections</button>
                <button id="back-btn" onclick="goBack()">&#8592; Market Mechanics</button>
                <span id="topbar-title">What Markets Actually Are</span>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem">
                <span id="progress-label">Progress 0%</span>
                <div id="progress-bar-wrap">
                    <div id="progress-bar-fill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <!-- Nav Backdrop (mobile) -->
        <div id="nav-backdrop" onclick="toggleNavDrawer()"></div>

        <!-- Shell Body -->
        <div id="shell-body">

            <!-- Section Navigator -->
            <nav id="section-nav" aria-label="Module sections">
                <div id="sn-items"></div>
            </nav>

            <!-- Main Stage -->
            <main id="main-stage">
                <div class="screen" id="screen-container"></div>
            </main>

        </div><!-- /shell-body -->
    </div><!-- /module-shell -->

    <!-- ClarifyPanel -->
    <div id="clarify-overlay" onclick="handleClarifyOverlayClick(event)" role="dialog" aria-modal="true"
        aria-label="Clarify">
        <div id="clarify-panel">
            <div class="cp-term" id="cp-term"></div>
            <div class="cp-section">
                <div class="cp-label">Explanation</div>
                <div class="cp-text" id="cp-explanation"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Example</div>
                <div class="cp-text" id="cp-example"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Common Misconception</div>
                <div class="cp-text" id="cp-misconception"></div>
            </div>
            <button id="cp-close" onclick="closeClarify()">Close</button>
        </div>
    </div>

    <script src="script.js?v=m11"></script>
    <script src="ai-widget.js"></script>
    <script src="google-auth.js"></script>
    <script>
        window.addEventListener('load', () => { if (typeof initGoogleAuth === 'function') initGoogleAuth() });

        /* ════════════════════════════════════════════════
           MODULE 1.1 — STATE MODEL
        ════════════════════════════════════════════════ */
        const STATE = {
            currentSectionId: 0,
            currentScreenIndex: 0,
            visitedSections: new Set(),
            clarifyPanel: { open: false, topicId: null },
            simulationRounds: [],
            decisionTest: { choice: null, correct: null },
            reflection: { before: '', changed: '' },
            assessment: {
                answers: [null, null, null, null, null], // selectedOption per question
                isSubmitted: false,
                scorePercent: null,
                passed: null,
                currentQ: 0  // which question is being viewed
            },
            verified: false,
            sectionLastScreenIndex: {},  // { [sectionId]: lastScreenIndex }
            navHistory: [],              // stack of { sectionId, screenIndex }
            showReview: false            // true when on Review Answers sub-screen
        };

        const SECTIONS = [
            { id: 0, label: 'Entry' },
            { id: 1, label: 'Section I \u2014 Concept Clarity' },
            { id: 2, label: 'Section II \u2014 Interactive Simulation' },
            { id: 3, label: 'Section III \u2014 Decision Test' },
            { id: 4, label: 'Section IV \u2014 Market Reality' },
            { id: 5, label: 'Section V \u2014 Reflection' },
            { id: 6, label: 'Section VI \u2014 Mastery Assessment' }
        ];

        function computeProgress() {
            const visited = STATE.visitedSections.size;
            const base = Math.min(visited, 6);
            let pct = Math.round((base / 6) * 85);
            if (STATE.assessment.passed) pct = 100;
            else if (STATE.assessment.scorePercent > 0) pct = Math.max(pct, 90);
            return pct;
        }

        function updateProgress() {
            const pct = computeProgress();
            document.getElementById('progress-label').textContent = 'Progress ' + pct + '%';
            document.getElementById('progress-bar-fill').style.width = pct + '%';
        }

        function visit(sectionId) {
            if (!STATE.visitedSections.has(sectionId)) {
                STATE.visitedSections.add(sectionId);
                updateProgress();
            }
            renderNav();
        }

        function goToSection(sid, screenIndex, pushHistory) {
            // Allow navigation to visited sections or the immediate next
            const allowed = STATE.visitedSections.has(sid) || sid <= Math.max(...[...STATE.visitedSections], 0) + 1 || sid === 0;
            if (!allowed) return;
            // Push current position to history before navigating (unless this is a history-pop)
            if (pushHistory !== false) {
                STATE.navHistory.push({ sectionId: STATE.currentSectionId, screenIndex: STATE.currentScreenIndex });
            }
            // Record the last screen visited in the departing section
            STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
            STATE.currentSectionId = sid;
            STATE.currentScreenIndex = (screenIndex !== undefined && screenIndex !== null) ? screenIndex : 0;
            STATE.showReview = false;
            visit(sid);
            renderNav();
            renderScreen();
            // close mobile nav
            const nav = document.getElementById('section-nav');
            if (nav.classList.contains('open')) toggleNavDrawer();
        }

        function goBack() {
            // If on Review Answers sub-screen, go back to results
            if (STATE.showReview) {
                STATE.showReview = false;
                renderScreen();
                return;
            }
            // If there is history, pop it
            if (STATE.navHistory.length > 0) {
                const prev = STATE.navHistory.pop();
                STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
                STATE.currentSectionId = prev.sectionId;
                STATE.currentScreenIndex = prev.screenIndex;
                STATE.showReview = false;
                visit(prev.sectionId);
                renderNav();
                renderScreen();
                return;
            }
            // Default: return to market-mechanics
            window.location.href = 'market-mechanics.html';
        }

        function toggleNavDrawer() {
            document.getElementById('section-nav').classList.toggle('open');
            document.getElementById('nav-backdrop').classList.toggle('open');
        }

        /* ── Navigator ── */
        function renderNav() {
            const container = document.getElementById('sn-items');
            container.innerHTML = '';
            SECTIONS.forEach(s => {
                if (s.id === 0) return; // hide entry in nav
                const isCurrent = STATE.currentSectionId === s.id;
                const isVisited = STATE.visitedSections.has(s.id);
                const isAccessible = isVisited || s.id <= Math.max(...[...STATE.visitedSections], 0) + 1;
                const div = document.createElement('div');
                div.className = 'sn-item' + (isCurrent ? ' current' : '') + (isVisited ? ' visited' : '');
                div.setAttribute('tabindex', isAccessible ? '0' : '-1');
                div.setAttribute('role', 'button');
                div.setAttribute('aria-label', s.label + (isCurrent ? ', current' : isVisited ? ', visited' : ', not visited'));
                div.innerHTML = `<span class="sn-dot"></span><span>${s.label}</span>`;
                if (isAccessible) {
                    div.onclick = () => {
                        // Jump to last viewed screen in that section
                        const lastSi = STATE.sectionLastScreenIndex[s.id];
                        goToSection(s.id, lastSi !== undefined ? lastSi : 0);
                    };
                    div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); } };
                } else {
                    div.style.opacity = '.35';
                    div.style.cursor = 'not-allowed';
                }
                container.appendChild(div);
            });
        }

        /* ════════════════════════════════════════════════
           CLARIFY PANEL DATA
        ════════════════════════════════════════════════ */
        const CLARIFY_DATA = {
            bid: {
                term: 'Bid',
                explanation: 'The highest price a buyer is currently willing to pay. It represents the best available buying interest in the market at that moment.',
                example: 'If the best bid is 62,500, buyers are willing to pay up to 62,500 — not a cent more at this time.',
                misconception: '<strong>"Bid is what you will definitely get filled at."</strong> Not quite. Your fill depends on order type and available liquidity. A market sell order executes at the bid, but large orders may fill at worse prices.'
            },
            ask: {
                term: 'Ask',
                explanation: 'The lowest price a seller is currently willing to accept. It is the best available offer in the order book at that moment.',
                example: 'If the best ask is 62,510, sellers want at least 62,510 — no less, unless they revise their order.',
                misconception: '<strong>"Ask is the \'real price\'."</strong> Neither bid nor ask alone is the price. The market price is the last executed transaction, which falls between the two.'
            },
            marketorder: {
                term: 'Market Order',
                explanation: 'An order that executes immediately at the best available price, consuming whatever liquidity exists at that moment.',
                example: 'Buying at market lifts the ask — your order fills against the lowest available sellers, potentially at multiple price levels if size is large.',
                misconception: '<strong>"A market order guarantees a specific price."</strong> It guarantees execution, not a specific price. In low-liquidity conditions, you may receive significantly worse fills (slippage).'
            },
            liquidity: {
                term: 'Liquidity',
                explanation: 'Resting limit orders sitting in the order book, available for aggressive orders to trade against. Higher liquidity means more orders at a given price level.',
                example: 'A large sell wall of 500 BTC at 64,000 acts as friction — buyers must absorb all of it before price can move above that level.',
                misconception: '<strong>"Liquidity guarantees reversal."</strong> It does not. Liquidity creates resistance, not certainty. Strong news or aggressive flow can overwhelm even heavy resting orders.'
            },
            spread: {
                term: 'Spread',
                explanation: 'The spread is the difference between the best bid and the best ask at any given moment. It represents the cost of immediate execution.',
                example: 'If the best bid is 62,500 and the best ask is 62,510, the spread is 10 points. A market buyer pays the ask; a market seller receives the bid.',
                misconception: '<strong>"The spread is fixed."</strong> The spread widens during low-liquidity periods and narrows in deep, active markets. It is never constant.'
            },
            thinliquidity: {
                term: 'Thin Liquidity',
                explanation: 'When the number of resting orders above or below price is small, price can move through those levels rapidly with less aggressive volume required.',
                example: 'If only a handful of sellers exist between 62,510 and 62,550, even modest buying pressure can lift price through that zone quickly.',
                misconception: '<strong>"Thin liquidity means price will definitely move."</strong> Thin liquidity reduces friction — it does not guarantee direction. Demand must still materialize.'
            },
            contextliquidity: {
                term: 'Context vs Liquidity',
                explanation: 'Liquidity location provides structural context, but it does not dictate direction. Macro events, news catalysts, and order flow can all override resting order levels.',
                example: 'A major news release can drive aggressive buying straight through a thick sell wall, invalidating any prior liquidity-based expectation.',
                misconception: '<strong>"Liquidity maps guarantee trade outcomes."</strong> They frame the environment. Context — flow, catalyst, momentum — determines which way the market actually moves.'
            }
        };

        function openClarify(topicId) {
            const d = CLARIFY_DATA[topicId];
            if (!d) return;
            document.getElementById('cp-term').textContent = d.term;
            document.getElementById('cp-explanation').textContent = d.explanation;
            document.getElementById('cp-example').textContent = d.example;
            document.getElementById('cp-misconception').innerHTML = d.misconception;
            const overlay = document.getElementById('clarify-overlay');
            overlay.classList.add('open');
            document.getElementById('cp-close').focus();
        }

        function closeClarify() {
            document.getElementById('clarify-overlay').classList.remove('open');
        }

        function handleClarifyOverlayClick(e) {
            if (e.target === document.getElementById('clarify-overlay')) closeClarify();
        }

        /* ════════════════════════════════════════════════
           SCREEN RENDERERS
        ════════════════════════════════════════════════ */
        function renderScreen() {
            const container = document.getElementById('screen-container');
            container.innerHTML = '';
            const s = STATE.currentSectionId;
            const si = STATE.currentScreenIndex;
            let html = '';

            if (s === 0) { html = buildEntryScreen(); }
            else if (s === 1) {
                if (si === 0) html = buildS1S1();
                else if (si === 1) html = buildS1S2();
                else html = buildS1S3();
            }
            else if (s === 2) { html = buildS2(si); }
            else if (s === 3) { html = buildS3(); }
            else if (s === 4) { html = buildS4(); }
            else if (s === 5) { html = buildS5(); }
            else if (s === 6) {
                if (STATE.showReview) html = buildReviewAnswers();
                else html = buildS6();
            }

            container.innerHTML = html;
            container.scrollTop = 0;
            document.getElementById('main-stage').scrollTop = 0;
            attachHandlers();
        }

        /* ── Section 0: Entry ── */
        function buildEntryScreen() {
            return `

  <p class="scr-eyebrow">ProsperPath — Market Mechanics</p>
  <h1 class="scr-h1">What Markets<br>Actually Are</h1>
  <p class="scr-body" style="max-width:400px;margin:0 auto 1.5rem">"Price does not move randomly.<br>It is the result of competing orders."</p>
  <p class="scr-meta">Core &bull; 18 minutes &bull; Auction Mechanics</p>
  <button class="btn-primary" id="begin-btn">Begin Module</button>
</div>`;
        }

        /* ── Section I, Screen 1 ── */
        function buildS1S1() {
            return `

        /* ── Section I, Screen 2 ── */
        function buildS1S2() {
            return `

        }

        /* ── Section I, Screen 3 ── */
        function buildS1S3() {
            const answered = STATE._s1s3_answered;
            const correct = STATE._s1s3_choice === 'Market Order';
            let feedback = '';
            if (answered) {
                feedback = correct
                    ? `<div class="feedback-box correct">Correct. Market orders remove available liquidity and shift price.</div>`
                    : `<div class="feedback-box incorrect">Not quite. Limit orders wait. Market orders act immediately.</div>`;
            }
            return `

<h2 class="scr-h2">Price Does Not Move Randomly</h2>
<div class="scr-body">
  <p>Price moves when aggressive orders consume liquidity.</p>
</div>
<p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.85rem">Which order type moves price immediately? <button class="clarify-btn" data-topic="marketorder" style="margin-left:.4rem">Clarify</button></p>
<button class="opt-btn${answered && STATE._s1s3_choice === 'Limit Order' ? ' wrong-ans' : ''}" id="opt-limit" ${answered ? 'disabled' : ''}>Limit Order</button>
<button class="opt-btn${answered && correct ? ' correct-ans' : ''}" id="opt-market" ${answered ? 'disabled' : ''}>Market Order</button>
${feedback}
<div class="btn-row" ${!answered ? 'style="display:none"' : ''} id="s1s3-cont-row">
  <button class="btn-primary" id="s1s3-cont">Continue to Simulation</button>
</div>`;
        }

        /* ── Section II: Simulation ── */
        const SIM_ROUNDS = [
            {
                round: 1,
                prompt: 'Observe the order book.\nA surge of aggressive buyers enters.\nWhere does price move?',
                correct: 'Up',
                explain: 'Aggressive buyers lifted the ask. Price moved upward.',
                obAsks: ['heavy', 'heavy', 'medium'],
                obBids: ['heavy', 'heavy', 'heavy'],
                heavyAbove: false
            },
            {
                round: 2,
                prompt: 'Aggressive buyers enter again.\nWhat happens?',
                correct: 'Up',
                explain: 'When liquidity is thin, price moves faster.',
                obAsks: ['thin', 'thin', 'thin'],
                obBids: ['heavy', 'heavy', 'heavy'],
                heavyAbove: false
            },
            {
                round: 3,
                prompt: 'Aggressive sellers enter.\nPredict movement.',
                correct: 'Down',
                explain: 'Aggressive sellers hit bids and price moved downward.',
                obAsks: ['heavy', 'heavy', 'heavy'],
                obBids: ['thin', 'thin', 'thin'],
                heavyAbove: true
            }
        ];

        const SIM_SIZES = { heavy: '100%', medium: '70%', thin: '28%' };
        const SIM_LABELS = { heavy: 'Large Block', medium: 'Medium', thin: 'Thin' };

        function buildOrderBookRows(side, levels) {
            return levels.map((size, i) => {
                const price = side === 'ask' ? (62510 + i * 5) : (62500 - i * 3);
                const consumed = STATE._sim_consumed && ((side === 'ask' && STATE._sim_correct === 'Up') || (side === 'bid' && STATE._sim_correct === 'Down'));
                return `<div class="ob-row ${side}${consumed && i === 0 ? ' consumed' : ''}" style="width:100%">
      <span style="flex:1;background:rgba(255,255,255,.05);height:14px;border-radius:2px;display:inline-block;width:${SIM_SIZES[size]};margin-right:.4rem"></span>
      <span>${price.toLocaleString()}</span>
    </div>`;
            }).join('');
        }

        function buildS2(round) {
            const rd = SIM_ROUNDS[round];
            if (!rd) { goToSection(3, 0); return ''; }
            const answered = STATE._sim_answered;
            const userChoice = STATE._sim_choice;
            const correct = userChoice === rd.correct;
            const isLastRound = round === 2;
            let feedback = '';
            if (answered) {
                feedback = `<div class="feedback-box ${correct ? 'correct' : 'incorrect'}">${rd.explain}</div>`;
                if (isLastRound) {
                    feedback += `<div style="padding:.85rem 1rem;background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:4px;margin-top:.85rem"><p style="font-size:.85rem;color:var(--m-txt);line-height:1.6;font-style:italic">Price moves toward imbalance. Orders determine direction, not patterns.</p></div>`;
                }
            }
            const ctaLabel = isLastRound ? 'Continue to Decision Test' : 'Next Round';
            return `

<p style="font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--m-muted);margin-bottom:.5rem">Round ${rd.round} of 3</p>
<div class="scr-body"><p>${rd.prompt.replace(/\n/g, '<br>')}</p></div>
<div class="ob-wrap">
  <div class="ob-side">
    <div class="ob-label">Asks (Sell)</div>
    ${buildOrderBookRows('ask', rd.obAsks)}
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 .5rem">
    <div class="ob-price">62,505</div>
    <div class="ob-spread">Spread</div>
  </div>
  <div class="ob-side">
    <div class="ob-label">Bids (Buy)</div>
    ${buildOrderBookRows('bid', rd.obBids)}
  </div>
</div>
${!answered ? `<div style="display:flex;gap:.6rem;margin-top:.5rem">
  <button class="dir-btn" id="sim-up">&#8593; Up</button>
  <button class="dir-btn" id="sim-down">&#8595; Down</button>
</div>` : ''}
${feedback}
${answered ? `<div class="btn-row"><button class="btn-primary" id="sim-next">${ctaLabel}</button></div>` : ''}`;
        }



        /* ── Section III: Decision Test ── */
        function buildS3() {
            const answered = STATE.decisionTest.choice !== null;
            const correct = STATE.decisionTest.correct;
            let feedback = '';
            if (answered) {
                feedback = correct
                    ? `<div class="feedback-box correct">Yes. Price moves more easily where resistance is weaker. Liquidity acts as friction.</div>`
                    : `<div class="feedback-box incorrect">Not this time. With minimal support below, price can move downward more easily. Liquidity acts as friction.</div>`;
            }
            return `

    <div class="ob-label">Asks (Sell) — Heavy</div>
    ${['heavy', 'heavy', 'heavy'].map((s, i) => `<div class="ob-row ask" style="width:100%"><span style="flex:1;background:rgba(255,255,255,.05);height:14px;border-radius:2px;display:inline-block;width:${SIM_SIZES[s]};margin-right:.4rem"></span><span>${62510 + i * 5}</span></div>`).join('')}
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 .5rem">
    <div class="ob-price">62,505</div>
    <div class="ob-spread">Spread</div>
  </div>
  <div class="ob-side">
    <div class="ob-label">Bids (Buy) — Thin</div>
    ${['thin', 'thin', 'thin'].map((s, i) => `<div class="ob-row bid" style="width:100%"><span style="flex:1;background:rgba(255,255,255,.05);height:14px;border-radius:2px;display:inline-block;width:${SIM_SIZES[s]};margin-right:.4rem"></span><span>${62500 - i * 3}</span></div>`).join('')}
  </div>
</div>
<p style="font-size:.9rem;color:var(--m-txt);margin:.75rem 0 .85rem">Where is price more likely to move first? <button class="clarify-btn" data-topic="liquidity" style="margin-left:.4rem">Clarify</button></p>
<button class="opt-btn${answered && STATE.decisionTest.choice === 'Up' ? ' wrong-ans' : ''}" id="dt-up" ${answered ? 'disabled' : ''}>Up</button>
<button class="opt-btn${answered && STATE.decisionTest.correct ? ' correct-ans' : answered && STATE.decisionTest.choice === 'Down' ? ' wrong-ans' : ''}" id="dt-down" ${answered ? 'disabled' : ''}>Down</button>
<button class="opt-btn${answered && STATE.decisionTest.choice === 'No clear edge' ? ' wrong-ans' : ''}" id="dt-none" ${answered ? 'disabled' : ''}>No clear edge</button>
${feedback}
${answered ? `<div class="btn-row"><button class="btn-primary" id="s3-cont">Continue to Market Reality</button></div>` : ''}`;
        }

        /* ── Section IV: Market Reality ── */
        function buildS4() {
            return `

  <svg style="position:absolute;bottom:8px;left:8px;width:90%;height:60px" viewBox="0 0 300 60">

  <div class="mr-bullet"><strong>Context determines outcome.</strong> Order flow and macro conditions interact with structure.</div>
  <div class="mr-bullet"><strong>Aggressive flow can override resting orders.</strong> Conditions, not levels, decide execution outcome.</div>

        /* ── Section V: Reflection ── */
        function buildS5() {
            return `
<p class="scr-eyebrow">Section V &mdash; Reflection</p>
<h2 class="scr-h2">Your Understanding</h2>
<div class="ref-group">
  <label class="ref-label" for="ref-before">Before this module, how did you think price moved?</label>
  <textarea class="ref-area" id="ref-before" placeholder="Your response..." rows="3">${escHtml(STATE.reflection.before)}</textarea>
</div>
<div class="ref-group">
  <label class="ref-label" for="ref-changed">What changed in your understanding?</label>
  <textarea class="ref-area" id="ref-changed" placeholder="Your response..." rows="3">${escHtml(STATE.reflection.changed)}</textarea>
</div>
<p id="ref-error" style="font-size:.78rem;color:var(--m-red-txt);margin-bottom:.5rem;display:none">Please complete both reflections (at least 5 characters each).</p>
<div class="btn-row"><button class="btn-primary" id="s5-submit">Proceed to Assessment</button></div>`;
        }

        /* ── Section VI: Assessment ── */
        const A_QUESTIONS = [
            { q: 'What causes immediate price movement?', opts: ['Limit orders', 'Market orders', 'Indicators'], correct: 'Market orders' },
            { q: 'What is the spread?', opts: ['The gap between candles', 'The difference between bid and ask', 'The trading fee'], correct: 'The difference between bid and ask' },
            { q: 'If liquidity above price is thin and buyers become aggressive, price is more likely to:', opts: ['Stall', 'Move up', 'Move down'], correct: 'Move up' },
            { q: 'Why does price move toward areas of low liquidity?', opts: ['Random fluctuation', 'Less resistance', 'Indicator signal'], correct: 'Less resistance' },
            { q: 'True or False: Liquidity location guarantees direction.', opts: ['True', 'False'], correct: 'False' }
        ];

        function buildS6() {
            // Show results if submitted
            if (STATE.assessment.isSubmitted) {
                return buildResultScreen();
            }
            const qi = STATE.assessment.currentQ;
            const q = A_QUESTIONS[qi];
            const userAns = STATE.assessment.answers[qi]; // null or a string
            const hasAnswer = userAns !== null && userAns !== undefined;
            const isLastQ = qi === A_QUESTIONS.length - 1;
            return `
<p class="scr-eyebrow">Section VI &mdash; Mastery Assessment</p>
<div class="assessment-prog">Question ${qi + 1} of ${A_QUESTIONS.length}</div>
<div class="assessment-q">${q.q}</div>
<div id="assessment-opts">
${q.opts.map(opt =>
                `<button class="opt-btn${userAns === opt ? ' selected' : ''}" data-ans="${escAttr(opt)}">${opt}</button>`
            ).join('')}
</div>
<div class="btn-row">
  ${qi > 0 ? `<button class="btn-ghost" id="assess-back">Back</button>` : ''}
  ${isLastQ
                    ? `<button class="btn-primary" id="assess-submit" ${!hasAnswer ? 'disabled style="opacity:.45;cursor:not-allowed"' : ''}>Submit Assessment</button>`
                    : `<button class="btn-primary" id="assess-next" ${!hasAnswer ? 'disabled style="opacity:.45;cursor:not-allowed"' : ''}>Next</button>`
                }
</div>
${!hasAnswer ? '<p style="font-size:.75rem;color:var(--m-muted);margin-top:.75rem">Select an answer to continue.</p>' : ''}`;
        }

        function buildResultScreen() {
            const score = STATE.assessment.scorePercent;
            const passed = STATE.assessment.passed;
            const reviewBtn = `<button class="btn-ghost" id="result-review-answers" style="margin-top:.5rem">Review Answers</button>`;
            if (passed) {
                return `
<div class="result-box">
  <div class="result-icon" style="color:var(--m-gold)">&#10003;</div>
  <div class="result-title">Competency <span class="result-gold">Verified</span></div>
  <div class="result-body">You understand the mechanics behind price movement.<br><span style="color:var(--m-gold);font-size:.85rem">Score: ${score}%</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem">
    <button class="btn-primary" id="result-return">Return to Market Mechanics</button>
    ${reviewBtn}
  </div>
</div>`;
            } else {
                return `
<div class="result-box">
  <div class="result-icon" style="color:var(--m-muted)">&#8635;</div>
  <div class="result-title">Review Recommended</div>
  <div class="result-body">Revisit key sections and try again.<br><span style="color:var(--m-red-txt);font-size:.85rem">Score: ${score}%</span></div>
  <div class="btn-row" style="justify-content:center">
    <button class="btn-ghost" id="result-retry">Retry Assessment</button>
  </div>
  <div style="margin-top:.75rem;text-align:center">${reviewBtn}</div>
</div>`;
            }
        }

        /* ── Review Answers Screen ── */
        const A_REVIEW_DATA = [
            {
                explanation: 'Market orders execute immediately against available liquidity. That action shifts price.',
                clarifyTopic: 'marketorder'
            },
            {
                explanation: 'The spread is the gap between the best bid and the best ask at that moment.',
                clarifyTopic: 'spread'
            },
            {
                explanation: 'When liquidity above is thin, aggressive buying can lift offers quickly and price moves up more easily.',
                clarifyTopic: 'thinliquidity'
            },
            {
                explanation: 'Low liquidity means less resistance. Price can travel faster through thin order zones.',
                clarifyTopic: 'liquidity'
            },
            {
                explanation: 'Liquidity influences movement, but it does not guarantee direction. Context can override it.',
                clarifyTopic: 'contextliquidity'
            }
        ];

        function buildReviewAnswers() {
            const rows = A_QUESTIONS.map((q, i) => {
                const userAns = STATE.assessment.answers[i];
                const correct = userAns === q.correct;
                const rv = A_REVIEW_DATA[i];
                const icon = correct ? '&#10003;' : '&#10007;';
                const iconColor = correct ? 'var(--m-green-txt)' : 'var(--m-red-txt)';
                return `
<div style="background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:6px;padding:1rem 1.1rem;margin-bottom:.85rem">
  <p style="font-size:.8rem;font-weight:600;letter-spacing:.04em;color:var(--m-gold);margin-bottom:.6rem">Q${i + 1}</p>
  <p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.75rem;line-height:1.5">${q.q}</p>
  <p style="font-size:.82rem;margin-bottom:.3rem"><span style="color:${iconColor};font-weight:700;margin-right:.35rem">${icon}</span><span style="color:var(--m-muted)">Your answer:</span> <span style="color:var(--m-txt)">${escHtml(userAns || '(no answer)')}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);margin-bottom:.75rem">Correct answer: <span style="color:var(--m-txt);font-weight:500">${escHtml(q.correct)}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);line-height:1.55;margin-bottom:.65rem">${rv.explanation}</p>
  <button class="clarify-btn" data-topic="${rv.clarifyTopic}">Clarify</button>
</div>`;
            }).join('');
            return `
<p class="scr-eyebrow">Section VI &mdash; Review Answers</p>
<h2 class="scr-h2">Assessment Breakdown</h2>
${rows}
<div class="btn-row">
  <button class="btn-ghost" id="review-back-results">Back to Results</button>
</div>`;
        }

        function computeScore() {
            let correct = 0;
            A_QUESTIONS.forEach((q, i) => {
                if (STATE.assessment.answers[i] === q.correct) correct++;
            });
            const pct = Math.round((correct / A_QUESTIONS.length) * 100);
            STATE.assessment.scorePercent = pct;
            STATE.assessment.passed = pct >= 70;
            STATE.assessment.isSubmitted = true;
            if (STATE.assessment.passed) {
                STATE.verified = true;
                // Write back to market-mechanics module store
                try {
                    const saved = JSON.parse(localStorage.getItem('pp_mm_modules') || '{}');
                    saved['1.1'] = { verified: true, mastery: pct, mastery_percent: pct, status: 'Verified', progress: 100 };
                    localStorage.setItem('pp_mm_modules', JSON.stringify(saved));
                } catch (e) { }
            }
            updateProgress();
        }

        /* ─ Helpers ─ */
        function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }

        /* ─ In-section back navigation for multi-screen sections ─ */
        function goScreenBack() {
            if (STATE.currentScreenIndex > 0) {
                STATE.currentScreenIndex--;
                renderScreen();
            } else {
                goBack();
            }
        }
        function simAnswered(choice, round) {
            const rd = SIM_ROUNDS[round];
            const t = Date.now() - (STATE._sim_start || Date.now());
            const correct = choice === rd.correct;
            STATE.simulationRounds.push({ round: rd.round, userChoice: choice, correct, timeMs: t });
            STATE._sim_answered = true;
            STATE._sim_choice = choice;
            STATE._sim_correct = rd.correct;
            STATE._sim_consumed = true;
            renderScreen();
        }

        /* ─ Event Handlers ─ */
        function attachHandlers() {
            const $ = id => document.getElementById(id);
            const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

            // Entry
            on('begin-btn', 'click', () => { goToSection(1, 0); });

            // S1 — in-section Continue buttons each advance screenIndex
            on('s1s1-cont', 'click', () => { STATE.currentScreenIndex = 1; renderScreen(); });
            on('s1s2-cont', 'click', () => { STATE.currentScreenIndex = 2; renderScreen(); });
            on('opt-limit', 'click', () => {
                STATE._s1s3_choice = 'Limit Order'; STATE._s1s3_answered = true; renderScreen();
            });
            on('opt-market', 'click', () => {
                STATE._s1s3_choice = 'Market Order'; STATE._s1s3_answered = true; renderScreen();
            });
            on('s1s3-cont', 'click', () => { goToSection(2, 0); });

            // S2
            on('sim-up', 'click', () => { STATE._sim_start = Date.now(); simAnswered('Up', STATE.currentScreenIndex); });
            on('sim-down', 'click', () => { STATE._sim_start = Date.now(); simAnswered('Down', STATE.currentScreenIndex); });
            on('sim-next', 'click', () => {
                if (STATE.currentScreenIndex < 2) {
                    STATE._sim_answered = false; STATE._sim_choice = null; STATE._sim_consumed = false; STATE._sim_correct = null;
                    STATE.currentScreenIndex++;
                    renderScreen();
                } else {
                    goToSection(3, 0);
                }
            });

            // S3
            const dtHandler = (choice) => {
                const correct = choice === 'Down';
                STATE.decisionTest = { choice, correct };
                renderScreen();
            };
            on('dt-up', 'click', () => dtHandler('Up'));
            on('dt-down', 'click', () => dtHandler('Down'));
            on('dt-none', 'click', () => dtHandler('No clear edge'));
            on('s3-cont', 'click', () => { goToSection(4, 0); });

            // S4
            on('s4-cont', 'click', () => { goToSection(5, 0); });

            // S5
            on('s5-submit', 'click', () => {
                const b = ($('ref-before') || {}).value || '';
                const c = ($('ref-changed') || {}).value || '';
                if (b.trim().length < 5 || c.trim().length < 5) {
                    const err = $('ref-error'); if (err) err.style.display = 'block'; return;
                }
                STATE.reflection = { before: b, changed: c };
                goToSection(6, 0);
            });

            // S6 — assessment: select/deselect answer (toggle)
            document.querySelectorAll('[data-ans]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (STATE.assessment.isSubmitted) return;
                    const qi = STATE.assessment.currentQ;
                    // Toggle: clicking the same option again deselects
                    if (STATE.assessment.answers[qi] === btn.dataset.ans) {
                        STATE.assessment.answers[qi] = null;
                    } else {
                        STATE.assessment.answers[qi] = btn.dataset.ans;
                    }
                    renderScreen();
                });
            });
            on('assess-back', 'click', () => {
                if (STATE.assessment.currentQ > 0) {
                    STATE.assessment.currentQ--;
                    renderScreen();
                }
            });
            on('assess-next', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                STATE.assessment.currentQ++;
                renderScreen();
            });
            on('assess-submit', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                computeScore();
                renderScreen();
            });
            on('result-return', 'click', () => { window.location.href = 'market-mechanics.html'; });
            on('result-review', 'click', () => { goToSection(1, 0); });
            on('result-retry', 'click', () => {
                // Reset only assessment state
                STATE.assessment.answers = [null, null, null, null, null];
                STATE.assessment.isSubmitted = false;
                STATE.assessment.scorePercent = null;
                STATE.assessment.passed = null;
                STATE.assessment.currentQ = 0;
                STATE.showReview = false;
                renderScreen();
            });
            on('result-review-answers', 'click', () => {
                if (STATE.assessment.isSubmitted) {
                    STATE.showReview = true;
                    renderScreen();
                }
            });
            on('review-back-results', 'click', () => {
                STATE.showReview = false;
                renderScreen();
            });

            // Clarify buttons (delegated)
            document.querySelectorAll('.clarify-btn').forEach(btn => {
                btn.addEventListener('click', () => openClarify(btn.dataset.topic));
            });
        }

        /* ── Init ── */
        (function init() {
            // Do not push history for the initial load
            STATE.navHistory = [];
            STATE.currentSectionId = 0;
            STATE.currentScreenIndex = 0;
            visit(0);
            renderNav();
            renderScreen();
        })();
    </script>
</body>

</html>
