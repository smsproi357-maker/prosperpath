<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Module 3.2 — Swings | ProsperPath Market Structure">
    <title>Swings | ProsperPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --m-bg: #0d0e10;
            --m-surf: #141618;
            --m-surf2: #18191c;
            --m-bdr: #1e2023;
            --m-bdrhi: #2e3035;
            --m-txt: #e0e1e3;
            --m-muted: #5e626a;
            --m-muted2: #3a3d44;
            --m-gold: #a07c2e;
            --m-gold-dim: rgba(160, 124, 46, .13);
            --m-gold-line: rgba(160, 124, 46, .38);
            --m-green: rgba(120, 210, 160, .15);
            --m-green-txt: #7ed8a8;
            --m-red: rgba(220, 100, 80, .15);
            --m-red-txt: #e08070;
            --m-rad: 6px;
            --m-tr: 150ms ease
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--m-bg);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            min-height: 100vh
        }

        #ai-chat-fab,
        .ai-fab-btn,
        .floating-action-btn,
        [class*="fab"],
        [id*="fab"] {
            display: none !important
        }

        #module-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--m-bdr);
            background: var(--m-surf);
            flex-shrink: 0;
            gap: 1rem
        }

        #topbar-left {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        #back-btn {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-size: .78rem;
            padding: .38rem .85rem;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #back-btn:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        #topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            color: var(--m-txt)
        }

        #progress-label {
            font-size: .75rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            white-space: nowrap
        }

        #progress-bar-wrap {
            width: 80px;
            height: 2px;
            background: var(--m-bdr);
            border-radius: 1px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: var(--m-gold);
            border-radius: 1px;
            transition: width .4s ease
        }

        #shell-body {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        #section-nav {
            width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--m-bdr);
            background: var(--m-surf);
            overflow-y: auto;
            padding: 1rem 0
        }

        .sn-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem 1rem;
            font-size: .75rem;
            color: var(--m-muted);
            cursor: pointer;
            transition: color var(--m-tr), background var(--m-tr);
            border-left: 2px solid transparent;
            line-height: 1.3
        }

        .sn-item:hover {
            color: var(--m-txt);
            background: rgba(255, 255, 255, .025)
        }

        .sn-item.visited {
            color: var(--m-txt)
        }

        .sn-item.current {
            color: var(--m-gold);
            border-left-color: var(--m-gold);
            background: var(--m-gold-dim)
        }

        .sn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--m-muted2);
            flex-shrink: 0;
            transition: background var(--m-tr)
        }

        .sn-item.visited .sn-dot {
            background: var(--m-muted)
        }

        .sn-item.current .sn-dot {
            background: var(--m-gold)
        }

        #main-stage {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1.5rem
        }

        .screen {
            width: 100%;
            max-width: 640px;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .scr-eyebrow {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: 1.2rem
        }

        .scr-h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--m-txt);
            letter-spacing: -.02em;
            line-height: 1.15;
            margin-bottom: .75rem
        }

        .scr-h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .9rem
        }

        .scr-meta {
            font-size: .78rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            margin-bottom: 2rem
        }

        .scr-body {
            font-size: .95rem;
            color: var(--m-muted);
            line-height: 1.7;
            margin-bottom: 1.5rem
        }

        .scr-body p {
            margin-bottom: .55rem
        }

        .scr-body p:last-child {
            margin-bottom: 0
        }

        .ms-chart-outer {
            position: relative;
            margin: 1.25rem 0;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            border-radius: 4px;
            overflow: hidden;
            height: 220px
        }

        .ms-chart-canvas {
            display: block;
            width: 100%;
            height: 100%
        }

        .principle-card {
            background: var(--m-surf2);
            border: 1px solid var(--m-bdrhi);
            border-radius: 8px;
            padding: 3.5rem 2rem;
            text-align: center;
            margin: 1.5rem 0;
            animation: principleFadeIn .7s ease both
        }

        @keyframes principleFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .principle-text {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 700;
            color: var(--m-txt);
            letter-spacing: -.02em;
            line-height: 1.25
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: .65rem 1.5rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background .2s ease, border-color .2s ease, box-shadow .2s ease;
            margin-right: .6rem
        }

        .btn-primary:hover {
            background: var(--m-gold-dim);
            border-color: var(--m-gold);
            box-shadow: 0 0 10px rgba(160, 124, 46, 0.22)
        }

        .btn-primary:disabled {
            opacity: .42;
            cursor: not-allowed
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .04em;
            padding: .62rem 1.2rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        .btn-ghost:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-top: 1.75rem
        }

        .clarify-btn {
            background: none;
            border: none;
            color: var(--m-gold);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .04em;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            padding: 0;
            font-family: 'Inter', sans-serif
        }

        .opt-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            text-align: left;
            padding: .75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: .5rem;
            transition: border-color var(--m-tr), background var(--m-tr)
        }

        .opt-btn:hover {
            border-color: var(--m-bdrhi);
            background: rgba(255, 255, 255, .025)
        }

        .opt-btn.selected {
            border-color: var(--m-gold-line);
            background: var(--m-gold-dim);
            color: var(--m-gold)
        }

        .opt-btn:disabled {
            cursor: default
        }

        .assessment-prog {
            font-size: .72rem;
            color: var(--m-muted);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 1.5rem
        }

        .assessment-q {
            font-size: 1rem;
            color: var(--m-txt);
            margin-bottom: 1.25rem;
            line-height: 1.55
        }

        .result-box {
            text-align: center;
            padding: 2rem 1rem
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--m-txt);
            margin-bottom: .5rem
        }

        .result-gold {
            color: var(--m-gold)
        }

        .result-body {
            font-size: .9rem;
            color: var(--m-muted);
            line-height: 1.6;
            margin-bottom: 1.75rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto
        }

        #clarify-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 900;
            display: none;
            align-items: flex-start;
            justify-content: flex-end
        }

        #clarify-overlay.open {
            display: flex
        }

        #clarify-panel {
            width: 340px;
            max-width: 90vw;
            height: 100%;
            background: #16181b;
            border-left: 1px solid var(--m-bdr);
            overflow-y: auto;
            padding: 2rem 1.5rem;
            animation: slideInRight .22s ease
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        .cp-term {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .25rem
        }

        .cp-section {
            margin-top: 1.25rem
        }

        .cp-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .4rem
        }

        .cp-text {
            font-size: .85rem;
            color: var(--m-muted);
            line-height: 1.55
        }

        .cp-text strong {
            color: var(--m-txt);
            font-weight: 500
        }

        #cp-close {
            margin-top: 2rem;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .78rem;
            padding: .5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #cp-close:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .nav-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            padding: .36rem .7rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: .75rem
        }

        /* Simulation styles */
        .sim-task {
            background: var(--m-surf2);
            border: 1px solid var(--m-bdrhi);
            border-radius: 4px;
            padding: .75rem 1rem;
            margin-bottom: .85rem;
            font-size: .9rem;
            color: var(--m-txt);
            line-height: 1.45
        }

        .sim-task .task-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-gold);
            margin-bottom: .3rem
        }

        .sim-feedback {
            min-height: 2rem;
            font-size: .85rem;
            padding: .5rem 0;
            transition: opacity .3s ease
        }

        .sim-feedback.correct {
            color: var(--m-green-txt)
        }

        .sim-feedback.incorrect {
            color: var(--m-red-txt)
        }

        .sim-chart-wrap {
            position: relative;
            cursor: crosshair
        }

        @media(max-width:700px) {
            #section-nav {
                position: fixed;
                inset: 0 auto 0 0;
                z-index: 800;
                transform: translateX(-100%);
                transition: transform .3s ease;
                width: 240px
            }

            #section-nav.open {
                transform: translateX(0)
            }

            #nav-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                z-index: 799;
                display: none
            }

            #nav-backdrop.open {
                display: block
            }

            #clarify-panel {
                width: 100%;
                height: 60vh;
                border-left: none;
                border-top: 1px solid var(--m-bdr);
                position: fixed;
                bottom: 0;
                left: 0
            }

            #clarify-overlay {
                align-items: flex-end;
                justify-content: center
            }

            #main-stage {
                padding: 1.5rem 1rem
            }

            .nav-toggle {
                display: inline-flex;
                align-items: center;
                gap: .4rem
            }
        }
    </style>
</head>

<body>
    <div id="module-shell">
        <div id="topbar">
            <div id="topbar-left">
                <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNavDrawer()"
                    aria-label="Open section navigator">&#9776; Sections</button>
                <button id="back-btn" onclick="goBack()">&#8592; Market Structure</button>
                <span id="topbar-title">Swings</span>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem">
                <span id="progress-label">Progress 0%</span>
                <div id="progress-bar-wrap">
                    <div id="progress-bar-fill" style="width:0%"></div>
                </div>
            </div>
        </div>
        <div id="nav-backdrop" onclick="toggleNavDrawer()"></div>
        <div id="shell-body">
            <nav id="section-nav" aria-label="Module sections">
                <div id="sn-items"></div>
            </nav>
            <main id="main-stage">
                <div class="screen" id="screen-container"></div>
            </main>
        </div>
    </div>
    <div id="clarify-overlay" onclick="handleClarifyOverlayClick(event)" role="dialog" aria-modal="true"
        aria-label="Clarify">
        <div id="clarify-panel">
            <div class="cp-term" id="cp-term"></div>
            <div class="cp-section">
                <div class="cp-label">Explanation</div>
                <div class="cp-text" id="cp-explanation"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Example</div>
                <div class="cp-text" id="cp-example"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Common Misconception</div>
                <div class="cp-text" id="cp-misconception"></div>
            </div>
            <button id="cp-close" onclick="closeClarify()">Close</button>
        </div>
    </div>
    <script src="script.js?v=m32"></script>
    <script src="ai-widget.js"></script>
    <script src="google-auth.js"></script>
    <script>
        window.addEventListener('load', () => { if (typeof initGoogleAuth === 'function') initGoogleAuth(); });

        /* ═══ STATE ═══ */
        const STATE = {
            currentSectionId: 0, currentScreenIndex: 0,
            visitedSections: new Set(), sectionLastScreenIndex: {},
            navHistory: [],
            assessment: { answers: [null, null, null], isSubmitted: false, scorePercent: null, passed: null, currentQ: 0 },
            showReview: false, verified: false,
            sim: { task: 0, done: false }
        };

        const SECTIONS = [
            { id: 0, label: 'Entry' },
            { id: 1, label: 'Section I \u2014 Turning Points' },
            { id: 2, label: 'Section II \u2014 Swing High & Low' },
            { id: 3, label: 'Section III \u2014 Potential vs Confirmed' },
            { id: 4, label: 'Section IV \u2014 Swings Build Structure' },
            { id: 5, label: 'Section V \u2014 Identification Simulation' },
            { id: 6, label: 'Section VI \u2014 Principle' },
            { id: 7, label: 'Section VII \u2014 Competency Check' }
        ];

        /* ═══ PROGRESS ═══ */
        function computeProgress() {
            const TOTAL = 7;
            const visited = [...STATE.visitedSections].filter(id => id >= 1 && id <= 7);
            let pct = Math.round((Math.min(visited.length, TOTAL) / TOTAL) * 85);
            if (STATE.assessment.scorePercent !== null && STATE.assessment.scorePercent > 0 && !STATE.assessment.passed) pct = Math.max(pct, 90);
            if (STATE.assessment.passed) pct = 100;
            return pct;
        }
        function updateProgress() {
            const pct = computeProgress();
            document.getElementById('progress-label').textContent = 'Progress ' + pct + '%';
            document.getElementById('progress-bar-fill').style.width = pct + '%';
        }
        function visit(sid) { if (!STATE.visitedSections.has(sid)) { STATE.visitedSections.add(sid); updateProgress(); } renderNav(); }

        /* ═══ NAVIGATION ═══ */
        function goToSection(sid, screenIndex, pushHistory) {
            const maxV = STATE.visitedSections.size > 0 ? Math.max(...[...STATE.visitedSections]) : 0;
            if (!(STATE.visitedSections.has(sid) || sid <= maxV + 1 || sid === 0)) return;
            if (pushHistory !== false) STATE.navHistory.push({ sectionId: STATE.currentSectionId, screenIndex: STATE.currentScreenIndex });
            STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
            STATE.currentSectionId = sid;
            STATE.currentScreenIndex = (screenIndex !== undefined && screenIndex !== null) ? screenIndex : 0;
            STATE.showReview = false;
            visit(sid); renderNav(); renderScreen();
            const nav = document.getElementById('section-nav');
            if (nav.classList.contains('open')) toggleNavDrawer();
        }
        function goBack() {
            if (STATE.showReview) { STATE.showReview = false; renderScreen(); return; }
            if (STATE.navHistory.length > 0) {
                const prev = STATE.navHistory.pop();
                STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
                STATE.currentSectionId = prev.sectionId; STATE.currentScreenIndex = prev.screenIndex;
                STATE.showReview = false; visit(prev.sectionId); renderNav(); renderScreen(); return;
            }
            window.location.href = 'market-structure.html';
        }
        function toggleNavDrawer() {
            document.getElementById('section-nav').classList.toggle('open');
            document.getElementById('nav-backdrop').classList.toggle('open');
        }

        /* ═══ NAV RENDER ═══ */
        function renderNav() {
            const c = document.getElementById('sn-items'); c.innerHTML = '';
            SECTIONS.forEach(s => {
                if (s.id === 0) return;
                const isCurrent = STATE.currentSectionId === s.id;
                const isVisited = STATE.visitedSections.has(s.id);
                const maxV = STATE.visitedSections.size > 0 ? Math.max(...[...STATE.visitedSections]) : 0;
                const isAccessible = isVisited || s.id <= maxV + 1;
                const div = document.createElement('div');
                div.className = 'sn-item' + (isCurrent ? ' current' : '') + (isVisited ? ' visited' : '');
                div.setAttribute('tabindex', isAccessible ? '0' : '-1');
                div.setAttribute('role', 'button');
                div.innerHTML = `<span class="sn-dot"></span><span>${s.label}</span>`;
                if (isAccessible) {
                    div.onclick = () => { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); };
                    div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); } };
                } else { div.style.opacity = '.35'; div.style.cursor = 'not-allowed'; }
                c.appendChild(div);
            });
        }

        /* ═══ CLARIFY ═══ */
        const CLARIFY_DATA = {
            turningpoints: {
                term: 'Turning Points',
                explanation: 'Points where price movement changes direction — from rising to falling, or falling to rising. Every swing begins at a turning point.',
                example: 'Price rises steadily then begins to fall. The peak where direction changed is a turning point.',
                misconception: '<strong>"Turning points predict the future."</strong> Turning points describe what already happened. They are historical markers, not forecasts.'
            },
            swingHighLow: {
                term: 'Swing High & Swing Low',
                explanation: 'A swing high is a peak where price topped before turning downward. A swing low is a trough where price bottomed before turning upward.',
                example: 'Price reaches $105, then falls to $98. The $105 level is a swing high. If price then rises, $98 is a swing low.',
                misconception: '<strong>"All highs and lows are swing points."</strong> A swing point requires confirmation — surrounding candles must show the turn was genuine, not just a brief wick.'
            },
            confirmed: {
                term: 'Confirmed Swing',
                explanation: 'A swing is confirmed when price continues in the opposite direction after the potential turning point. Until then, it remains potential.',
                example: 'Price peaks and one candle closes lower — potential swing high. Two more candles close lower — the swing is now confirmed.',
                misconception: '<strong>"A candle close always confirms the swing."</strong> One candle is often not enough. Context and continued movement in the opposite direction provide confirmation.'
            }
        };
        function openClarify(topicId) {
            const d = CLARIFY_DATA[topicId]; if (!d) return;
            document.getElementById('cp-term').textContent = d.term;
            document.getElementById('cp-explanation').textContent = d.explanation;
            document.getElementById('cp-example').textContent = d.example;
            document.getElementById('cp-misconception').innerHTML = d.misconception;
            document.getElementById('clarify-overlay').classList.add('open');
            document.getElementById('cp-close').focus();
        }
        function closeClarify() { document.getElementById('clarify-overlay').classList.remove('open'); }
        function handleClarifyOverlayClick(e) { if (e.target === document.getElementById('clarify-overlay')) closeClarify(); }
        function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }

        /* ═══ CHART DATA ═══ */
        const CANDLES = [
            [30, 46, 52, 24], [46, 40, 50, 36], [40, 58, 62, 38], [58, 50, 62, 46], [50, 66, 70, 48],
            [66, 60, 72, 54], [60, 74, 78, 56], [74, 62, 80, 58], [62, 70, 74, 56], [70, 64, 76, 60],
            [64, 78, 82, 60], [78, 70, 84, 66], [70, 80, 84, 66], [80, 68, 84, 64], [68, 76, 80, 62],
            [76, 66, 80, 62], [66, 72, 78, 60], [72, 62, 76, 58], [62, 70, 74, 56], [70, 82, 86, 66],
            [82, 74, 88, 70], [74, 84, 88, 70]
        ].map(([o, c, h, l]) => ({ open: o, close: c, high: h, low: l, bull: c >= o }));

        function detectSwings() {
            const n = CANDLES.length, sw = [];
            for (let i = 2; i < n - 2; i++) {
                const c = CANDLES[i];
                if (c.high > CANDLES[i - 1].high && c.high > CANDLES[i - 2].high && c.high > CANDLES[i + 1].high && c.high > CANDLES[i + 2].high) sw.push({ index: i, type: 'high', pct: c.high });
                if (c.low < CANDLES[i - 1].low && c.low < CANDLES[i - 2].low && c.low < CANDLES[i + 1].low && c.low < CANDLES[i + 2].low) sw.push({ index: i, type: 'low', pct: c.low });
            }
            return sw;
        }
        const SWINGS = detectSwings();

        function drawBaseChart(canvasId, mode) {
            const canvas = document.getElementById(canvasId); if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.clientWidth, H = canvas.clientHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
            const n = CANDLES.length, slotW = W / n, gapW = Math.max(1, slotW * 0.2), bodyW = Math.max(2, slotW - gapW);
            const padT = 10, padB = 10, chartH = H - padT - padB;
            const toY = pct => padT + (1 - pct / 100) * chartH;

            const dimMode = (mode === 'path' || mode === 'swings' || mode === 'structure' || mode === 'turns');
            const bullFill = dimMode ? 'rgba(120,210,160,0.08)' : 'rgba(120,210,160,0.22)';
            const bearFill = dimMode ? 'rgba(220,100,80,0.07)' : 'rgba(220,100,80,0.18)';
            const bullBdr = dimMode ? 'rgba(120,210,160,0.16)' : 'rgba(120,210,160,0.45)';
            const bearBdr = dimMode ? 'rgba(220,100,80,0.16)' : 'rgba(220,100,80,0.42)';

            CANDLES.forEach((c, i) => {
                const x = i * slotW + gapW / 2;
                ctx.strokeStyle = c.bull ? bullBdr : bearBdr; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x + bodyW / 2, toY(c.high)); ctx.lineTo(x + bodyW / 2, toY(c.low)); ctx.stroke();
                ctx.fillStyle = c.bull ? bullFill : bearFill; ctx.strokeStyle = c.bull ? bullBdr : bearBdr;
                const bTop = Math.min(toY(c.open), toY(c.close)); const bH = Math.max(1, Math.abs(toY(c.open) - toY(c.close)));
                ctx.fillRect(x, bTop, bodyW, bH); ctx.strokeRect(x, bTop, bodyW, bH);
            });

            // Movement path line
            if (mode === 'path' || mode === 'swings' || mode === 'structure' || mode === 'turns') {
                const pts = CANDLES.map((c, i) => ({ x: i * slotW + slotW / 2, y: toY((c.high + c.low) / 2) }));
                ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
                for (let i = 1; i < pts.length; i++) {
                    const p = pts[i - 1], q = pts[i], mx = (p.x + q.x) / 2;
                    ctx.bezierCurveTo(mx, p.y, mx, q.y, q.x, q.y);
                }
                ctx.strokeStyle = 'rgba(210,185,120,0.35)'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
            }

            // Structure lines between swing points
            if (mode === 'structure') {
                const slotW2 = W / CANDLES.length;
                const toY2 = pct => padT + (1 - pct / 100) * chartH;
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(160,140,90,0.45)'; ctx.lineWidth = 1; ctx.setLineDash([6, 5]); ctx.lineJoin = 'round';
                SWINGS.forEach((sw, idx) => {
                    const x = sw.index * slotW2 + slotW2 / 2;
                    const y = toY2(sw.pct);
                    if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke(); ctx.setLineDash([]);
            }
            return { slotW, padT, padB, chartH, toY };
        }

        /* Turning-point V/inverted-V highlight overlay */
        function renderTurningHighlights(canvasId) {
            const outer = document.getElementById('outer-' + canvasId); if (!outer) return;
            const canvas = document.getElementById(canvasId); if (!canvas) return;
            const W = canvas.clientWidth, H = canvas.clientHeight;
            const n = CANDLES.length, slotW = W / n;
            const padT = 10, padB = 10, chartH = H - padT - padB;
            const toY = pct => padT + (1 - pct / 100) * chartH;
            const existing = outer.querySelector('.turn-overlay'); if (existing) existing.remove();
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity 0.8s ease 0.4s'; svg.style.setProperty('opacity', '0'); /* max rendered opacity will be 0.37 via element attrs */
            svg.className = 'turn-overlay';

            SWINGS.forEach(sw => {
                const cx = sw.index * slotW + slotW / 2;
                const cy = toY(sw.pct);
                const spread = slotW * 2.5;
                const armLen = 24;
                const isHigh = sw.type === 'high';
                // V shape for low, inverted-V for high
                const tipY = isHigh ? cy - armLen : cy + armLen;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M${cx - spread},${cy} L${cx},${tipY} L${cx + spread},${cy}`);
                path.setAttribute('stroke', 'rgba(160,140,80,0.37)');
                path.setAttribute('stroke-width', '0.9');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);
            });

            outer.appendChild(svg);
            setTimeout(() => { svg.style.opacity = '1'; }, 50);
        }

        /* Swing dots + labels SVG overlay */
        function renderSwingDots(canvasId, mode) {
            // mode: 'dot' = plain dots, 'labeled' = dots + SH/SL labels
            const outer = document.getElementById('outer-' + canvasId); if (!outer) return;
            const canvas = document.getElementById(canvasId); if (!canvas) return;
            const W = canvas.clientWidth, H = canvas.clientHeight;
            const n = CANDLES.length, slotW = W / n;
            const padT = 10, padB = 10, chartH = H - padT - padB;
            const toY = pct => padT + (1 - pct / 100) * chartH;
            const existing = outer.querySelector('.swing-svg'); if (existing) existing.remove();
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity 0.55s ease 0.35s';
            svg.className = 'swing-svg';

            SWINGS.forEach(sw => {
                const x = sw.index * slotW + slotW / 2;
                const y = toY(sw.pct);
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', '4');
                circle.setAttribute('fill', 'rgba(220,210,190,0.90)'); circle.setAttribute('stroke', 'rgba(220,210,190,0.28)'); circle.setAttribute('stroke-width', '1.5');
                svg.appendChild(circle);
                if (mode === 'labeled') {
                    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    lbl.setAttribute('x', x);
                    lbl.setAttribute('y', sw.type === 'high' ? y - 13 : y + 19);
                    lbl.setAttribute('text-anchor', 'middle');
                    lbl.setAttribute('font-size', '9');
                    lbl.setAttribute('font-family', 'Inter,sans-serif');
                    lbl.setAttribute('fill', 'rgba(224,225,227,0.82)');
                    lbl.setAttribute('font-weight', '600');
                    lbl.setAttribute('letter-spacing', '0.06em');
                    lbl.textContent = sw.type === 'high' ? 'SH' : 'SL';
                    svg.appendChild(lbl);
                }
            });
            outer.appendChild(svg);
            setTimeout(() => { svg.style.opacity = '1'; }, 50);
        }

        /* ═══ SCREEN RENDER ═══ */
        function renderScreen() {
            const c = document.getElementById('screen-container'); c.innerHTML = '';
            const s = STATE.currentSectionId;
            let html = '';
            if (s === 0) html = buildEntry();
            else if (s === 1) html = buildS1();
            else if (s === 2) html = buildS2();
            else if (s === 3) html = buildS3();
            else if (s === 4) html = buildS4();
            else if (s === 5) html = buildS5();
            else if (s === 6) html = buildS6();
            else if (s === 7) { if (STATE.showReview) html = buildReviewAnswers(); else html = buildS7(); }
            c.innerHTML = html;
            c.scrollTop = 0; document.getElementById('main-stage').scrollTop = 0;

            requestAnimationFrame(() => {
                if (s === 1) { drawBaseChart('chart-s1', 'turns'); renderTurningHighlights('chart-s1'); }
                if (s === 2) { drawBaseChart('chart-s2', 'path'); renderSwingDots('chart-s2', 'labeled'); }
                if (s === 3) initS3Animation();
                if (s === 4) { drawBaseChart('chart-s4', 'structure'); renderSwingDots('chart-s4', 'dot'); }
                if (s === 5) initSimulation();
            });
            attachHandlers();
        }

        function buildEntry() {
            return `<div style="text-align:center;padding:2rem 0">

        function buildS1() {
            return `<p class="scr-eyebrow">Section I &mdash; Turning Points</p>

        /* Section III — Potential vs Confirmed animation */
        function buildS3() {
            return `<p class="scr-eyebrow">Section III &mdash; Potential vs Confirmed Swings</p>
<div class="ms-chart-outer" id="outer-chart-s3"><canvas class="ms-chart-canvas" id="chart-s3"></canvas></div>
<div id="s3-status" style="font-size:.82rem;color:var(--m-muted);text-align:center;margin-top:.65rem;min-height:1.4rem;transition:opacity .4s ease"></div>
<div class="scr-body" style="margin-top:.65rem;text-align:center">

<p style="margin-top:.55rem">A swing becomes confirmed when movement continues in the opposite direction.</p>
</div>
<p style="font-size:.8rem;color:var(--m-muted);margin-bottom:1rem;margin-top:1rem;text-align:center">Clarify: <button class="clarify-btn" data-topic="confirmed">Confirmed Swing</button></p>
<div class="btn-row"><button class="btn-primary" id="s3-to-s4" style="opacity:0;transition:opacity .5s ease" disabled>Continue to Section IV</button></div>`;
        }

        function initS3Animation() {
            drawBaseChart('chart-s3', 'turns');
            const outer = document.getElementById('outer-chart-s3'); if (!outer) return;
            const canvas = document.getElementById('chart-s3'); if (!canvas) return;
            const W = canvas.clientWidth, H = canvas.clientHeight;
            const n = CANDLES.length, slotW = W / n;
            const padT = 10, padB = 10, chartH = H - padT - padB;
            const toY = pct => padT + (1 - pct / 100) * chartH;

            // Create SVG for animation
            const existing = outer.querySelector('.s3-svg'); if (existing) existing.remove();
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
            svg.className = 's3-svg';
            outer.appendChild(svg);

            const statusEl = document.getElementById('s3-status');
            const continueBtn = document.getElementById('s3-to-s4');

            // Phase 1: show open circles (potential) for first 3 swings
            const targets = SWINGS.slice(0, 4);
            const circles = [];

            function phase1() {
                if (statusEl) { statusEl.style.opacity = '0'; setTimeout(() => { statusEl.textContent = '○  Potential swings forming…'; statusEl.style.opacity = '1'; }, 200); }
                targets.forEach((sw, idx) => {
                    setTimeout(() => {
                        if (!document.getElementById('chart-s3')) return;
                        const x = sw.index * slotW + slotW / 2;
                        const y = toY(sw.pct);
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', '5');
                        circle.setAttribute('fill', 'none');
                        circle.setAttribute('stroke', 'rgba(200,185,130,0.72)');
                        circle.setAttribute('stroke-width', '1.5');
                        circle.style.opacity = '0'; circle.style.transition = 'opacity 0.4s ease';
                        svg.appendChild(circle);
                        circles.push(circle);
                        requestAnimationFrame(() => { requestAnimationFrame(() => { circle.style.opacity = '1'; }); });
                        // After last potential marker: pause 400ms, then show "movement continues" status, then fill
                        if (idx === targets.length - 1) setTimeout(phase1b, 600);
                    }, idx * 380);
                });
            }

            function phase1b() {
                if (!document.getElementById('chart-s3')) return;
                if (statusEl) { statusEl.style.opacity = '0'; setTimeout(() => { statusEl.textContent = '→  Movement continues in the opposite direction…'; statusEl.style.opacity = '1'; }, 200); }
                setTimeout(phase2, 420);
            }

            function phase2() {
                if (!document.getElementById('chart-s3')) return;
                circles.forEach((circle, idx) => {
                    setTimeout(() => {
                        if (!document.getElementById('chart-s3')) return;
                        // Smooth fill transition via CSS transition on the element
                        circle.style.transition = 'opacity 0.4s ease';
                        circle.setAttribute('fill', 'rgba(200,185,130,0.88)');
                        circle.setAttribute('stroke', 'rgba(200,185,130,0.30)');
                        circle.setAttribute('r', '4.5');
                        if (idx === circles.length - 1) {
                            setTimeout(() => {
                                if (!document.getElementById('chart-s3')) return;
                                if (statusEl) { statusEl.style.opacity = '0'; setTimeout(() => { statusEl.textContent = '●  Swings confirmed.'; statusEl.style.opacity = '1'; }, 200); }
                                const btn = document.getElementById('s3-to-s4');
                                if (btn) { btn.style.opacity = '1'; btn.disabled = false; }
                            }, 350);
                        }
                    }, idx * 220);
                });
            }

            setTimeout(phase1, 300);
        }

        function buildS4() {
            return `<p class="scr-eyebrow">Section IV &mdash; Swings Build Structure</p>
<div class="ms-chart-outer" id="outer-chart-s4"><canvas class="ms-chart-canvas" id="chart-s4"></canvas></div>
<div class="scr-body" style="margin-top:.9rem;text-align:center">
<p>Swings connect to form structure.</p>
<p style="margin-top:.55rem">Structure is organized swings.</p>
</div>
<div class="btn-row"><button class="btn-primary" id="s4-to-s5">Continue to Section V</button></div>`;
        }

        /* ═══ SECTION V — SIMULATION ═══ */
        const SIM_TASKS = [
            { instruction: 'Tap the swing high.', type: 'high', targetIndex: 0 },
            { instruction: 'Tap the swing low.', type: 'low', targetIndex: 0 },
            { instruction: 'Tap the next swing high.', type: 'high', targetIndex: 1 }
        ];

        function buildS5() {
            if (STATE.sim.done) {
                return `<p class="scr-eyebrow">Section V &mdash; Swing Identification</p>
<div style="text-align:center;padding:1.5rem 0">
<div style="font-size:1.4rem;color:var(--m-green-txt);margin-bottom:.75rem">&#10003;</div>
<p style="font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:600;color:var(--m-txt);margin-bottom:.4rem">All swings identified.</p>
<p class="scr-body" style="max-width:320px;margin:0 auto">You can read movement and locate the swings.</p>
</div>
<div class="btn-row" style="justify-content:center"><button class="btn-primary" id="s5-to-s6">Continue to Section VI</button></div>`;
            }
            const task = SIM_TASKS[STATE.sim.task];
            return `<p class="scr-eyebrow">Section V &mdash; Swing Identification</p>
<div class="sim-task"><div class="task-label">Task ${STATE.sim.task + 1} of ${SIM_TASKS.length}</div>${task.instruction}</div>
<div class="sim-chart-wrap ms-chart-outer" id="outer-chart-s5" style="cursor:crosshair"><canvas class="ms-chart-canvas" id="chart-s5"></canvas></div>
<div class="sim-feedback" id="sim-feedback"></div>`;
        }

        function getSimTargets() {
            const highs = SWINGS.filter(s => s.type === 'high');
            const lows = SWINGS.filter(s => s.type === 'low');
            return { highs, lows };
        }

        function initSimulation() {
            drawBaseChart('chart-s5', 'swings');
            renderSwingDots('chart-s5', 'dot');
            const outer = document.getElementById('outer-chart-s5'); if (!outer) return;
            const canvas = document.getElementById('chart-s5'); if (!canvas) return;
            const W = canvas.clientWidth, H = canvas.clientHeight;
            const n = CANDLES.length, slotW = W / n;
            const padT = 10, padB = 10, chartH = H - padT - padB;
            const toY = pct => padT + (1 - pct / 100) * chartH;
            const { highs, lows } = getSimTargets();

            const task = SIM_TASKS[STATE.sim.task];
            const pool = task.type === 'high' ? highs : lows;
            const target = pool[task.targetIndex] || pool[0];
            const targetX = target.index * slotW + slotW / 2;
            const targetY = toY(target.pct);
            const HIT_RADIUS = 44;
            const PREVIEW_RADIUS = 64;

            // --- Hover preview marker ---
            let hoverSvg = null;
            let hoverCircle = null;
            let hoverActive = false;

            function createHoverSvg() {
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
                svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:8';
                svg.className = 'sim-hover-svg';
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', targetX); c.setAttribute('cy', targetY); c.setAttribute('r', '6');
                c.setAttribute('fill', 'none');
                c.setAttribute('stroke', 'rgba(200,185,130,0.55)');
                c.setAttribute('stroke-width', '1.5');
                c.style.cssText = 'opacity:0;transition:opacity 0.22s ease';
                svg.appendChild(c);
                hoverCircle = c;
                outer.appendChild(svg);
                return svg;
            }

            hoverSvg = createHoverSvg();

            function onSimMouseMove(e) {
                const rect = outer.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const dist = Math.hypot(mx - targetX, my - targetY);
                const near = dist <= PREVIEW_RADIUS;
                if (near && !hoverActive) {
                    hoverActive = true;
                    if (hoverCircle) hoverCircle.style.opacity = '0.4';
                } else if (!near && hoverActive) {
                    hoverActive = false;
                    if (hoverCircle) hoverCircle.style.opacity = '0';
                }
            }

            outer.addEventListener('mousemove', onSimMouseMove);

            // --- Click handler ---
            function onSimClick(e) {
                const rect = outer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                const dist = Math.hypot(clickX - targetX, clickY - targetY);
                const feedback = document.getElementById('sim-feedback');

                outer.removeEventListener('click', onSimClick);
                outer.removeEventListener('mousemove', onSimMouseMove);
                if (hoverCircle) hoverCircle.style.opacity = '0';

                if (dist <= HIT_RADIUS) {
                    // Correct — fill the preview circle to confirmed state
                    if (feedback) { feedback.className = 'sim-feedback correct'; feedback.textContent = 'Correct \u2014 swing ' + (task.type === 'high' ? 'high' : 'low') + ' identified.'; }
                    addSimMarker(outer, targetX, targetY, 'rgba(120,210,160,0.92)', false);
                    setTimeout(() => {
                        STATE.sim.task++;
                        if (STATE.sim.task >= SIM_TASKS.length) { STATE.sim.done = true; }
                        renderScreen();
                    }, 900);
                } else {
                    // Incorrect — brief red highlight at click location, then reset
                    if (feedback) { feedback.className = 'sim-feedback incorrect'; feedback.textContent = 'Not quite — try again.'; }
                    addSimMarker(outer, clickX, clickY, 'rgba(220,100,80,0.70)', true);
                    setTimeout(() => {
                        const errSvg = outer.querySelector('.sim-marker'); if (errSvg) errSvg.style.opacity = '0';
                        setTimeout(() => {
                            const errSvg2 = outer.querySelector('.sim-marker'); if (errSvg2) errSvg2.remove();
                            if (feedback) { feedback.className = 'sim-feedback'; feedback.textContent = ''; }
                            // Reinstate hover + click
                            outer.addEventListener('mousemove', onSimMouseMove);
                            outer.addEventListener('click', onSimClick);
                        }, 200);
                    }, 300);
                }
            }

            outer.addEventListener('click', onSimClick);
        }

        function addSimMarker(outer, x, y, color, isError) {
            const existing = outer.querySelector('.sim-marker'); if (existing) existing.remove();
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            const canvas = outer.querySelector('canvas');
            const W = canvas ? canvas.clientWidth : outer.clientWidth;
            const H = canvas ? canvas.clientHeight : outer.clientHeight;
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;transition:opacity 0.2s ease';
            svg.className = 'sim-marker';
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', isError ? '5' : '6');
            circle.setAttribute('fill', color);
            circle.setAttribute('stroke', isError ? 'rgba(255,160,140,0.4)' : 'rgba(255,255,255,0.25)');
            circle.setAttribute('stroke-width', '1.5');
            svg.appendChild(circle);
            svg.style.opacity = '0';
            outer.appendChild(svg);
            requestAnimationFrame(() => { requestAnimationFrame(() => { svg.style.opacity = '1'; }); });
        }

        function buildS6() {
            return `<p class="scr-eyebrow">Section VI &mdash; Principle</p>
<div class="principle-card">
<p class="principle-text">Swings reveal structure.</p>
</div>
<div class="btn-row"><button class="btn-primary" id="s6-to-s7">Continue to Competency Check</button></div>`;
        }

        /* ═══ SECTION VII — ASSESSMENT ═══ */
        const A_QUESTIONS = [
            { q: 'What creates a swing?', opts: ['Indicators', 'Movement changing direction', 'News events'], correct: 'Movement changing direction' },
            { q: 'A swing high forms when movement:', opts: ['Turns downward', 'Turns upward', 'Stops completely'], correct: 'Turns downward' },
            { q: 'A swing becomes confirmed when:', opts: ['Movement continues in the opposite direction', 'A candle closes', 'An indicator signals'], correct: 'Movement continues in the opposite direction' }
        ];
        const A_REVIEW = [
            { explanation: 'A swing is created by movement changing direction — not by indicators or external events.', clarifyTopic: 'turningpoints' },
            { explanation: 'A swing high marks a peak where movement turned from rising to falling. When movement turns downward, a swing high forms.', clarifyTopic: 'swingHighLow' },
            { explanation: 'Confirmation requires continued movement in the opposite direction, not just a single candle or indicator signal.', clarifyTopic: 'confirmed' }
        ];

        function buildS7() {
            if (STATE.assessment.isSubmitted) return buildResultScreen();
            const qi = STATE.assessment.currentQ;
            const q = A_QUESTIONS[qi];
            const userAns = STATE.assessment.answers[qi];
            const hasAnswer = userAns !== null && userAns !== undefined;
            const isLastQ = qi === A_QUESTIONS.length - 1;
            return `<p class="scr-eyebrow">Section VII &mdash; Competency Check</p>
<div class="assessment-prog">Question ${qi + 1} of ${A_QUESTIONS.length}</div>
<div class="assessment-q">${escHtml(q.q)}</div>
<div id="assessment-opts">
${q.opts.map(opt => `<button class="opt-btn${userAns === opt ? ' selected' : ''}" data-ans="${escAttr(opt)}">${escHtml(opt)}</button>`).join('')}
</div>
<div class="btn-row">
  ${isLastQ
                    ? `<button class="btn-primary" id="assess-submit" ${!hasAnswer ? 'disabled' : ''}>Submit Assessment</button>`
                    : `<button class="btn-primary" id="assess-next" ${!hasAnswer ? 'disabled' : ''}>Next</button>`}
</div>
${!hasAnswer ? `<p style="font-size:.75rem;color:var(--m-muted);margin-top:.75rem">Select an answer to continue.</p>` : ''}`;
        }

        function buildResultScreen() {
            const score = STATE.assessment.scorePercent;
            const passed = STATE.assessment.passed;
            const reviewBtn = `<button class="btn-ghost" id="result-review-answers" style="margin-top:.5rem">Review Answers</button>`;
            if (passed) {
                return `<div class="result-box">
<div style="font-size:2rem;color:var(--m-gold);margin-bottom:1rem">&#10003;</div>
<div class="result-title">Competency <span class="result-gold">Verified</span></div>
<div class="result-body">Swings reveal structure &mdash; understood.<br><span style="color:var(--m-gold);font-size:.85rem">Score: ${score}%</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:.5rem">
  <button class="btn-primary" id="result-return">Return to Market Structure</button>
  ${reviewBtn}
</div></div>`;
            }
            return `<div class="result-box">
<div style="font-size:2rem;color:var(--m-muted);margin-bottom:1rem">&#8635;</div>
<div class="result-title">Review Recommended</div>
<div class="result-body">Revisit the sections, then try again.<br><span style="color:var(--m-red-txt);font-size:.85rem">Score: ${score}%</span></div>
<div class="btn-row" style="justify-content:center"><button class="btn-ghost" id="result-retry">Retry Assessment</button></div>
<div style="margin-top:.75rem;text-align:center">${reviewBtn}</div>
</div>`;
        }

        function buildReviewAnswers() {
            const rows = A_QUESTIONS.map((q, i) => {
                const userAns = STATE.assessment.answers[i];
                const correct = userAns === q.correct;
                const rv = A_REVIEW[i];
                const icon = correct ? '&#10003;' : '&#10007;';
                const iconColor = correct ? 'var(--m-green-txt)' : 'var(--m-red-txt)';
                return `<div style="background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:6px;padding:1rem 1.1rem;margin-bottom:.85rem">
<p style="font-size:.8rem;font-weight:600;letter-spacing:.04em;color:var(--m-gold);margin-bottom:.6rem">Q${i + 1}</p>
<p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.75rem;line-height:1.5">${escHtml(q.q)}</p>
<p style="font-size:.82rem;margin-bottom:.3rem"><span style="color:${iconColor};font-weight:700;margin-right:.35rem">${icon}</span><span style="color:var(--m-muted)">Your answer:</span> <span style="color:var(--m-txt)">${escHtml(userAns || '(no answer)')}</span></p>
<p style="font-size:.82rem;color:var(--m-muted);margin-bottom:.75rem">Correct answer: <span style="color:var(--m-txt);font-weight:500">${escHtml(q.correct)}</span></p>
<p style="font-size:.82rem;color:var(--m-muted);line-height:1.55;margin-bottom:.65rem">${rv.explanation}</p>
<button class="clarify-btn" data-topic="${rv.clarifyTopic}">Clarify</button>
</div>`;
            }).join('');
            return `<p class="scr-eyebrow">Section VII &mdash; Review Answers</p>
<h2 class="scr-h2">Assessment Breakdown</h2>${rows}
<div class="btn-row"><button class="btn-ghost" id="review-back-results">Back to Results</button></div>`;
        }

        /* ═══ SCORE ═══ */
        function computeScore() {
            let correct = 0;
            A_QUESTIONS.forEach((q, i) => { if (STATE.assessment.answers[i] === q.correct) correct++; });
            const pct = Math.round((correct / A_QUESTIONS.length) * 100);
            STATE.assessment.scorePercent = pct;
            STATE.assessment.passed = pct >= 67;
            STATE.assessment.isSubmitted = true;
            if (STATE.assessment.passed) {
                STATE.verified = true;
                try {
                    const saved = JSON.parse(localStorage.getItem('pp_ms_modules') || '{}');
                    saved['3.2'] = { verified: true, mastery: pct, mastery_percent: pct, status: 'Verified', progress: 100 };
                    localStorage.setItem('pp_ms_modules', JSON.stringify(saved));
                } catch (e) { }
            }
            updateProgress();
        }

        /* ═══ HANDLERS ═══ */
        function attachHandlers() {
            const $ = id => document.getElementById(id);
            const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

            on('begin-btn', 'click', () => goToSection(1, 0));
            on('s1-to-s2', 'click', () => goToSection(2, 0));
            on('s2-to-s3', 'click', () => goToSection(3, 0));
            on('s3-to-s4', 'click', () => goToSection(4, 0));
            on('s4-to-s5', 'click', () => goToSection(5, 0));
            on('s5-to-s6', 'click', () => goToSection(6, 0));
            on('s6-to-s7', 'click', () => goToSection(7, 0));

            document.querySelectorAll('[data-ans]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (STATE.assessment.isSubmitted) return;
                    const qi = STATE.assessment.currentQ;
                    STATE.assessment.answers[qi] = STATE.assessment.answers[qi] === btn.dataset.ans ? null : btn.dataset.ans;
                    renderScreen();
                });
            });
            on('assess-next', 'click', () => {
                if (STATE.assessment.answers[STATE.assessment.currentQ] == null) return;
                STATE.assessment.currentQ++; renderScreen();
            });
            on('assess-submit', 'click', () => {
                if (STATE.assessment.answers[STATE.assessment.currentQ] == null) return;
                computeScore(); renderScreen();
            });
            on('result-return', 'click', () => { window.location.href = 'market-structure.html'; });
            on('result-retry', 'click', () => {
                STATE.assessment.answers = [null, null, null];
                STATE.assessment.isSubmitted = false; STATE.assessment.scorePercent = null;
                STATE.assessment.passed = null; STATE.assessment.currentQ = 0;
                STATE.showReview = false; renderScreen();
            });
            on('result-review-answers', 'click', () => { if (STATE.assessment.isSubmitted) { STATE.showReview = true; renderScreen(); } });
            on('review-back-results', 'click', () => { STATE.showReview = false; renderScreen(); });

            document.querySelectorAll('.clarify-btn').forEach(btn => {
                btn.addEventListener('click', () => openClarify(btn.dataset.topic));
            });
        }

        /* ═══ INIT ═══ */
        (function init() {
            STATE.navHistory = []; STATE.currentSectionId = 0; STATE.currentScreenIndex = 0;
            visit(0); renderNav(); renderScreen();
        })();
    </script>
</body>

</html>
