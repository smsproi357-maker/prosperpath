<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Module 3.5 - Pullbacks | ProsperPath Market Structure">
  <title>Pullbacks | ProsperPath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --m-bg: #0d0e10;
      --m-surf: #141618;
      --m-surf2: #18191c;
      --m-bdr: #1e2023;
      --m-bdrhi: #2e3035;
      --m-txt: #e0e1e3;
      --m-muted: #5e626a;
      --m-muted2: #3a3d44;
      --m-gold: #a07c2e;
      --m-gold-dim: rgba(160, 124, 46, .13);
      --m-gold-line: rgba(160, 124, 46, .38);
      --m-green-txt: #7ed8a8;
      --m-red-txt: #e08070;
      --m-tr: 150ms ease
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--m-bg);
      color: var(--m-txt);
      font-family: 'Inter', sans-serif;
      min-height: 100vh
    }

    #ai-chat-fab,
    .ai-fab-btn,
    .floating-action-btn,
    [class*="fab"],
    [id*="fab"] {
      display: none !important
    }

    #module-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.25rem;
      border-bottom: 1px solid var(--m-bdr);
      background: var(--m-surf);
      flex-shrink: 0;
      gap: 1rem
    }

    #topbar-left {
      display: flex;
      align-items: center;
      gap: .75rem
    }

    #back-btn {
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-size: .78rem;
      padding: .38rem .85rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    #back-btn:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    #topbar-title {
      font-family: \'Outfit\', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      color: var(--m-txt)
    }

    #progress-label {
      font-size: .75rem;
      color: var(--m-muted);
      letter-spacing: .04em;
      white-space: nowrap
    }

    #progress-bar-wrap {
      width: 80px;
      height: 2px;
      background: var(--m-bdr);
      border-radius: 1px;
      overflow: hidden
    }

    #progress-bar-fill {
      height: 100%;
      background: var(--m-gold);
      border-radius: 1px;
      transition: width .4s ease
    }

    #shell-body {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    #section-nav {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--m-bdr);
      background: var(--m-surf);
      overflow-y: auto;
      padding: 1rem 0
    }

    .sn-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem 1rem;
      font-size: .75rem;
      color: var(--m-muted);
      cursor: pointer;
      transition: color var(--m-tr), background var(--m-tr);
      border-left: 2px solid transparent;
      line-height: 1.3
    }

    .sn-item:hover {
      color: var(--m-txt);
      background: rgba(255, 255, 255, .025)
    }

    .sn-item.visited {
      color: var(--m-txt)
    }

    .sn-item.current {
      color: var(--m-gold);
      border-left-color: var(--m-gold);
      background: var(--m-gold-dim)
    }

    .sn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--m-muted2);
      flex-shrink: 0;
      transition: background var(--m-tr)
    }

    .sn-item.visited .sn-dot {
      background: var(--m-muted)
    }

    .sn-item.current .sn-dot {
      background: var(--m-gold)
    }

    #main-stage {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem
    }

    .screen {
      width: 100%;
      max-width: 640px;
      animation: fadeIn .2s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .scr-eyebrow {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m-muted);
      margin-bottom: 1.2rem
    }

    .scr-h1 {
      font-family: \'Outfit\', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--m-txt);
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: .75rem
    }

    .scr-body {
      font-size: .95rem;
      color: var(--m-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem
    }

    .scr-body p {
      margin-bottom: .55rem
    }

    .scr-body p:last-child {
      margin-bottom: 0
    }

    .scr-meta {
      font-size: .78rem;
      color: var(--m-muted);
      letter-spacing: .04em;
      margin-bottom: 2rem
    }

    .chart-box {
      position: relative;
      margin: 1.25rem 0;
      background: var(--m-surf2);
      border: 1px solid var(--m-bdr);
      border-radius: 4px;
      overflow: hidden;
      height: 220px
    }

    .chart-box svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%
    }

    .principle-card {
      background: var(--m-surf2);
      border: 1px solid var(--m-bdrhi);
      border-radius: 8px;
      padding: 3.5rem 2rem;
      text-align: center;
      margin: 1.5rem 0;
      animation: pfade .7s ease both
    }

    @keyframes pfade {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .principle-text {
      font-family: \'Outfit\', sans-serif;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 700;
      color: var(--m-txt);
      letter-spacing: -.02em;
      line-height: 1.25
    }

    .btn-primary {
      background: transparent;
      border: 1px solid var(--m-gold-line);
      color: var(--m-gold);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .65rem 1.5rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      margin-right: .6rem
    }

    .btn-primary:hover {
      background: var(--m-gold-dim);
      border-color: var(--m-gold)
    }

    .btn-primary:disabled {
      opacity: .42;
      cursor: not-allowed
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .04em;
      padding: .62rem 1.2rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    .btn-ghost:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-top: 1.75rem
    }

    .opt-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-txt);
      font-family: 'Inter', sans-serif;
      font-size: .875rem;
      text-align: left;
      padding: .75rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: .5rem;
      transition: border-color var(--m-tr), background var(--m-tr)
    }

    .opt-btn:hover {
      border-color: var(--m-bdrhi);
      background: rgba(255, 255, 255, .025)
    }

    .opt-btn.selected {
      border-color: var(--m-gold-line);
      background: var(--m-gold-dim);
      color: var(--m-gold)
    }

    .opt-btn:disabled {
      cursor: default
    }

    .assessment-prog {
      font-size: .72rem;
      color: var(--m-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 1.5rem
    }

    .assessment-q {
      font-size: 1rem;
      color: var(--m-txt);
      margin-bottom: 1.25rem;
      line-height: 1.55
    }

    .result-box {
      text-align: center;
      padding: 2rem 1rem
    }

    .result-title {
      font-family: \'Outfit\', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--m-txt);
      margin-bottom: .5rem
    }

    .result-gold {
      color: var(--m-gold)
    }

    .result-body {
      font-size: .9rem;
      color: var(--m-muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto
    }

    #clarify-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 900;
      display: none;
      align-items: flex-start;
      justify-content: flex-end
    }

    #clarify-overlay.open {
      display: flex
    }

    #clarify-panel {
      width: 340px;
      max-width: 90vw;
      height: 100%;
      background: #16181b;
      border-left: 1px solid var(--m-bdr);
      overflow-y: auto;
      padding: 2rem 1.5rem;
      animation: slideInRight .22s ease
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    .cp-term {
      font-family: \'Outfit\', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--m-txt);
      margin-bottom: .25rem
    }

    .cp-section {
      margin-top: 1.25rem
    }

    .cp-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m-muted);
      margin-bottom: .4rem
    }

    .cp-text {
      font-size: .85rem;
      color: var(--m-muted);
      line-height: 1.55
    }

    .cp-text strong {
      color: var(--m-txt);
      font-weight: 500
    }

    #cp-close {
      margin-top: 2rem;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      padding: .5rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    #cp-close:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    .nav-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      padding: .36rem .7rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: .75rem
    }

    .sim-task {
      background: var(--m-surf2);
      border: 1px solid var(--m-bdrhi);
      border-radius: 4px;
      padding: .75rem 1rem;
      margin-bottom: .85rem;
      font-size: .9rem;
      color: var(--m-txt);
      line-height: 1.45
    }

    .sim-task .task-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m-gold);
      margin-bottom: .3rem
    }

    .sim-fb {
      min-height: 2rem;
      font-size: .85rem;
      padding: .5rem 0
    }

    .sim-fb.ok {
      color: var(--m-green-txt)
    }

    .sim-fb.err {
      color: var(--m-red-txt)
    }

    .dir-btns {
      display: flex;
      gap: .6rem;
      margin-top: .85rem;
      flex-wrap: wrap
    }

    .dir-btn {
      flex: 1;
      min-width: 90px;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      padding: .65rem .8rem;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color var(--m-tr), color var(--m-tr), background var(--m-tr)
    }

    .dir-btn:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt);
      background: rgba(255, 255, 255, .025)
    }

    .clarify-btn {
      background: none;
      border: none;
      color: var(--m-gold);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
      font-family: 'Inter', sans-serif
    }

    @media(max-width:700px) {
      #section-nav {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 800;
        transform: translateX(-100%);
        transition: transform .3s ease;
        width: 240px
      }

      #section-nav.open {
        transform: translateX(0)
      }

      #nav-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .5);
        z-index: 799;
        display: none
      }

      #nav-backdrop.open {
        display: block
      }

      #clarify-panel {
        width: 100%;
        height: 60vh;
        border-left: none;
        border-top: 1px solid var(--m-bdr);
        position: fixed;
        bottom: 0;
        left: 0
      }

      #clarify-overlay {
        align-items: flex-end;
        justify-content: center
      }

      #main-stage {
        padding: 1.5rem 1rem
      }

      .nav-toggle {
        display: inline-flex;
        align-items: center;
        gap: .4rem
      }
    }
  </style>
</head>

<body>
  <div id="module-shell">
    <div id="topbar">
      <div id="topbar-left">
        <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNav()" aria-label="Open sections">&#9776;
          Sections</button>
        <button id="back-btn" onclick="goBack()">&#8592; Market Structure</button>
        <span id="topbar-title">Pullbacks</span>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span id="progress-label">Progress 0%</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div id="nav-backdrop" onclick="toggleNav()"></div>
    <div id="shell-body">
      <nav id="section-nav" aria-label="Module sections">
        <div id="sn-items"></div>
      </nav>
      <main id="main-stage">
        <div class="screen" id="sc"></div>
      </main>
    </div>
  </div>
  <div id="clarify-overlay" onclick="if(event.target===this)closeClarify()" role="dialog" aria-modal="true">
    <div id="clarify-panel">
      <div class="cp-term" id="cp-term"></div>
      <div class="cp-section">
        <div class="cp-label">Explanation</div>
        <div class="cp-text" id="cp-exp"></div>
      </div>
      <div class="cp-section">
        <div class="cp-label">Example</div>
        <div class="cp-text" id="cp-ex"></div>
      </div>
      <div class="cp-section">
        <div class="cp-label">Common Misconception</div>
        <div class="cp-text" id="cp-misc"></div>
      </div>
      <button id="cp-close" onclick="closeClarify()">Close</button>
    </div>
  </div>
  <script src="script.js?v=m34"></script>
  <script src="ai-widget.js"></script>
  <script src="google-auth.js"></script>
  <script>
    window.addEventListener('load', function () { if (typeof initGoogleAuth === 'function') initGoogleAuth(); });
    var ST = {
      sid: 0, si: 0, visited: new Set(), lastSI: {}, hist: [],
      assess: { ans: [null, null, null], submitted: false, score: null, passed: null, q: 0 },
      review: false, verified: false,
      sim: { task: 0, done: false }
    };
    var SECS = [
      { id: 0, label: 'Entry' },
      { id: 1, label: 'Section I — Impulse and Pullback' },
      { id: 2, label: 'Section II — Why Pullbacks Form' },
      { id: 3, label: 'Section III — Pullbacks Inside Trends' },
      { id: 4, label: 'Section IV — Pullback Completion' },
      { id: 5, label: 'Section V — Recognition Simulation' },
      { id: 6, label: 'Section VI — Principle' },
      { id: 7, label: 'Section VII — Competency Check' }
    ];
    function pct() {
      var v = [...ST.visited].filter(function (x) { return x >= 1 && x <= 7; });
      var p = Math.round((Math.min(v.length, 7) / 7) * 85);
      if (ST.assess.score !== null && ST.assess.score > 0 && !ST.assess.passed) p = Math.max(p, 90);
      if (ST.assess.passed) p = 100;
      return p;
    }
    function updProg() { var p = pct(); document.getElementById('progress-label').textContent = 'Progress ' + p + '%'; document.getElementById('progress-bar-fill').style.width = p + '%'; }
    function visit(id) { if (!ST.visited.has(id)) { ST.visited.add(id); updProg(); } renderNav(); }
    function goTo(id, si, push) {
      var max = ST.visited.size > 0 ? Math.max(...[...ST.visited]) : 0;
      if (!(ST.visited.has(id) || id <= max + 1 || id === 0)) return;
      if (push !== false) ST.hist.push({ sid: ST.sid, si: ST.si });
      ST.lastSI[ST.sid] = ST.si; ST.sid = id; ST.si = (si != null) ? si : 0; ST.review = false;
      visit(id); renderNav(); render();
      var n = document.getElementById('section-nav'); if (n.classList.contains('open')) toggleNav();
    }
    function goBack() {
      if (ST.review) { ST.review = false; render(); return; }
      if (ST.hist.length > 0) { var p = ST.hist.pop(); ST.lastSI[ST.sid] = ST.si; ST.sid = p.sid; ST.si = p.si; ST.review = false; visit(p.sid); renderNav(); render(); return; }
      window.location.href = 'market-structure.html';
    }
    function toggleNav() { document.getElementById('section-nav').classList.toggle('open'); document.getElementById('nav-backdrop').classList.toggle('open'); }
    function renderNav() {
      var c = document.getElementById('sn-items'); c.innerHTML = '';
      SECS.forEach(function (s) {
        if (s.id === 0) return;
        var cur = ST.sid === s.id, vis = ST.visited.has(s.id);
        var max = ST.visited.size > 0 ? Math.max(...[...ST.visited]) : 0;
        var ok = vis || s.id <= max + 1;
        var d = document.createElement('div');
        d.className = 'sn-item' + (cur ? ' current' : '') + (vis ? ' visited' : '');
        d.setAttribute('tabindex', ok ? '0' : '-1'); d.setAttribute('role', 'button');
        d.innerHTML = '<span class="sn-dot"></span><span>' + s.label + '</span>';
        if (ok) {
          d.onclick = function () { var l = ST.lastSI[s.id]; goTo(s.id, l != null ? l : 0); };
          d.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { var l = ST.lastSI[s.id]; goTo(s.id, l != null ? l : 0); } };
        } else { d.style.opacity = '.35'; d.style.cursor = 'not-allowed'; }
        c.appendChild(d);
      });
    }
    var CD = {
      impulse: {
        term: 'Impulse',
        explanation: 'The stronger move that pushes in the direction of the trend.',
        example: 'In an uptrend, the move from a Higher Low to a Higher High is an impulse.',
        misc: '<strong>"Impulse means a random fast move."</strong> Not exactly. An impulse is directional expansion that moves with the trend structure.'
      },
      pullback: {
        term: 'Pullback',
        explanation: 'A temporary move against the trend that retraces part of the prior impulse.',
        example: 'In an uptrend, price may rise strongly, then pull back before continuing upward.',
        misc: '<strong>"A pullback means the trend is reversing."</strong> Not necessarily. Pullbacks are a normal part of healthy trends while structure still holds.'
      },
      retracement: {
        term: 'Retracement',
        explanation: 'A partial move back into the prior trend move.',
        example: 'After a strong upward impulse, price may retrace downward before continuing.',
        misc: '<strong>"Retracement means trend failure."</strong> No. A retracement only becomes failure if it breaks the structure level that should hold.'
      },
      higherlow: {
        term: 'Higher Low',
        explanation: 'A new low that forms above the previous structural low in an uptrend.',
        example: 'If price pulls back but holds above the previous low, that pullback may form a Higher Low.',
        misc: '<strong>"A Higher Low is just any candle low."</strong> No. It is a structural turning point, not just any small local dip.'
      },
      lowerhigh: {
        term: 'Lower High',
        explanation: 'A high that forms below the previous structural high in a downtrend.',
        example: 'In a downtrend, price may bounce upward, but if that bounce stays below the prior high, it forms a Lower High.',
        misc: '<strong>"A Lower High means the market is strong."</strong> No. In a downtrend, Lower Highs usually show that price is failing to regain strength.'
      },
      continuation: {
        term: 'Continuation',
        explanation: 'The trend resuming in its original direction after a pullback.',
        example: 'A pullback forms a Higher Low, then price pushes upward again to continue the trend.',
        misc: '<strong>"Continuation means price must move immediately."</strong> No. Continuation is the structural resumption of the trend, not necessarily an instant move.'
      }
    };
    function openClarify(k) {
      var d = CD[k]; if (!d) return;
      document.getElementById('cp-term').textContent = d.term;
      document.getElementById('cp-exp').textContent = d.explanation;
      document.getElementById('cp-ex').textContent = d.example;
      document.getElementById('cp-misc').innerHTML = d.misc;
      document.getElementById('clarify-overlay').classList.add('open');
      document.getElementById('cp-close').focus();
    }
    function closeClarify() { document.getElementById('clarify-overlay').classList.remove('open'); }
    function eH(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function eA(s) { return String(s).replace(/"/g, '&quot;'); }

    var VW = 600, VH = 220;
    function ln(pts, st, w, da) {
      var d = 'M' + pts.map(function (p) { return p.x + ',' + p.y; }).join(' L');
      return '<path d="' + d + '" stroke="' + st + '" stroke-width="' + w + '" fill="none" stroke-dasharray="' + da + '" stroke-linejoin="round" stroke-linecap="round"/>';
    }
    function dot(x, y, r, f, s, sw) { return '<circle cx="' + x + '" cy="' + y + '" r="' + r + '" fill="' + f + '" stroke="' + s + '" stroke-width="' + sw + '"/>'; }
    function lbl(x, y, t, sz, f, dy) { return '<text x="' + x + '" y="' + (y + (dy || 0)) + '" text-anchor="middle" font-size="' + sz + '" font-family="Inter,sans-serif" fill="' + f + '" font-weight="600" letter-spacing="0.06em">' + t + '</text>'; }
    function grid(w, h, step, c) { var s = '', y = step; while (y < h) { s += '<line x1="0" y1="' + y + '" x2="' + w + '" y2="' + y + '" stroke="' + c + '" stroke-width="1"/>'; y += step; } return s; }
    var GL = grid(VW, VH, 40, 'rgba(255,255,255,0.025)');

    // Impulse: full brightness, solid. Pullback: 65% brightness, dashed.
    var IMP_C = 'rgba(195,162,70,1.0)';
    var IMP_W = 2.2;
    var PB_C = 'rgba(195,162,70,0.42)';
    var PB_W = 1.6;

    // Nodes: always full brightness
    var N_IMP = 'rgba(200,185,130,0.92)';
    var N_PB = 'rgba(200,185,130,0.92)';
    var N_STR = 'rgba(200,185,130,0.28)';

    var FULL_T = [{ x: 60, y: 170 }, { x: 140, y: 100 }, { x: 220, y: 140 }, { x: 320, y: 60 }, { x: 400, y: 105 }, { x: 520, y: 30 }];
    var LBLS = ['HL', 'HH', 'HL', 'HH', 'HL', 'HH'];

    function bEntry() {
      var h = '<div style="text-align:center;padding:2rem 0">';
      h += '<p class="scr-eyebrow">ProsperPath &mdash; Market Structure</p>';
      h += '<h1 class="scr-h1">Pullbacks</h1>';
      h += '<p class="scr-body" style="max-width:320px;margin:0 auto 1rem">Trends do not move in straight lines.<br>They move through impulses and pullbacks.</p>';
      h += '<p class="scr-meta">Beginner &bull; Market Structure</p>';
      h += '<button class="btn-primary" id="begin-btn">Begin Module</button>';
      h += '</div>';
      return h;
    }

    function bS1() {
      var pts = FULL_T.slice(1, 4); // HH, HL, HH
      // Pullback: HH->HL (dashed, 65% brightness, slower fade)
      // Impulse: HL->HH (solid, full brightness, normal fade)
      var d1 = ln([pts[0], pts[1]], PB_C, PB_W, '6,5');  // pullback segment
      var d2 = ln([pts[1], pts[2]], IMP_C, IMP_W, '0');   // impulse segment

      // Nodes appear sequentially. Impulse speed: 400ms. Pullback speed: ~570ms.
      // pts[0]=HH(imp), pts[1]=HL(pb), pts[2]=HH(imp)
      var nodeDelays = [0, 400, 800]; // HH, HL, HH
      var ng = pts.map(function (p, i) {
        var isH = (i === 0 || i === 2);
        var fillc = isH ? N_IMP : N_PB;
        var lt = isH ? lbl(p.x, p.y - 14, LBLS[i + 1], 9, 'rgba(224,225,227,0.72)') : lbl(p.x, p.y + 20, LBLS[i + 1], 9, 'rgba(224,225,227,0.72)');
        // Impulse nodes fade at 1.0x (400ms), pullback node fades at 0.7x (570ms)
        var dur = isH ? '400ms' : '570ms';
        return '<g style="opacity:0;transition:opacity ' + dur + ' ease ' + nodeDelays[i] + 'ms" class="s1o">' + dot(p.x, p.y, 6, fillc, N_STR, 1.5) + lt + '</g>';
      }).join('');

      // Lines appear after nodes: pullback line at 1300ms, impulse line at 1700ms
      var l1 = '<g style="opacity:0;transition:opacity 570ms ease 1300ms" class="s1o">' + d1 + '</g>';
      var l2 = '<g style="opacity:0;transition:opacity 400ms ease 1700ms" class="s1o">' + d2 + '</g>';

      var svg = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none">' + GL + l1 + l2 + ng + '</svg>';
      var h = '<p class="scr-eyebrow">Section I &mdash; Impulse and Pullback</p>';
      h += '<div class="chart-box">' + svg + '</div>';
      h += '<div class="scr-body" style="margin-top:.9rem;text-align:center"><p>Trends move through two phases.</p><p><strong>Impulse moves</strong> expand the trend.<br><strong>Pullbacks</strong> retrace part of the trend move.</p></div>';
      h += '<p style="font-size:.8rem;color:var(--m-muted);margin:.85rem 0 1rem;text-align:center">Clarify: <button class="clarify-btn" data-topic="impulse">Impulse</button> &nbsp;&middot;&nbsp; <button class="clarify-btn" data-topic="pullback">Pullback</button></p>';
      h += '<div class="btn-row"><button class="btn-primary" id="s1n">Continue to Section II</button></div>';
      return h;
    }

    function initS1() { setTimeout(function () { document.querySelectorAll('.s1o').forEach(e => e.style.opacity = '1'); }, 40); }

    function bS2() {
      // HL -> HH (impulse) -> Retracement -> HL
      // pts[0]=HL, pts[1]=HH, pts[2]=Retracement(top of pullback), pts[3]=HL
      var pts = [{ x: 80, y: 180 }, { x: 260, y: 55 }, { x: 340, y: 55 }, { x: 460, y: 115 }];
      var l1 = ln([pts[0], pts[1]], IMP_C, IMP_W, '0');       // impulse: solid, full
      var l2 = ln([pts[1], pts[2]], PB_C, PB_W, '3,4');       // pause at top: dashed, dim
      var l3 = ln([pts[2], pts[3]], PB_C, PB_W, '6,5');       // retracement: dashed, dim

      var ng = pts.map(function (p, i) {
        // Labels: HL, HH, Retracement, HL
        var lb = i === 0 ? 'HL' : i === 1 ? 'HH' : i === 2 ? 'Retracement' : i === 3 ? 'HL' : '';
        var dy = i === 0 || i === 3 ? 20 : -16;
        // nodes always full brightness
        return dot(p.x, p.y, 5, N_IMP, N_STR, 1) + lbl(p.x, p.y, lb, 8, 'rgba(224,225,227,0.65)', dy);
      }).join('');
      var svg = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none">' + GL + l1 + l2 + l3 + ng + '</svg>';

      var h = '<p class="scr-eyebrow">Section II &mdash; Why Pullbacks Form</p>';
      h += '<div class="chart-box">' + svg + '</div>';
      h += '<div class="scr-body" style="margin-top:.9rem;text-align:center"><p>After strong moves, price often retraces.</p><p>These retracements help the trend continue forming structure.</p></div>';
      h += '<p style="font-size:.8rem;color:var(--m-muted);margin:.85rem 0 1rem;text-align:center">Clarify: <button class="clarify-btn" data-topic="retracement">Retracement</button></p>';
      h += '<div class="btn-row"><button class="btn-primary" id="s2n">Continue to Section III</button></div>';
      return h;
    }

    function bS3() {
      var segs = '';
      for (var i = 0; i < FULL_T.length - 1; i++) {
        var isImp = i % 2 === 0;
        segs += ln([FULL_T[i], FULL_T[i + 1]], isImp ? IMP_C : PB_C, isImp ? IMP_W : PB_W, isImp ? '0' : '6,5');
      }
      var ng = FULL_T.map(function (p, i) {
        var isH = (i % 2 === 1);
        var dy = isH ? -14 : 20;
        return dot(p.x, p.y, 6, isH ? N_IMP : N_PB, N_STR, 1.5) + lbl(p.x, p.y, LBLS[i], 9, 'rgba(224,225,227,0.72)', dy);
      }).join('');
      var svg = '<svg viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none">' + GL + segs + ng + '</svg>';

      var h = '<p class="scr-eyebrow">Section III &mdash; Pullbacks Inside Trends</p>';
      h += '<div class="chart-box">' + svg + '</div>';
      h += '<div class="scr-body" style="margin-top:.9rem;text-align:center"><p>Pullbacks create the higher lows and lower highs that form trends.</p></div>';
      h += '<p style="font-size:.8rem;color:var(--m-muted);margin:.85rem 0 1rem;text-align:center">Clarify: <button class="clarify-btn" data-topic="higherlow">Higher Low</button> &nbsp;&middot;&nbsp; <button class="clarify-btn" data-topic="lowerhigh">Lower High</button></p>';
      h += '<div class="btn-row"><button class="btn-primary" id="s3n">Continue to Section IV</button></div>';
      return h;
    }

    function bS4() {
      // Step 1: Show HH + pullback forming (dashed line going down). NO HL node yet.
      var pts = FULL_T.slice(1, 4); // HH=pts[0], HL=pts[1], HH=pts[2]
      var d1 = ln([pts[0], pts[1]], PB_C, PB_W, '6,5'); // pullback forming — dashed
      var n0 = dot(pts[0].x, pts[0].y, 6, N_IMP, N_STR, 1.5) + lbl(pts[0].x, pts[0].y, 'HH', 9, 'rgba(224,225,227,0.72)', -14);
      // Only HH node + dashed pullback line. HL is NOT shown.
      var svg = '<svg id="s4svg" viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' + GL + d1 + n0 + '</svg>';

      var h = '<p class="scr-eyebrow">Section IV &mdash; Pullback Completion</p>';
      h += '<div id="s4w" style="position:relative;margin:0 0 .85rem;background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:4px;overflow:hidden;height:220px">' + svg + '</div>';
      // Step 2: Prompt before reveal — learner must interact first
      h += '<div id="s4q" class="scr-body" style="margin-top:.9rem;text-align:center;min-height:3rem"><p style="color:var(--m-gold)">What does the pullback form?</p></div>';
      h += '<div class="btn-row"><button class="btn-primary" id="s4rev" onclick="s4Reveal()">Reveal</button><button class="btn-primary" id="s4n" style="display:none">Continue to Section V</button></div>';
      return h;
    }
    function s4Reveal() {
      // Step 3: HL node fades in AFTER button press
      document.getElementById('s4rev').style.display = 'none';
      document.getElementById('s4q').innerHTML = '<p><strong>Higher Low</strong></p><p style="margin-top:.5rem">Pullbacks often form a higher low before continuation.</p><p style="font-size:.8rem;color:var(--m-muted);margin-top:.6rem">Clarify: <button class="clarify-btn" data-topic="continuation" onclick="openClarify(\'continuation\')">Continuation</button></p>';

      var ns = 'http://www.w3.org/2000/svg';
      var w = document.getElementById('s4svg');
      if (!w) return;
      var pts = FULL_T.slice(1, 4); // pts[0]=HH, pts[1]=HL, pts[2]=HH

      // HL node — fades in first (1.1s duration)
      var p1 = document.createElementNS(ns, 'g');
      p1.innerHTML = dot(pts[1].x, pts[1].y, 6, N_IMP, N_STR, 1.5) + lbl(pts[1].x, pts[1].y, 'HL', 9, 'rgba(224,225,227,0.72)', 20);
      p1.style.opacity = '0';
      p1.style.transition = 'opacity 1.1s ease';
      w.appendChild(p1);

      // Continuation line — impulse, solid, draws upward after HL appears (1.3s duration)
      var l2 = document.createElementNS(ns, 'path');
      l2.setAttribute('d', 'M' + pts[1].x + ',' + pts[1].y + ' L' + pts[2].x + ',' + pts[2].y);
      l2.setAttribute('stroke', IMP_C);
      l2.setAttribute('stroke-width', IMP_W);
      l2.setAttribute('fill', 'none');
      l2.style.opacity = '0';
      l2.style.transition = 'opacity 1.3s ease';
      w.appendChild(l2);

      // HH node — appears after line draws (0.9s)
      var p2 = document.createElementNS(ns, 'g');
      p2.innerHTML = dot(pts[2].x, pts[2].y, 6, N_IMP, N_STR, 1.5) + lbl(pts[2].x, pts[2].y, 'HH', 9, 'rgba(224,225,227,0.72)', -14);
      p2.style.opacity = '0';
      p2.style.transition = 'opacity 0.9s ease';
      w.appendChild(p2);

      // Step 3: HL fades in (1.1s)
      setTimeout(function () { p1.style.opacity = '1'; }, 80);
      // Step 4: Continuation line draws upward slowly (after HL is visible)
      setTimeout(function () { l2.style.opacity = '1'; }, 900);
      // HH node appears after line
      setTimeout(function () { p2.style.opacity = '1'; }, 1800);
      // Show continue button after sequence
      setTimeout(function () { document.getElementById('s4n').style.display = 'inline-block'; }, 2400);
    }

    function bS5() {
      var task = ST.sim.task;
      if (ST.sim.done) {
        var h = '<p class="scr-eyebrow">Section V &mdash; Recognition Simulation</p>';
        h += '<div style="text-align:center;padding:1.5rem 0"><div style="font-size:1.4rem;color:var(--m-green-txt);margin-bottom:.75rem">&#10003;</div>';
        h += '<p style="font-family:\'Outfit\',sans-serif;font-size:1.1rem;font-weight:600;color:var(--m-txt);margin-bottom:.4rem">Pullback identified.</p>';
        h += '<p class="scr-body" style="max-width:360px;margin:0 auto">You can identify pullback phases and predict how they result in trend continuation.</p></div>';
        h += '<div class="btn-row" style="justify-content:center"><button class="btn-primary" id="s5n">Continue to Section VI</button></div>';
        return h;
      }

      var h = '<p class="scr-eyebrow">Section V &mdash; Recognition Simulation</p>';
      var pts = FULL_T.slice(0, 4); // HL, HH, HL, HH

      if (task === 0) {
        var segs = ln([pts[0], pts[1]], IMP_C, IMP_W, '0') + ln([pts[1], pts[2]], PB_C, PB_W, '6,5') + ln([pts[2], pts[3]], IMP_C, IMP_W, '0');
        var ng = pts.map((p, i) => dot(p.x, p.y, 6, i % 2 === 1 ? N_IMP : N_PB, N_STR, 1.5) + lbl(p.x, p.y, LBLS[i], 9, '#cfd0d2', i === 1 || i === 3 ? -14 : 20)).join('');
        var svg = '<svg id="s5svg" viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' + GL + segs + ng + '</svg>';

        h += '<div class="sim-task"><div class="task-label">Task 1 of 3</div>Tap the pullback area.</div>';
        h += '<div id="s5w" style="position:relative;margin:0 0 .85rem;background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:4px;overflow:hidden;height:220px;cursor:crosshair">' + svg + '</div>';
        h += '<div class="sim-fb" id="sfb"></div>';
      } else if (task === 1) {
        // Highlighted segment: pts[1] to pts[2] (HH to HL = Pullback)
        var segs = ln([pts[0], pts[1]], 'rgba(195,162,70,0.2)', IMP_W, '0') + ln([pts[1], pts[2]], 'rgba(255,255,255,0.9)', 2.5, '0') + ln([pts[2], pts[3]], 'rgba(195,162,70,0.2)', IMP_W, '0');
        var ng = pts.map((p, i) => dot(p.x, p.y, 6, i % 2 === 1 ? N_IMP : N_PB, N_STR, 1.5) + lbl(p.x, p.y, LBLS[i], 9, '#cfd0d2', i === 1 || i === 3 ? -14 : 20)).join('');
        var svg = '<svg id="s5svg" viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' + GL + segs + ng + '</svg>';

        h += '<div class="sim-task"><div class="task-label">Task 2 of 3</div>Is the highlighted segment an impulse or a pullback?</div>';
        h += '<div id="s5w" style="position:relative;margin:0 0 .85rem;background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:4px;overflow:hidden;height:220px">' + svg + '</div>';
        h += '<div class="dir-btns"><button class="dir-btn" onclick="doPick(\'impulse\')">Impulse</button><button class="dir-btn" onclick="doPick(\'pullback\')">Pullback</button></div>';
        h += '<div class="sim-fb" id="sfb"></div>';
      } else if (task === 2) {
        // Task 3: HH shown + pullback forming (dashed) — NO HL node yet
        // Learner must predict what is FORMING, not what formed
        var t3pts = FULL_T.slice(1, 4); // HH=t3pts[0], HL=t3pts[1], HH=t3pts[2]
        var segs = ln([t3pts[0], t3pts[1]], PB_C, PB_W, '6,5'); // only pullback so far
        var ng = dot(t3pts[0].x, t3pts[0].y, 6, N_IMP, N_STR, 1.5) + lbl(t3pts[0].x, t3pts[0].y, 'HH', 9, '#cfd0d2', -14);
        // No HL node — it hasn't formed yet
        var svg = '<svg id="s5svg" viewBox="0 0 ' + VW + ' ' + VH + '" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' + GL + segs + ng + '</svg>';

        h += '<div class="sim-task"><div class="task-label">Task 3 of 3</div>What structure is most likely forming?</div>';
        h += '<div id="s5w" style="position:relative;margin:0 0 .85rem;background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:4px;overflow:hidden;height:220px">' + svg + '</div>';
        h += '<div class="dir-btns"><button class="dir-btn" onclick="doPred(\'hh\')">Higher High</button><button class="dir-btn" onclick="doPred(\'hl\')">Higher Low</button><button class="dir-btn" onclick="doPred(\'ll\')">Lower Low</button></div>';
        h += '<div class="sim-fb" id="sfb"></div>';
      }
      return h;
    }

    function doPick(ans) {
      var fb = document.getElementById('sfb');
      if (ans === 'pullback') {
        if (fb) { fb.className = 'sim-fb ok'; fb.textContent = 'Correct. Moving against the primary trend to form a higher low is a pullback.'; }
        setTimeout(function () { ST.sim.task = 2; render(); }, 1100);
      } else {
        if (fb) { fb.className = 'sim-fb err'; fb.textContent = 'Not quite. An impulse expands the trend. This is retracing.'; }
        setTimeout(() => fb.textContent = '', 1500);
      }
    }

    function doPred(ans) {
      var fb = document.getElementById('sfb');
      if (ans === 'hl') {
        // Correct: reveal HL node, then extend faint projected line toward next HH
        if (fb) { fb.className = 'sim-fb ok'; fb.textContent = 'Correct. Pullbacks often form higher lows before continuation.'; }
        document.querySelectorAll('.dir-btn').forEach(b => b.disabled = true);

        var w = document.getElementById('s5svg');
        if (w) {
          var ns = 'http://www.w3.org/2000/svg';
          var t3pts = FULL_T.slice(1, 4); // HH=t3pts[0], HL=t3pts[1], HH=t3pts[2]

          // 1. HL node appears
          var hlNode = document.createElementNS(ns, 'g');
          hlNode.innerHTML = dot(t3pts[1].x, t3pts[1].y, 6, N_IMP, N_STR, 1.5) + lbl(t3pts[1].x, t3pts[1].y, 'HL', 9, '#cfd0d2', 20);
          hlNode.style.opacity = '0'; hlNode.style.transition = 'opacity 0.8s ease';
          w.appendChild(hlNode);

          // 2. Faint projected line extending toward next HH (dashed, subtle)
          var proj = document.createElementNS(ns, 'path');
          proj.setAttribute('d', 'M' + t3pts[1].x + ',' + t3pts[1].y + ' L' + t3pts[2].x + ',' + t3pts[2].y);
          proj.setAttribute('stroke', 'rgba(195,162,70,0.28)');
          proj.setAttribute('stroke-width', '1.5');
          proj.setAttribute('stroke-dasharray', '4,5');
          proj.setAttribute('fill', 'none');
          proj.style.opacity = '0'; proj.style.transition = 'opacity 1.0s ease';
          w.appendChild(proj);

          setTimeout(function () { hlNode.style.opacity = '1'; }, 200);
          setTimeout(function () { proj.style.opacity = '1'; }, 900);
        }
        setTimeout(function () { ST.sim.done = true; render(); }, 2200);
      } else {
        if (fb) { fb.className = 'sim-fb err'; fb.textContent = 'Not quite. During a pullback in an uptrend, a higher low is the expected completion point.'; }
        setTimeout(() => fb.textContent = '', 1800);
      }
    }

    function initSim() {
      if (ST.sim.task !== 0) return;
      var w = document.getElementById('s5w'); if (!w) return;
      var pts = FULL_T.slice(0, 4);
      var tgt = { x: (pts[1].x + pts[2].x) / 2, y: (pts[1].y + pts[2].y) / 2 };

      function cl(e) {
        var r = w.getBoundingClientRect();
        var vx = (e.clientX - r.left) / r.width * VW, vy = (e.clientY - r.top) / r.height * VH;
        var fb = document.getElementById('sfb');
        // Distance to center of the line segment
        if (Math.hypot(vx - tgt.x, vy - tgt.y) < 50 || (vx > pts[1].x - 10 && vx < pts[2].x + 10)) {
          if (fb) { fb.className = 'sim-fb ok'; fb.textContent = 'Correct — you selected the pullback segment.'; }
          w.removeEventListener('click', cl);
          setTimeout(function () { ST.sim.task = 1; render(); }, 1100);
        } else {
          if (fb) { fb.className = 'sim-fb err'; fb.textContent = 'Not quite — tap the phase moving against the trend.'; }
        }
      }
      w.addEventListener('click', cl);
    }

    function bS6() {
      return '<p class="scr-eyebrow">Section VI &mdash; Principle</p><div class="principle-card"><p class="principle-text">Trends move through impulses and pullbacks.</p></div><div class="btn-row"><button class="btn-primary" id="s6n">Continue to Competency Check</button></div>';
    }

    var AQ = [
      { q: 'What forms higher lows in an uptrend?', opts: ['Pullbacks', 'Indicators', 'News events'], cor: 'Pullbacks' },
      { q: 'What phase moves with the trend direction?', opts: ['Impulse', 'Pullback', 'Reversal'], cor: 'Impulse' },
      { q: 'Pullbacks typically occur after:', opts: ['Impulse moves', 'Random movement', 'Trend reversals'], cor: 'Impulse moves' }
    ];
    var AR = [
      { exp: 'Pullbacks temporarily retrace against the trend, forming the higher lows before continuation.', top: 'pullback' },
      { exp: 'An impulse move expands the structure in the direction of the primary trend.', top: 'impulse' },
      { exp: 'After a strong impulse move, price typically retraces in a pullback to establish structural footing before continuation.', top: 'continuation' }
    ];

    function bS7() {
      if (ST.assess.submitted) return bResult();
      var qi = ST.assess.q, q = AQ[qi], ua = ST.assess.ans[qi];
      var has = ua != null, last = qi === AQ.length - 1;
      var h = '<p class="scr-eyebrow">Section VII &mdash; Competency Check</p>';
      h += '<div class="assessment-prog">Question ' + (qi + 1) + ' of ' + AQ.length + '</div>';
      h += '<div class="assessment-q">' + eH(q.q) + '</div>';
      h += '<div id="aops">' + q.opts.map(function (o) { return '<button class="opt-btn' + (ua === o ? ' selected' : '') + '" data-ans="' + eA(o) + '">' + eH(o) + '</button>'; }).join('') + '</div>';
      h += '<div class="btn-row">' + (last ? '<button class="btn-primary" id="asub"' + (has ? '' : ' disabled') + '>Submit Assessment</button>' : '<button class="btn-primary" id="anxt"' + (has ? '' : ' disabled') + '>Next</button>') + '</div>';
      if (!has) h += '<p style="font-size:.75rem;color:var(--m-muted);margin-top:.75rem">Select an answer to continue.</p>';
      return h;
    }

    function bResult() {
      var sc = ST.assess.score, ok = ST.assess.passed;
      var rb = '<button class="btn-ghost" id="rrev" style="margin-top:.5rem">Review Answers</button>';
      if (ok) {
        var h = '<div class="result-box"><div style="font-size:2rem;color:var(--m-gold);margin-bottom:1rem">&#10003;</div>';
        h += '<div class="result-title">Competency <span class="result-gold">Verified</span></div>';
        h += '<div class="result-body">Trends move through impulses and pullbacks.<br><span style="color:var(--m-gold);font-size:.85rem">Score: ' + sc + '%</span></div>';
        h += '<div style="display:flex;flex-direction:column;align-items:center;gap:.5rem"><button class="btn-primary" id="rret">Return to Market Structure</button>' + rb + '</div></div>';
        return h;
      }
      var h = '<div class="result-box"><div style="font-size:2rem;color:var(--m-muted);margin-bottom:1rem">&#8635;</div>';
      h += '<div class="result-title">Review Recommended</div>';
      h += '<div class="result-body">Revisit the sections, then try again.<br><span style="color:var(--m-red-txt);font-size:.85rem">Score: ' + sc + '%</span></div>';
      h += '<div class="btn-row" style="justify-content:center"><button class="btn-ghost" id="rret2">Retry Assessment</button></div>';
      h += '<div style="margin-top:.75rem;text-align:center">' + rb + '</div></div>';
      return h;
    }

    function bReview() {
      var rows = AQ.map(function (q, i) {
        var ua = ST.assess.ans[i], ok = ua === q.cor, rv = AR[i];
        var ic = ok ? '&#10003;' : '&#10007;', icol = ok ? 'var(--m-green-txt)' : 'var(--m-red-txt)';
        var h = '<div style="background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:6px;padding:1rem 1.1rem;margin-bottom:.85rem">';
        h += '<p style="font-size:.8rem;font-weight:600;color:var(--m-gold);margin-bottom:.6rem">Q' + (i + 1) + '</p>';
        h += '<p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.75rem;line-height:1.5">' + eH(q.q) + '</p>';
        h += '<p style="font-size:.82rem;margin-bottom:.3rem"><span style="color:' + icol + ';font-weight:700;margin-right:.35rem">' + ic + '</span><span style="color:var(--m-muted)">Your answer:</span> <span style="color:var(--m-txt)">' + eH(ua || '(none)') + '</span></p>';
        h += '<p style="font-size:.82rem;color:var(--m-muted);margin-bottom:.75rem">Correct: <span style="color:var(--m-txt);font-weight:500">' + eH(q.cor) + '</span></p>';
        h += '<p style="font-size:.82rem;color:var(--m-muted);line-height:1.55;margin-bottom:.65rem">' + rv.exp + '</p>';
        h += '<button class="clarify-btn" data-topic="' + rv.top + '">Clarify</button></div>';
        return h;
      }).join('');
      return '<p class="scr-eyebrow">Section VII &mdash; Review Answers</p><h2 style="font-family:\'Outfit\',sans-serif;font-size:1.25rem;font-weight:600;color:var(--m-txt);margin-bottom:.9rem">Assessment Breakdown</h2>' + rows + '<div class="btn-row"><button class="btn-ghost" id="rrback">Back to Results</button></div>';
    }

    function score() {
      var c = 0; AQ.forEach(function (q, i) { if (ST.assess.ans[i] === q.cor) c++; });
      var p = Math.round((c / AQ.length) * 100);
      ST.assess.score = p; ST.assess.passed = p >= 67; ST.assess.submitted = true;
      if (ST.assess.passed) {
        ST.verified = true;
        try { var sv = JSON.parse(localStorage.getItem('pp_ms_modules') || '{}'); sv['3.5'] = { verified: true, mastery: p, mastery_percent: p, status: 'Verified', progress: 100 }; localStorage.setItem('pp_ms_modules', JSON.stringify(sv)); } catch (e) { }
      }
      updProg();
    }
    function render() {
      var c = document.getElementById('sc'); c.innerHTML = '';
      var s = ST.sid, h = '';
      if (s === 0) h = bEntry();
      else if (s === 1) h = bS1();
      else if (s === 2) h = bS2();
      else if (s === 3) h = bS3();
      else if (s === 4) h = bS4();
      else if (s === 5) h = bS5();
      else if (s === 6) h = bS6();
      else if (s === 7) h = ST.review ? bReview() : bS7();
      c.innerHTML = h;
      c.scrollTop = 0; document.getElementById('main-stage').scrollTop = 0;
      requestAnimationFrame(function () { if (s === 1) initS1(); if (s === 5) initSim(); });
      handlers();
    }

    function handlers() {
      function on(id, fn) { var e = document.getElementById(id); if (e) e.addEventListener('click', fn); }
      on('begin-btn', function () { goTo(1, 0); });
      on('s1n', function () { goTo(2, 0); }); on('s2n', function () { goTo(3, 0); }); on('s3n', function () { goTo(4, 0); });
      on('s4n', function () { goTo(5, 0); }); on('s5n', function () { goTo(6, 0); }); on('s6n', function () { goTo(7, 0); });
      document.querySelectorAll('[data-ans]').forEach(function (b) {
        b.addEventListener('click', function () {
          if (ST.assess.submitted) return;
          var qi = ST.assess.q; ST.assess.ans[qi] = ST.assess.ans[qi] === b.dataset.ans ? null : b.dataset.ans; render();
        });
      });
      on('anxt', function () { if (ST.assess.ans[ST.assess.q] == null) return; ST.assess.q++; render(); });
      on('asub', function () { if (ST.assess.ans[ST.assess.q] == null) return; score(); render(); });
      on('rret', function () { window.location.href = 'market-structure.html'; });
      on('rret2', function () { ST.assess.ans = [null, null, null]; ST.assess.submitted = false; ST.assess.score = null; ST.assess.passed = null; ST.assess.q = 0; ST.review = false; render(); });
      on('rrev', function () { if (ST.assess.submitted) { ST.review = true; render(); } });
      on('rrback', function () { ST.review = false; render(); });
      document.querySelectorAll('.clarify-btn').forEach(function (b) { b.addEventListener('click', function () { openClarify(b.dataset.topic); }); });
    }
    (function () { ST.hist = []; ST.sid = 0; ST.si = 0; visit(0); renderNav(); render(); })();
  </script>
</body>

</html>
