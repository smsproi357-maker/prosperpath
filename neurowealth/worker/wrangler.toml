name = "neurowealth-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]


[vars]
# We will add Plaid env vars here later
# TEMPORARY: Controls active AI provider. "sarvam" = Sarvam (active). "openrouter" = preserved fallback.
# To roll back to OpenRouter: change AI_PROVIDER to "openrouter" and redeploy.
AI_PROVIDER = "sarvam"
# Brevo — Waitlist (list ID and sender name are plain vars; API key + sender email are secrets)
BREVO_WAITLIST_LIST_ID = "2"
BREVO_SENDER_NAME = "ProsperPath"
# NOTE: Set these secrets via wrangler:
#   wrangler secret put BREVO_API_KEY
#   wrangler secret put BREVO_SENDER_EMAIL

[[kv_namespaces]]
binding = "USER_DATA"
id = "35ae7f2928344a52b02b4a07b6cf1adc"
