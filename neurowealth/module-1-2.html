<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Module 1.2 — Candles Without Myths | ProsperPath Market Mechanics">
  <title>Candles Without Myths | ProsperPath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --m-bg: #0d0e10;
      --m-surf: #141618;
      --m-surf2: #18191c;
      --m-bdr: #1e2023;
      --m-bdrhi: #2e3035;
      --m-txt: #e0e1e3;
      --m-muted: #5e626a;
      --m-muted2: #3a3d44;
      --m-gold: #a07c2e;
      --m-gold-dim: rgba(160, 124, 46, .13);
      --m-gold-line: rgba(160, 124, 46, .38);
      --m-green: rgba(120, 210, 160, .15);
      --m-green-txt: #7ed8a8;
      --m-red: rgba(220, 100, 80, .15);
      --m-red-txt: #e08070;
      --m-blue: rgba(100, 160, 255, .1);
      --m-blue-txt: #7eb3ff;
      --m-rad: 6px;
      --m-tr: 150ms ease
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--m-bg);
      color: var(--m-txt);
      font-family: 'Inter', sans-serif;
      min-height: 100vh
    }

    #ai-chat-fab,
    .ai-fab-btn,
    .floating-action-btn,
    [class*="fab"],
    [id*="fab"] {
      display: none !important
    }

    #module-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.25rem;
      border-bottom: 1px solid var(--m-bdr);
      background: var(--m-surf);
      flex-shrink: 0;
      gap: 1rem
    }

    #topbar-left {
      display: flex;
      align-items: center;
      gap: .75rem
    }

    #back-btn {
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-size: .78rem;
      padding: .38rem .85rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    #back-btn:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    #back-btn:focus-visible {
      outline: 2px solid var(--m-bdrhi);
      outline-offset: 2px
    }

    #topbar-title {
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      color: var(--m-txt)
    }

    #progress-label {
      font-size: .75rem;
      color: var(--m-muted);
      letter-spacing: .04em;
      white-space: nowrap
    }

    #progress-bar-wrap {
      width: 80px;
      height: 2px;
      background: var(--m-bdr);
      border-radius: 1px;
      overflow: hidden
    }

    #progress-bar-fill {
      height: 100%;
      background: var(--m-gold);
      border-radius: 1px;
      transition: width .4s ease
    }

    #shell-body {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    #section-nav {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid var(--m-bdr);
      background: var(--m-surf);
      overflow-y: auto;
      padding: 1rem 0
    }

    .sn-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem 1rem;
      font-size: .75rem;
      color: var(--m-muted);
      cursor: pointer;
      transition: color var(--m-tr), background var(--m-tr);
      border-left: 2px solid transparent;
      line-height: 1.3
    }

    .sn-item:hover {
      color: var(--m-txt);
      background: rgba(255, 255, 255, .025)
    }

    .sn-item:focus-visible {
      outline: 2px solid var(--m-bdrhi);
      outline-offset: -2px
    }

    .sn-item.visited {
      color: var(--m-txt)
    }

    .sn-item.current {
      color: var(--m-gold);
      border-left-color: var(--m-gold);
      background: var(--m-gold-dim)
    }

    .sn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--m-muted2);
      flex-shrink: 0;
      transition: background var(--m-tr)
    }

    .sn-item.visited .sn-dot {
      background: var(--m-muted)
    }

    .sn-item.current .sn-dot {
      background: var(--m-gold)
    }

    #main-stage {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1.5rem
    }

    .screen {
      width: 100%;
      max-width: 640px;
      animation: fadeIn .2s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .scr-eyebrow {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m-muted);
      margin-bottom: 1.2rem
    }

    .scr-h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--m-txt);
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: .75rem
    }

    .scr-h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--m-txt);
      margin-bottom: .9rem
    }

    .scr-meta {
      font-size: .78rem;
      color: var(--m-muted);
      letter-spacing: .04em;
      margin-bottom: 2rem
    }

    .scr-body {
      font-size: .95rem;
      color: var(--m-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem
    }

    .scr-body p {
      margin-bottom: .55rem
    }

    .scr-body p:last-child {
      margin-bottom: 0
    }

    .concept-line {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--m-txt);
      padding: .45rem 0;
      border-bottom: 1px solid var(--m-bdr)
    }

    .concept-line:last-child {
      border-bottom: none
    }

    .btn-primary {
      background: transparent;
      border: 1px solid var(--m-gold-line);
      color: var(--m-gold);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .65rem 1.5rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background var(--m-tr), border-color var(--m-tr);
      margin-right: .6rem
    }

    .btn-primary:hover {
      background: var(--m-gold-dim);
      border-color: var(--m-gold)
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--m-gold);
      outline-offset: 2px
    }

    .btn-primary:disabled {
      opacity: .42;
      cursor: not-allowed
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .04em;
      padding: .62rem 1.2rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    .btn-ghost:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    .btn-ghost:focus-visible {
      outline: 2px solid var(--m-bdrhi);
      outline-offset: 2px
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-top: 1.75rem
    }

    .clarify-btn {
      background: none;
      border: none;
      color: var(--m-gold);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
      font-family: 'Inter', sans-serif
    }

    .clarify-btn:focus-visible {
      outline: 2px solid var(--m-gold);
      outline-offset: 2px
    }

    .feedback-box {
      padding: .85rem 1rem;
      border-radius: 4px;
      font-size: .85rem;
      line-height: 1.5;
      margin-top: .85rem
    }

    .feedback-box.correct {
      background: rgba(120, 210, 160, .1);
      border: 1px solid rgba(120, 210, 160, .25);
      color: var(--m-green-txt)
    }

    .feedback-box.incorrect {
      background: rgba(220, 100, 80, .1);
      border: 1px solid rgba(220, 100, 80, .2);
      color: var(--m-red-txt)
    }

    .opt-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-txt);
      font-family: 'Inter', sans-serif;
      font-size: .875rem;
      text-align: left;
      padding: .75rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: .5rem;
      transition: border-color var(--m-tr), background var(--m-tr)
    }

    .opt-btn:hover {
      border-color: var(--m-bdrhi);
      background: rgba(255, 255, 255, .025)
    }

    .opt-btn.selected {
      border-color: var(--m-gold-line);
      background: var(--m-gold-dim);
      color: var(--m-gold)
    }

    .opt-btn.correct-ans {
      border-color: rgba(120, 210, 160, .5);
      background: rgba(120, 210, 160, .1);
      color: var(--m-green-txt)
    }

    .opt-btn.wrong-ans {
      border-color: rgba(220, 100, 80, .4);
      background: rgba(220, 100, 80, .1);
      color: var(--m-red-txt)
    }

    .opt-btn:disabled {
      cursor: default
    }

    .assessment-prog {
      font-size: .72rem;
      color: var(--m-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 1.5rem
    }

    .assessment-q {
      font-size: 1rem;
      color: var(--m-txt);
      margin-bottom: 1.25rem;
      line-height: 1.55
    }

    .ref-label {
      font-size: .85rem;
      font-weight: 500;
      color: var(--m-txt);
      margin-bottom: .5rem;
      display: block
    }

    .ref-area {
      width: 100%;
      background: var(--m-surf2);
      border: 1px solid var(--m-bdr);
      color: var(--m-txt);
      font-family: 'Inter', sans-serif;
      font-size: .87rem;
      padding: .85rem 1rem;
      border-radius: 4px;
      resize: vertical;
      min-height: 90px;
      transition: border-color var(--m-tr)
    }

    .ref-area:focus {
      outline: none;
      border-color: var(--m-bdrhi)
    }

    .ref-group {
      margin-bottom: 1.25rem
    }

    .result-box {
      text-align: center;
      padding: 2rem 1rem
    }

    .result-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--m-txt);
      margin-bottom: .5rem
    }

    .result-gold {
      color: var(--m-gold)
    }

    .result-body {
      font-size: .9rem;
      color: var(--m-muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto
    }

    /* Candle diagram */
    .candle-diagram {
      margin: 1.5rem auto;
      width: 200px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .candle-wick-top {
      width: 2px;
      height: 30px;
      background: var(--m-muted);
      margin-bottom: 0
    }

    .candle-body-wrap {
      width: 60px;
      background: var(--m-gold-dim);
      border: 1px solid var(--m-gold-line);
      border-radius: 2px;
      position: relative;
      display: flex;
      flex-direction: column
    }

    .candle-body {
      width: 60px;
      height: 80px;
      background: rgba(126, 179, 255, .15);
      border: 1px solid rgba(126, 179, 255, .35);
      border-radius: 2px;
      position: relative
    }

    .candle-wick-bot {
      width: 2px;
      height: 30px;
      background: var(--m-muted);
      margin-top: 0
    }

    .candle-label {
      position: absolute;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .07em;
      color: var(--m-muted);
      white-space: nowrap
    }

    /* Pattern trap candle */
    .trap-chart {
      margin: 1.5rem 0;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 100px;
      padding: 0 1rem;
      border-bottom: 1px solid var(--m-bdr)
    }

    .trap-candle {
      border-radius: 2px;
      position: relative
    }

    /* Time strip */
    .time-strip {
      display: flex;
      gap: 2px;
      margin: 1rem 0;
      height: 40px;
      align-items: flex-end
    }

    .mini-candle {
      width: 8px;
      border-radius: 1px;
      flex-shrink: 0
    }

    /* Myths list */
    .myth-item {
      padding: .65rem 0;
      border-bottom: 1px solid var(--m-bdr);
      font-size: .9rem;
      color: var(--m-muted);
      line-height: 1.5
    }

    .myth-item:last-child {
      border-bottom: none
    }

    /* ClarifyPanel */
    #clarify-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 900;
      display: none;
      align-items: flex-start;
      justify-content: flex-end
    }

    #clarify-overlay.open {
      display: flex
    }

    #clarify-panel {
      width: 340px;
      max-width: 90vw;
      height: 100%;
      background: #16181b;
      border-left: 1px solid var(--m-bdr);
      overflow-y: auto;
      padding: 2rem 1.5rem;
      animation: slideInRight .22s ease
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    .cp-term {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--m-txt);
      margin-bottom: .25rem
    }

    .cp-section {
      margin-top: 1.25rem
    }

    .cp-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--m-muted);
      margin-bottom: .4rem
    }

    .cp-text {
      font-size: .85rem;
      color: var(--m-muted);
      line-height: 1.55
    }

    .cp-text strong {
      color: var(--m-txt);
      font-weight: 500
    }

    #cp-close {
      margin-top: 2rem;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      padding: .5rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color var(--m-tr), color var(--m-tr)
    }

    #cp-close:hover {
      border-color: var(--m-bdrhi);
      color: var(--m-txt)
    }

    .nav-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--m-bdr);
      color: var(--m-muted);
      padding: .36rem .7rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: .75rem
    }

    @media(max-width:700px) {
      #section-nav {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 800;
        transform: translateX(-100%);
        transition: transform .3s ease;
        width: 240px
      }

      #section-nav.open {
        transform: translateX(0)
      }

      #nav-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .5);
        z-index: 799;
        display: none
      }

      #nav-backdrop.open {
        display: block
      }

      #clarify-panel {
        width: 100%;
        height: 60vh;
        border-left: none;
        border-top: 1px solid var(--m-bdr);
        position: fixed;
        bottom: 0;
        left: 0
      }

      #clarify-overlay {
        align-items: flex-end;
        justify-content: center
      }

      #main-stage {
        padding: 1.5rem 1rem
      }

      .nav-toggle {
        display: inline-flex;
        align-items: center;
        gap: .4rem
      }
    }
  </style>
</head>

<body>
  <div id="module-shell">
    <div id="topbar">
      <div id="topbar-left">
        <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNavDrawer()"
          aria-label="Open section navigator">&#9776; Sections</button>
        <button id="back-btn" onclick="goBack()">&#8592; Market Mechanics</button>
        <span id="topbar-title">Candles Without Myths</span>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span id="progress-label">Progress 0%</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
    <div id="nav-backdrop" onclick="toggleNavDrawer()"></div>
    <div id="shell-body">
      <nav id="section-nav" aria-label="Module sections">
        <div id="sn-items"></div>
      </nav>
      <main id="main-stage">
        <div class="screen" id="screen-container"></div>
      </main>
    </div>
  </div>
  <div id="clarify-overlay" onclick="handleClarifyOverlayClick(event)" role="dialog" aria-modal="true"
    aria-label="Clarify">
    <div id="clarify-panel">
      <div class="cp-term" id="cp-term"></div>
      <div class="cp-section">
        <div class="cp-label">Explanation</div>
        <div class="cp-text" id="cp-explanation"></div>
      </div>
      <div class="cp-section">
        <div class="cp-label">Example</div>
        <div class="cp-text" id="cp-example"></div>
      </div>
      <div class="cp-section">
        <div class="cp-label">Common Misconception</div>
        <div class="cp-text" id="cp-misconception"></div>
      </div>
      <button id="cp-close" onclick="closeClarify()">Close</button>
    </div>
  </div>
  <script src="script.js?v=m12"></script>
  <script src="ai-widget.js"></script>
  <script src="google-auth.js"></script>
  <script>
    window.addEventListener('load', () => { if (typeof initGoogleAuth === 'function') initGoogleAuth() });
    /* STATE MODEL */
    const STATE = {
      currentSectionId: 0, currentScreenIndex: 0,
      visitedSections: new Set(),
      clarifyPanel: { open: false, topicId: null },
      patternTrap: { choice: null, revealed: false },
      reflection: { q1: '', q2: '' },
      assessment: { answers: [null, null, null, null, null], isSubmitted: false, scorePercent: null, passed: null, currentQ: 0 },
      verified: false,
      sectionLastScreenIndex: {},
      navHistory: [],
      showReview: false,
      timeExpanded: false
    };
    const SECTIONS = [
      { id: 0, label: 'Entry' },
      { id: 1, label: 'Section I \u2014 Concept Clarity' },
      { id: 2, label: 'Section II \u2014 Time Compression' },
      { id: 3, label: 'Section III \u2014 Decision Test' },
      { id: 4, label: 'Section IV \u2014 Pattern Trap' },
      { id: 5, label: 'Section V \u2014 Common Myths' },
      { id: 6, label: 'Section VI \u2014 Reflection' },
      { id: 7, label: 'Section VII \u2014 Mastery Assessment' }
    ];
    function computeProgress() {
      const v = STATE.visitedSections.size;
      const base = Math.min(v, 7);
      let pct = Math.round((base / 7) * 85);
      if (STATE.assessment.passed) pct = 100;
      else if (STATE.assessment.scorePercent > 0) pct = Math.max(pct, 90);
      return pct;
    }
    function updateProgress() { const pct = computeProgress(); document.getElementById('progress-label').textContent = 'Progress ' + pct + '%'; document.getElementById('progress-bar-fill').style.width = pct + '%'; }
    function visit(sid) { if (!STATE.visitedSections.has(sid)) { STATE.visitedSections.add(sid); updateProgress(); } renderNav(); }
    function goToSection(sid, screenIndex, pushHistory) {
      const allowed = STATE.visitedSections.has(sid) || sid <= Math.max(...[...STATE.visitedSections], 0) + 1 || sid === 0;
      if (!allowed) return;
      if (pushHistory !== false) STATE.navHistory.push({ sectionId: STATE.currentSectionId, screenIndex: STATE.currentScreenIndex });
      STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
      STATE.currentSectionId = sid;
      STATE.currentScreenIndex = (screenIndex !== undefined && screenIndex !== null) ? screenIndex : 0;
      STATE.showReview = false;
      visit(sid); renderNav(); renderScreen();
      const nav = document.getElementById('section-nav');
      if (nav.classList.contains('open')) toggleNavDrawer();
    }
    function goBack() {
      if (STATE.showReview) { STATE.showReview = false; renderScreen(); return; }
      if (STATE.navHistory.length > 0) {
        const prev = STATE.navHistory.pop();
        STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
        STATE.currentSectionId = prev.sectionId; STATE.currentScreenIndex = prev.screenIndex;
        STATE.showReview = false; visit(prev.sectionId); renderNav(); renderScreen(); return;
      }
      window.location.href = 'market-mechanics.html';
    }
    function toggleNavDrawer() { document.getElementById('section-nav').classList.toggle('open'); document.getElementById('nav-backdrop').classList.toggle('open'); }
    function renderNav() {
      const c = document.getElementById('sn-items'); c.innerHTML = '';
      SECTIONS.forEach(s => {
        if (s.id === 0) return;
        const isCurrent = STATE.currentSectionId === s.id;
        const isVisited = STATE.visitedSections.has(s.id);
        const isAccessible = isVisited || s.id <= Math.max(...[...STATE.visitedSections], 0) + 1;
        const div = document.createElement('div');
        div.className = 'sn-item' + (isCurrent ? ' current' : '') + (isVisited ? ' visited' : '');
        div.setAttribute('tabindex', isAccessible ? '0' : '-1');
        div.setAttribute('role', 'button');
        div.setAttribute('aria-label', s.label + (isCurrent ? ', current' : isVisited ? ', visited' : ', not visited'));
        div.innerHTML = `<span class="sn-dot"></span><span>${s.label}</span>`;
        if (isAccessible) {
          div.onclick = () => { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); };
          div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); } };
        } else { div.style.opacity = '.35'; div.style.cursor = 'not-allowed'; }
        c.appendChild(div);
      });
    }
    /* CLARIFY DATA */
    const CLARIFY_DATA = {
      open: { term: 'Open', explanation: 'First transaction after the time window begins.', example: 'If a 1H candle starts at 10:00, the Open is the first trade executed after 10:00.', misconception: '<strong>"Open is a support level."</strong> Open is simply the first price transacted in the window — not a structural level.' },
      high: { term: 'High', explanation: 'Highest price traded during the time window.', example: 'A spike to 62,900 counts as the High even if it lasted seconds.', misconception: '<strong>"High means buyers were in control."</strong> A high wick can also indicate price was rejected after reaching that level.' },
      low: { term: 'Low', explanation: 'Lowest price traded during the time window.', example: 'A brief dip to 62,200 still becomes the Low for that candle.', misconception: '<strong>"Low predicts a bounce."</strong> Low is just the floor of the period — it carries no directional promise.' },
      close: { term: 'Close', explanation: 'Final traded price at the end of the time window.', example: 'The last trade at 11:00 becomes the Close of that 1H candle.', misconception: '<strong>"Close confirms the next candle direction."</strong> Close ends the prior window; it says nothing guaranteed about what follows.' },
      conviction: { term: 'Conviction', explanation: 'Sustained pressure and follow-through, not candle color.', example: 'A green candle can still be followed by heavy selling the next period.', misconception: '<strong>"Green means strong buyers."</strong> Color only tells you close vs open — not intensity of participation.' },
      fractality: { term: 'Fractality', explanation: 'Larger candles are aggregates of smaller timeframe moves.', example: 'A 1H candle is built from 60 one-minute candle outcomes.', misconception: '<strong>"Higher timeframe candles are more true."</strong> All timeframes compress the same underlying transactions differently.' },
      wick: { term: 'Wick', explanation: 'A wick shows price traded outside the candle body during the window.', example: 'Price traded higher but did not hold into the close, leaving an upper wick.', misconception: '<strong>"A wick predicts the next move."</strong> A wick shows rejection within the window — it does not guarantee direction next.' },
      engulfing: { term: 'Engulfing Pattern', explanation: 'A candle that fully covers the previous candle\'s body.', example: 'A bullish engulfing closes above the prior red candle\'s open.', misconception: '<strong>"It guarantees reversal or continuation."</strong> It describes structure only — outcome depends on broader context.' },
      context: { term: 'Context', explanation: 'Liquidity, volatility, higher timeframe structure, and current conditions.', example: 'A bullish pattern into major resistance can fail despite clean form.', misconception: '<strong>"Patterns work independently."</strong> Patterns require contextual validation to carry weight.' },
      timewindow: { term: 'Time Window', explanation: 'The fixed period a candle summarizes.', example: '10:00–11:00 for a 1H candle.', misconception: '<strong>"Time window makes outcomes predictable."</strong> Compression creates structure — it does not reduce uncertainty.' },
      openvsclose: { term: 'Open vs Close', explanation: 'Open is the first trade, Close is the last trade in the window.', example: 'Open 100, Close 105 = green candle showing net gain in the window.', misconception: '<strong>"Close predicts next candle."</strong> Close ends the period record — it does not forecast the next.' },
      patterncertainty: { term: 'Pattern Certainty', explanation: 'Patterns do not guarantee outcomes; context determines follow-through.', example: 'A bullish pattern can fail into resistance without additional confirmation.', misconception: '<strong>"One pattern is enough to predict."</strong> Patterns are descriptors of structure, not oracles.' },
      timecompression: { term: 'Time Compression', explanation: 'Higher timeframe candles aggregate lower timeframe moves.', example: '1H = 60 x 1-minute candles combined.', misconception: '<strong>"Compression removes uncertainty."</strong> It condenses information — uncertainty remains.' },
      predictionvsdescription: { term: 'Prediction vs Description', explanation: 'Candles and patterns describe past structure, not future certainty.', example: 'A doji can appear in both continuation and reversal contexts.', misconception: '<strong>"If it looks like a reversal, it must reverse."</strong> Resemblance to a pattern is not a guarantee.' }
    };
    function openClarify(topicId) {
      const d = CLARIFY_DATA[topicId]; if (!d) return;
      document.getElementById('cp-term').textContent = d.term;
      document.getElementById('cp-explanation').textContent = d.explanation;
      document.getElementById('cp-example').textContent = d.example;
      document.getElementById('cp-misconception').innerHTML = d.misconception;
      document.getElementById('clarify-overlay').classList.add('open');
      document.getElementById('cp-close').focus();
    }
    function closeClarify() { document.getElementById('clarify-overlay').classList.remove('open'); }
    function handleClarifyOverlayClick(e) { if (e.target === document.getElementById('clarify-overlay')) closeClarify(); }
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }
    /* SCREEN RENDERERS */
    function renderScreen() {
      const c = document.getElementById('screen-container');
      c.innerHTML = '';
      const s = STATE.currentSectionId, si = STATE.currentScreenIndex;
      let html = '';
      if (s === 0) html = buildEntry();

      else if (s === 3) html = buildS3();

      else if (s === 5) html = buildS5();

      else if (s === 7) { if (STATE.showReview) html = buildReviewAnswers(); else html = buildS7(); }
      c.innerHTML = html;
      c.scrollTop = 0; document.getElementById('main-stage').scrollTop = 0;
      attachHandlers();
    }

</div>
<div class="btn-row">
  ${qi > 0 ? `<button class="btn-ghost" id="assess-back">Back</button>` : ''}
  ${isLastQ
          ? `<button class="btn-primary" id="assess-submit" ${!hasAnswer ? 'disabled' : ''}>Submit Assessment</button>`
          : `<button class="btn-primary" id="assess-next" ${!hasAnswer ? 'disabled' : ''}>Next</button>`}
</div>
${!hasAnswer ? '<p style="font-size:.75rem;color:var(--m-muted);margin-top:.75rem">Select an answer to continue.</p>' : ''}
`;
    }

    function buildResultScreen() {
      const score = STATE.assessment.scorePercent;
      const passed = STATE.assessment.passed;
      const reviewBtn = `<button class="btn-ghost" id="result-review-answers" style="margin-top:.5rem">Review Answers</button>`;
      if (passed) {
        return `
<div class="result-box">
  <div style="font-size:2rem;color:var(--m-gold);margin-bottom:1rem">&#10003;</div>
  <div class="result-title">Competency <span class="result-gold">Verified</span></div>
  <div class="result-body">Candle structure is understood.<br><span style="color:var(--m-gold);font-size:.85rem">Score: ${score}%</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem">
    <button class="btn-primary" id="result-return">Return to Market Mechanics</button>
    ${reviewBtn}
  </div>
</div>`;
      }
      return `
<div class="result-box">
  <div style="font-size:2rem;color:var(--m-muted);margin-bottom:1rem">&#8635;</div>
  <div class="result-title">Review Recommended</div>
  <div class="result-body">Revisit key sections, then retry.<br><span style="color:var(--m-red-txt);font-size:.85rem">Score: ${score}%</span></div>
  <div class="btn-row" style="justify-content:center">
    <button class="btn-ghost" id="result-retry">Retry Assessment</button>
  </div>
  <div style="margin-top:.75rem;text-align:center">${reviewBtn}</div>
</div>`;
    }

    const A_REVIEW_DATA = [
      { explanation: 'Candles summarize what happened within a time window. They don\'t predict the next move.', clarifyTopic: 'timewindow' },
      { explanation: 'Green only indicates the close finished above the open for that window.', clarifyTopic: 'openvsclose' },
      { explanation: 'Patterns describe structure. Without context, they do not guarantee direction.', clarifyTopic: 'patterncertainty' },
      { explanation: 'A 1-hour candle compresses 60 minutes of price activity.', clarifyTopic: 'timecompression' },
      { explanation: 'Patterns can be useful descriptors, but they never guarantee outcomes.', clarifyTopic: 'predictionvsdescription' }
    ];
    function buildReviewAnswers() {
      const rows = A_QUESTIONS.map((q, i) => {
        const userAns = STATE.assessment.answers[i];
        const correct = userAns === q.correct;
        const rv = A_REVIEW_DATA[i];
        const icon = correct ? '&#10003;' : '&#10007;';
        const iconColor = correct ? 'var(--m-green-txt)' : 'var(--m-red-txt)';
        return `
<div style="background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:6px;padding:1rem 1.1rem;margin-bottom:.85rem">
  <p style="font-size:.8rem;font-weight:600;letter-spacing:.04em;color:var(--m-gold);margin-bottom:.6rem">Q${i + 1}</p>
  <p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.75rem;line-height:1.5">${q.q}</p>
  <p style="font-size:.82rem;margin-bottom:.3rem"><span style="color:${iconColor};font-weight:700;margin-right:.35rem">${icon}</span><span style="color:var(--m-muted)">Your answer:</span> <span style="color:var(--m-txt)">${escHtml(userAns || '(no answer)')}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);margin-bottom:.75rem">Correct answer: <span style="color:var(--m-txt);font-weight:500">${escHtml(q.correct)}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);line-height:1.55;margin-bottom:.65rem">${rv.explanation}</p>
  <button class="clarify-btn" data-topic="${rv.clarifyTopic}">Clarify</button>
</div>`}).join('');
      return `
<p class="scr-eyebrow">Section VII &mdash; Review Answers</p>
<h2 class="scr-h2">Assessment Breakdown</h2>
${rows}
<div class="btn-row"><button class="btn-ghost" id="review-back-results">Back to Results</button></div>`;
    }

    function computeScore() {
      let correct = 0;
      A_QUESTIONS.forEach((q, i) => { if (STATE.assessment.answers[i] === q.correct) correct++; });
      const pct = Math.round((correct / A_QUESTIONS.length) * 100);
      STATE.assessment.scorePercent = pct;
      STATE.assessment.passed = pct >= 70;
      STATE.assessment.isSubmitted = true;
      if (STATE.assessment.passed) {
        STATE.verified = true;
        try {
          const saved = JSON.parse(localStorage.getItem('pp_mm_modules') || '{}');
          saved['1.2'] = { verified: true, mastery: pct, mastery_percent: pct, status: 'Verified', progress: 100 };
          localStorage.setItem('pp_mm_modules', JSON.stringify(saved));
        } catch (e) { }
      }
      updateProgress();
    }
    /* EVENT HANDLERS */
    function attachHandlers() {
      const $ = id => document.getElementById(id);
      const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

      // Entry
      on('begin-btn', 'click', () => goToSection(1, 0));

      // S1
      on('s1s1-cont', 'click', () => { STATE.currentScreenIndex = 1; renderScreen(); });
      on('s1s2-cont', 'click', () => { STATE.currentScreenIndex = 2; renderScreen(); });
      on('s1s3-cont', 'click', () => goToSection(2, 0));

      // S2
      on('s2s1-cont', 'click', () => { STATE.currentScreenIndex = 1; renderScreen(); });
      on('expand-candle', 'click', () => { STATE.timeExpanded = true; renderScreen(); });
      on('s2s2-cont', 'click', () => goToSection(3, 0));

      // S3
      const s3Pick = (choice) => { STATE._s3_choice = choice; STATE._s3_answered = true; renderScreen(); };
      on('s3-opt1', 'click', () => s3Pick('Strong buyers are in control'));
      on('s3-opt2', 'click', () => s3Pick('Price will continue upward'));
      on('s3-opt3', 'click', () => s3Pick('Nothing is guaranteed'));
      on('s3-cont', 'click', () => goToSection(4, 0));

      // S4
      const ptPick = (choice) => { STATE.patternTrap.choice = choice; renderScreen(); };
      on('pt-opt1', 'click', () => ptPick('Price will continue upward'));
      on('pt-opt2', 'click', () => ptPick('Price will reverse downward'));
      on('pt-opt3', 'click', () => ptPick('Cannot determine'));
      on('s4s1-cont', 'click', () => { STATE.patternTrap.revealed = true; STATE.currentScreenIndex = 1; renderScreen(); });
      on('s4s2-cont', 'click', () => { STATE.currentScreenIndex = 2; renderScreen(); });
      on('s4s3-cont', 'click', () => { STATE.currentScreenIndex = 3; renderScreen(); });
      on('s4s4-cont', 'click', () => goToSection(5, 0));

      // S5
      on('s5-cont', 'click', () => goToSection(6, 0));

      // S6
      on('s6-submit', 'click', () => {
        const q1 = ($('ref-q1') || {}).value || '';
        const q2 = ($('ref-q2') || {}).value || '';
        if (q1.trim().length < 5 || q2.trim().length < 5) {
          const err = $('ref-error'); if (err) err.style.display = 'block'; return;
        }
        STATE.reflection = { q1, q2 };
        goToSection(7, 0);
      });

      // S7 — assessment
      document.querySelectorAll('[data-ans]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (STATE.assessment.isSubmitted) return;
          const qi = STATE.assessment.currentQ;
          if (STATE.assessment.answers[qi] === btn.dataset.ans) { STATE.assessment.answers[qi] = null; }
          else { STATE.assessment.answers[qi] = btn.dataset.ans; }
          renderScreen();
        });
      });
      on('assess-back', 'click', () => { if (STATE.assessment.currentQ > 0) { STATE.assessment.currentQ--; renderScreen(); } });
      on('assess-next', 'click', () => {
        const qi = STATE.assessment.currentQ;
        if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
        STATE.assessment.currentQ++; renderScreen();
      });
      on('assess-submit', 'click', () => {
        const qi = STATE.assessment.currentQ;
        if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
        computeScore(); renderScreen();
      });
      on('result-return', 'click', () => { window.location.href = 'market-mechanics.html'; });
      on('result-retry', 'click', () => {
        STATE.assessment.answers = [null, null, null, null, null];
        STATE.assessment.isSubmitted = false; STATE.assessment.scorePercent = null;
        STATE.assessment.passed = null; STATE.assessment.currentQ = 0; STATE.showReview = false;
        renderScreen();
      });
      on('result-review-answers', 'click', () => { if (STATE.assessment.isSubmitted) { STATE.showReview = true; renderScreen(); } });
      on('review-back-results', 'click', () => { STATE.showReview = false; renderScreen(); });

      // Clarify
      document.querySelectorAll('.clarify-btn').forEach(btn => {
        btn.addEventListener('click', () => openClarify(btn.dataset.topic));
      });
    }

    /* INIT */
    (function init() {
      STATE.navHistory = [];
      STATE.currentSectionId = 0;
      STATE.currentScreenIndex = 0;
      visit(0); renderNav(); renderScreen();
    })();
  </script>
</body>

</html>
