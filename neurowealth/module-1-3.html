<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Module 1.3 — Why Price Moves | ProsperPath Market Mechanics">
    <title>Why Price Moves | ProsperPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --m-bg: #0d0e10;
            --m-surf: #141618;
            --m-surf2: #18191c;
            --m-bdr: #1e2023;
            --m-bdrhi: #2e3035;
            --m-txt: #e0e1e3;
            --m-muted: #5e626a;
            --m-muted2: #3a3d44;
            --m-gold: #a07c2e;
            --m-gold-dim: rgba(160, 124, 46, .13);
            --m-gold-line: rgba(160, 124, 46, .38);
            --m-green: rgba(120, 210, 160, .15);
            --m-green-txt: #7ed8a8;
            --m-red: rgba(220, 100, 80, .15);
            --m-red-txt: #e08070;
            --m-blue: rgba(100, 160, 255, .1);
            --m-blue-txt: #7eb3ff;
            --m-rad: 6px;
            --m-tr: 150ms ease
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--m-bg);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            min-height: 100vh
        }

        #ai-chat-fab,
        .ai-fab-btn,
        .floating-action-btn,
        [class*="fab"],
        [id*="fab"] {
            display: none !important
        }

        #module-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--m-bdr);
            background: var(--m-surf);
            flex-shrink: 0;
            gap: 1rem
        }

        #topbar-left {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        #back-btn {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-size: .78rem;
            padding: .38rem .85rem;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #back-btn:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        #back-btn:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        #topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            color: var(--m-txt)
        }

        #progress-label {
            font-size: .75rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            white-space: nowrap
        }

        #progress-bar-wrap {
            width: 80px;
            height: 2px;
            background: var(--m-bdr);
            border-radius: 1px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: var(--m-gold);
            border-radius: 1px;
            transition: width .4s ease
        }

        #shell-body {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        #section-nav {
            width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--m-bdr);
            background: var(--m-surf);
            overflow-y: auto;
            padding: 1rem 0
        }

        .sn-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem 1rem;
            font-size: .75rem;
            color: var(--m-muted);
            cursor: pointer;
            transition: color var(--m-tr), background var(--m-tr);
            border-left: 2px solid transparent;
            line-height: 1.3
        }

        .sn-item:hover {
            color: var(--m-txt);
            background: rgba(255, 255, 255, .025)
        }

        .sn-item:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: -2px
        }

        .sn-item.visited {
            color: var(--m-txt)
        }

        .sn-item.current {
            color: var(--m-gold);
            border-left-color: var(--m-gold);
            background: var(--m-gold-dim)
        }

        .sn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--m-muted2);
            flex-shrink: 0;
            transition: background var(--m-tr)
        }

        .sn-item.visited .sn-dot {
            background: var(--m-muted)
        }

        .sn-item.current .sn-dot {
            background: var(--m-gold)
        }

        #main-stage {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1.5rem
        }

        .screen {
            width: 100%;
            max-width: 640px;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .scr-eyebrow {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: 1.2rem
        }

        .scr-h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--m-txt);
            letter-spacing: -.02em;
            line-height: 1.15;
            margin-bottom: .75rem
        }

        .scr-h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .9rem
        }

        .scr-meta {
            font-size: .78rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            margin-bottom: 2rem
        }

        .scr-body {
            font-size: .95rem;
            color: var(--m-muted);
            line-height: 1.7;
            margin-bottom: 1.5rem
        }

        .scr-body p {
            margin-bottom: .55rem
        }

        .scr-body p:last-child {
            margin-bottom: 0
        }

        .concept-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--m-txt);
            padding: .45rem 0;
            border-bottom: 1px solid var(--m-bdr)
        }

        .concept-line:last-child {
            border-bottom: none
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: .65rem 1.5rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background var(--m-tr), border-color var(--m-tr);
            margin-right: .6rem
        }

        .btn-primary:hover {
            background: var(--m-gold-dim);
            border-color: var(--m-gold)
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        .btn-primary:disabled {
            opacity: .42;
            cursor: not-allowed
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .04em;
            padding: .62rem 1.2rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        .btn-ghost:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .btn-ghost:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-top: 1.75rem
        }

        .clarify-btn {
            background: none;
            border: none;
            color: var(--m-gold);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .04em;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            padding: 0;
            font-family: 'Inter', sans-serif
        }

        .clarify-btn:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        .opt-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            text-align: left;
            padding: .75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: .5rem;
            transition: border-color var(--m-tr), background var(--m-tr)
        }

        .opt-btn:hover {
            border-color: var(--m-bdrhi);
            background: rgba(255, 255, 255, .025)
        }

        .opt-btn.selected {
            border-color: var(--m-gold-line);
            background: var(--m-gold-dim);
            color: var(--m-gold)
        }

        .opt-btn.correct-ans {
            border-color: rgba(120, 210, 160, .5);
            background: rgba(120, 210, 160, .1);
            color: var(--m-green-txt)
        }

        .opt-btn.wrong-ans {
            border-color: rgba(220, 100, 80, .4);
            background: rgba(220, 100, 80, .1);
            color: var(--m-red-txt)
        }

        .opt-btn:disabled {
            cursor: default
        }

        .assessment-prog {
            font-size: .72rem;
            color: var(--m-muted);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 1.5rem
        }

        .assessment-q {
            font-size: 1rem;
            color: var(--m-txt);
            margin-bottom: 1.25rem;
            line-height: 1.55
        }

        .ref-label {
            font-size: .85rem;
            font-weight: 500;
            color: var(--m-txt);
            margin-bottom: .5rem;
            display: block
        }

        .ref-area {
            width: 100%;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .87rem;
            padding: .85rem 1rem;
            border-radius: 4px;
            resize: vertical;
            min-height: 90px;
            transition: border-color var(--m-tr)
        }

        .ref-area:focus {
            outline: none;
            border-color: var(--m-bdrhi)
        }

        .ref-group {
            margin-bottom: 1.25rem
        }

        .result-box {
            text-align: center;
            padding: 2rem 1rem
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--m-txt);
            margin-bottom: .5rem
        }

        .result-gold {
            color: var(--m-gold)
        }

        .result-body {
            font-size: .9rem;
            color: var(--m-muted);
            line-height: 1.6;
            margin-bottom: 1.75rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto
        }

        /* Imbalance diagram */
        .imbalance-row {
            display: flex;
            gap: 1.5rem;
            margin: 1.5rem 0;
            flex-wrap: wrap
        }

        .imb-block {
            flex: 1;
            min-width: 140px;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            border-radius: 4px;
            padding: .85rem 1rem
        }

        .imb-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .6rem
        }

        .imb-bars {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 50px
        }

        .imb-bar {
            border-radius: 2px 2px 0 0;
            width: 18px
        }

        .imb-outcome {
            font-size: .78rem;
            color: var(--m-muted);
            margin-top: .6rem;
            line-height: 1.4
        }

        .imb-outcome strong {
            color: var(--m-txt)
        }

        /* Liquidity simulation chart */
        .sim-chart {
            position: relative;
            margin: 1.5rem 0;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            border-radius: 4px;
            overflow: hidden;
            height: 160px;
            padding: 1rem .75rem 0
        }

        .sim-candles {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 100%
        }

        .sim-candle {
            border-radius: 2px;
            position: relative;
            flex-shrink: 0;
            transition: height .35s ease, background .35s ease
        }

        .sim-eq-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--m-gold-line);
            top: 52px
        }

        .sim-cluster-band {
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(160, 124, 46, .07);
            border-top: 1px dashed rgba(160, 124, 46, .22);
            top: 42px;
            transition: opacity .5s ease
        }

        .sim-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 14, 16, .78);
            opacity: 0;
            transition: opacity .4s ease;
            pointer-events: none
        }

        .sim-overlay.show {
            opacity: 1
        }

        .sim-overlay-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--m-txt);
            text-align: center;
            line-height: 1.5
        }

        /* Mechanism anchor */
        .anchor-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--m-txt);
            padding: .7rem 1rem;
            border-left: 2px solid var(--m-gold);
            background: var(--m-gold-dim);
            border-radius: 0 4px 4px 0;
            margin: 1.5rem 0;
            line-height: 1.5
        }

        /* ClarifyPanel */
        #clarify-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 900;
            display: none;
            align-items: flex-start;
            justify-content: flex-end
        }

        #clarify-overlay.open {
            display: flex
        }

        #clarify-panel {
            width: 340px;
            max-width: 90vw;
            height: 100%;
            background: #16181b;
            border-left: 1px solid var(--m-bdr);
            overflow-y: auto;
            padding: 2rem 1.5rem;
            animation: slideInRight .22s ease
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        .cp-term {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .25rem
        }

        .cp-section {
            margin-top: 1.25rem
        }

        .cp-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .4rem
        }

        .cp-text {
            font-size: .85rem;
            color: var(--m-muted);
            line-height: 1.55
        }

        .cp-text strong {
            color: var(--m-txt);
            font-weight: 500
        }

        #cp-close {
            margin-top: 2rem;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .78rem;
            padding: .5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #cp-close:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .nav-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            padding: .36rem .7rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: .75rem
        }

        @media(max-width:700px) {
            #section-nav {
                position: fixed;
                inset: 0 auto 0 0;
                z-index: 800;
                transform: translateX(-100%);
                transition: transform .3s ease;
                width: 240px
            }

            #section-nav.open {
                transform: translateX(0)
            }

            #nav-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                z-index: 799;
                display: none
            }

            #nav-backdrop.open {
                display: block
            }

            #clarify-panel {
                width: 100%;
                height: 60vh;
                border-left: none;
                border-top: 1px solid var(--m-bdr);
                position: fixed;
                bottom: 0;
                left: 0
            }

            #clarify-overlay {
                align-items: flex-end;
                justify-content: center
            }

            #main-stage {
                padding: 1.5rem 1rem
            }

            .nav-toggle {
                display: inline-flex;
                align-items: center;
                gap: .4rem
            }
        }
    </style>
</head>

<body>
    <div id="module-shell">
        <div id="topbar">
            <div id="topbar-left">
                <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNavDrawer()"
                    aria-label="Open section navigator">&#9776; Sections</button>
                <button id="back-btn" onclick="goBack()">&#8592; Market Mechanics</button>
                <span id="topbar-title">Why Price Moves</span>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem">
                <span id="progress-label">Progress 0%</span>
                <div id="progress-bar-wrap">
                    <div id="progress-bar-fill" style="width:0%"></div>
                </div>
            </div>
        </div>
        <div id="nav-backdrop" onclick="toggleNavDrawer()"></div>
        <div id="shell-body">
            <nav id="section-nav" aria-label="Module sections">
                <div id="sn-items"></div>
            </nav>
            <main id="main-stage">
                <div class="screen" id="screen-container"></div>
            </main>
        </div>
    </div>
    <div id="clarify-overlay" onclick="handleClarifyOverlayClick(event)" role="dialog" aria-modal="true"
        aria-label="Clarify">
        <div id="clarify-panel">
            <div class="cp-term" id="cp-term"></div>
            <div class="cp-section">
                <div class="cp-label">Explanation</div>
                <div class="cp-text" id="cp-explanation"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Example</div>
                <div class="cp-text" id="cp-example"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Common Misconception</div>
                <div class="cp-text" id="cp-misconception"></div>
            </div>
            <button id="cp-close" onclick="closeClarify()">Close</button>
        </div>
    </div>
    <script src="script.js?v=m13"></script>
    <script src="ai-widget.js"></script>
    <script src="google-auth.js"></script>
    <script>
        window.addEventListener('load', () => { if (typeof initGoogleAuth === 'function') initGoogleAuth(); });

        /* ═══════════════════════════════════════════════════════
           STATE MODEL
        ═══════════════════════════════════════════════════════ */
        const STATE = {
            currentSectionId: 0, currentScreenIndex: 0,
            visitedSections: new Set(),
            clarifyPanel: { open: false, topicId: null },
            simulationChoice: null,
            simulationPhase: 0, // 0=setup, 1=breakout, 2=reversal, 3=explanation
            reflection: { q1: '', q2: '' },
            assessment: { answers: [null, null, null, null, null], isSubmitted: false, scorePercent: null, passed: null, currentQ: 0 },
            verified: false,
            sectionLastScreenIndex: {},
            navHistory: [],
            showReview: false
        };

        const SECTIONS = [
            { id: 0, label: 'Entry' },
            { id: 1, label: 'Section I \u2014 Concept Clarity' },
            { id: 2, label: 'Section II \u2014 Order Imbalance' },
            { id: 3, label: 'Section III \u2014 Liquidity Reveal' },
            { id: 4, label: 'Section IV \u2014 Liquidity Simulation' },
            { id: 5, label: 'Section V \u2014 Mechanism Reset' },
            { id: 6, label: 'Section VI \u2014 Reflection' },
            { id: 7, label: 'Section VII \u2014 Mastery Assessment' }
        ];

        /* ═══════════════════════════════════════════════════════
           PROGRESS
        ═══════════════════════════════════════════════════════ */
        function computeProgress() {
            const v = STATE.visitedSections.size;
            const base = Math.min(v, 7);
            let pct = Math.round((base / 7) * 85);
            if (STATE.assessment.passed) pct = 100;
            else if (STATE.assessment.scorePercent > 0) pct = Math.max(pct, 90);
            return pct;
        }
        function updateProgress() { const pct = computeProgress(); document.getElementById('progress-label').textContent = 'Progress ' + pct + '%'; document.getElementById('progress-bar-fill').style.width = pct + '%'; }
        function visit(sid) { if (!STATE.visitedSections.has(sid)) { STATE.visitedSections.add(sid); updateProgress(); } renderNav(); }

        /* ═══════════════════════════════════════════════════════
           NAVIGATION
        ═══════════════════════════════════════════════════════ */
        function goToSection(sid, screenIndex, pushHistory) {
            const allowed = STATE.visitedSections.has(sid) || sid <= Math.max(...[...STATE.visitedSections], 0) + 1 || sid === 0;
            if (!allowed) return;
            if (pushHistory !== false) STATE.navHistory.push({ sectionId: STATE.currentSectionId, screenIndex: STATE.currentScreenIndex });
            STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
            STATE.currentSectionId = sid;
            STATE.currentScreenIndex = (screenIndex !== undefined && screenIndex !== null) ? screenIndex : 0;
            STATE.showReview = false;
            visit(sid); renderNav(); renderScreen();
            const nav = document.getElementById('section-nav');
            if (nav.classList.contains('open')) toggleNavDrawer();
        }
        function goBack() {
            if (STATE.showReview) { STATE.showReview = false; renderScreen(); return; }

                const isCurrent = STATE.currentSectionId === s.id;
                const isVisited = STATE.visitedSections.has(s.id);
                const isAccessible = isVisited || s.id <= Math.max(...[...STATE.visitedSections], 0) + 1;
                const div = document.createElement('div');
                div.className = 'sn-item' + (isCurrent ? ' current' : '') + (isVisited ? ' visited' : '');
                div.setAttribute('tabindex', isAccessible ? '0' : '-1');
                div.setAttribute('role', 'button');
                div.setAttribute('aria-label', s.label + (isCurrent ? ', current' : isVisited ? ', visited' : ', not visited'));
                div.innerHTML = `<span class="sn-dot"></span><span>${s.label}</span>`;
                if (isAccessible) {
                    div.onclick = () => { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); };
                    div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); } };

                c.appendChild(div);
            });

                2: {
                    // Breakout peak stays at 130px; reversal drops to 44px (well below line) ✓
                    candles: [
                        { h: 88, col: 'rgba(120,210,160,.22)', bdr: 'rgba(120,210,160,.4)' },
                        { h: 130, col: 'rgba(120,210,160,.38)', bdr: 'rgba(120,210,160,.65)' },

            { explanation: 'Imbalance is unequal pressure between buyers and sellers at execution.', clarifyTopic: 'imbalance' },
            { explanation: 'Obvious levels concentrate resting orders, creating liquidity.', clarifyTopic: 'liquidity' },
            { explanation: 'A breakout is an event, not a guarantee. Direction still depends on conditions.', clarifyTopic: 'guarantees' },
            { explanation: 'Clustered stops create a pool of resting orders at that area.', clarifyTopic: 'stopclusters' }
        ];

        function buildReviewAnswers() {
            const rows = A_QUESTIONS.map((q, i) => {
                const userAns = STATE.assessment.answers[i];
                const correct = userAns === q.correct;
                const rv = A_REVIEW_DATA[i];
                const icon = correct ? '&#10003;' : '&#10007;';
                const iconColor = correct ? 'var(--m-green-txt)' : 'var(--m-red-txt)';
                return `
<div style="background:var(--m-surf2);border:1px solid var(--m-bdr);border-radius:6px;padding:1rem 1.1rem;margin-bottom:.85rem">
  <p style="font-size:.8rem;font-weight:600;letter-spacing:.04em;color:var(--m-gold);margin-bottom:.6rem">Q${i + 1}</p>
  <p style="font-size:.9rem;color:var(--m-txt);margin-bottom:.75rem;line-height:1.5">${q.q}</p>
  <p style="font-size:.82rem;margin-bottom:.3rem"><span style="color:${iconColor};font-weight:700;margin-right:.35rem">${icon}</span><span style="color:var(--m-muted)">Your answer:</span> <span style="color:var(--m-txt)">${escHtml(userAns || '(no answer)')}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);margin-bottom:.75rem">Correct answer: <span style="color:var(--m-txt);font-weight:500">${escHtml(q.correct)}</span></p>
  <p style="font-size:.82rem;color:var(--m-muted);line-height:1.55;margin-bottom:.65rem">${rv.explanation}</p>
  <button class="clarify-btn" data-topic="${rv.clarifyTopic}">Clarify</button>
</div>`}).join('');
            return `
<p class="scr-eyebrow">Section VII &mdash; Review Answers</p>
<h2 class="scr-h2">Assessment Breakdown</h2>
${rows}
<div class="btn-row"><button class="btn-ghost" id="review-back-results">Back to Results</button></div>`;
        }

        /* ── Score ── */
        function computeScore() {
            let correct = 0;
            A_QUESTIONS.forEach((q, i) => { if (STATE.assessment.answers[i] === q.correct) correct++; });
            const pct = Math.round((correct / A_QUESTIONS.length) * 100);
            STATE.assessment.scorePercent = pct;
            STATE.assessment.passed = pct >= 70;
            STATE.assessment.isSubmitted = true;
            if (STATE.assessment.passed) {
                STATE.verified = true;
                try {
                    const saved = JSON.parse(localStorage.getItem('pp_mm_modules') || '{}');
                    saved['1.3'] = { verified: true, mastery: pct, mastery_percent: pct, status: 'Verified', progress: 100 };
                    localStorage.setItem('pp_mm_modules', JSON.stringify(saved));
                } catch (e) { }
            }
            updateProgress();
        }

        /* ═══════════════════════════════════════════════════════
           EVENT HANDLERS
        ═══════════════════════════════════════════════════════ */
        function attachHandlers() {
            const $ = id => document.getElementById(id);
            const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

            // Entry
            on('begin-btn', 'click', () => goToSection(1, 0));

            // S1
            on('s1s1-cont', 'click', () => { STATE.navHistory.push({ sectionId: 1, screenIndex: 0 }); STATE.currentScreenIndex = 1; renderScreen(); });
            on('s1s2-cont', 'click', () => goToSection(2, 0));

            // S2
            on('s2s1-cont', 'click', () => { STATE.navHistory.push({ sectionId: 2, screenIndex: 0 }); STATE.currentScreenIndex = 1; renderScreen(); });
            on('s2s2-cont', 'click', () => goToSection(3, 0));

            // S3
            on('s3s1-cont', 'click', () => { STATE.navHistory.push({ sectionId: 3, screenIndex: 0 }); STATE.currentScreenIndex = 1; renderScreen(); });
            on('s3s2-cont', 'click', () => { STATE.simulationPhase = 0; goToSection(4, 0); });

            // S4 — simulation
            const simPick = (ch) => { STATE.simulationChoice = ch; renderScreen(); };
            on('sim-opt1', 'click', () => simPick('break'));
            on('sim-opt2', 'click', () => simPick('reject'));
            on('sim-opt3', 'click', () => simPick('unknown'));
            on('s4-next', 'click', () => { STATE.simulationPhase = 1; renderScreen(); });
            on('s4-phase2', 'click', () => { STATE.simulationPhase = 2; renderScreen(); });
            on('s4-phase3', 'click', () => { STATE.simulationPhase = 3; renderScreen(); });
            on('s4-cont-s5', 'click', () => goToSection(5, 0));

            // S5
            on('s5-cont', 'click', () => goToSection(6, 0));

            // S6
            on('s6-submit', 'click', () => {
                const q1 = ($('ref-q1') || {}).value || '';
                const q2 = ($('ref-q2') || {}).value || '';
                if (q1.trim().length < 5 || q2.trim().length < 5) {
                    const err = $('ref-error'); if (err) err.style.display = 'block'; return;
                }
                STATE.reflection = { q1, q2 };
                goToSection(7, 0);
            });

            // S7 — assessment
            document.querySelectorAll('[data-ans]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (STATE.assessment.isSubmitted) return;
                    const qi = STATE.assessment.currentQ;
                    if (STATE.assessment.answers[qi] === btn.dataset.ans) { STATE.assessment.answers[qi] = null; }
                    else { STATE.assessment.answers[qi] = btn.dataset.ans; }
                    renderScreen();
                });
            });
            on('assess-back', 'click', () => { if (STATE.assessment.currentQ > 0) { STATE.assessment.currentQ--; renderScreen(); } });
            on('assess-next', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                STATE.assessment.currentQ++; renderScreen();
            });
            on('assess-submit', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                computeScore(); renderScreen();
            });
            on('result-return', 'click', () => { window.location.href = 'market-mechanics.html'; });
            on('result-retry', 'click', () => {
                STATE.assessment.answers = [null, null, null, null, null];
                STATE.assessment.isSubmitted = false; STATE.assessment.scorePercent = null;
                STATE.assessment.passed = null; STATE.assessment.currentQ = 0; STATE.showReview = false;
                renderScreen();
            });
            on('result-review-answers', 'click', () => { if (STATE.assessment.isSubmitted) { STATE.showReview = true; renderScreen(); } });
            on('review-back-results', 'click', () => { STATE.showReview = false; renderScreen(); });

            // Clarify
            document.querySelectorAll('.clarify-btn').forEach(btn => {
                btn.addEventListener('click', () => openClarify(btn.dataset.topic));
            });
        }

        /* ═══════════════════════════════════════════════════════
           INIT
        ═══════════════════════════════════════════════════════ */
        (function init() {
            STATE.navHistory = [];
            STATE.currentSectionId = 0;
            STATE.currentScreenIndex = 0;
            visit(0); renderNav(); renderScreen();
        })();
    </script>
</body>

</html>
