<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProsperPath | Interactive Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: var(--space-4);
      background-image: radial-gradient(circle at 50% 0%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
    }
    
    .demo-entry-card {
      background: rgba(20, 20, 22, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-2xl, 24px);
      padding: var(--space-10) var(--space-8);
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-header {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      color: #ffffff;
      margin-bottom: var(--space-8);
      text-decoration: none;
    }
    
    .demo-title {
      font-size: 2rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      margin-bottom: var(--space-2);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    
    .demo-subtitle {
      font-size: 1.125rem;
      color: var(--color-text-secondary);
      margin-bottom: var(--space-8);
    }
    
    .demo-list {
      text-align: left;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-lg, 12px);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
    }
    
    .demo-list-title {
      font-weight: 600;
      margin-bottom: var(--space-4);
      font-size: 0.95rem;
      color: var(--color-text-primary);
    }
    
    .demo-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    
    .demo-list li {
      position: relative;
      padding-left: 1.5rem;
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
    }
    
    .demo-list li::before {
      content: "";
      position: absolute;
      left: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
      top: 50%;
      transform: translateY(-50%);
    }
    
    .demo-time {
      font-size: 0.85rem;
      color: var(--color-accent);
      font-weight: 500;
      margin-bottom: var(--space-8);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(245, 200, 66, 0.1);
      padding: 0.5rem 1rem;
      border-radius: 100px;
    }
    
    .demo-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    
    .btn {
      width: 100%;
      justify-content: center;
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--color-text-secondary);
      border: 1px solid transparent;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md, 8px);
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    
    .btn-secondary:hover {
      color: var(--color-text-primary);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="demo-entry-card">
    <a href="index.html" class="logo-header">
      <span class="logo-icon" style="color: var(--color-accent);">⚡</span>
      <span>ProsperPath</span>
    </a>
    <h1 class="demo-title">ProsperPath Interactive Demo</h1>
    <p class="demo-subtitle">Explore how markets actually work.</p>
    
    <div class="demo-list">
      <div class="demo-list-title">This short demo will show you:</div>
      <ul>
        <li>Market mechanics</li>
        <li>Liquidity movement</li>
        <li>Structure</li>
        <li>The ProsperPath platform</li>
      </ul>
    </div>
    
    <div class="demo-time">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      Demo time: ~2 minutes
    </div>
    
    <div class="demo-actions">
      <a href="index.html?tour=start" class="btn btn-primary btn-lg">Begin Demo</a>
      <a href="index.html" class="btn-secondary">Exit</a>
    </div>
  </div>
</body>
</html>
