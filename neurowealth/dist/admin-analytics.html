<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics — ProsperPath</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #12121f;
            --bg-card: #1a1a2e;
            --bg-card-hover: #222240;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.15);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --success: #00d4aa;
            --danger: #ff6b6b;
            --warning: #ffd93d;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ---- ACCESS GATE ---- */
        #access-gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            animation: fadeIn 0.5s ease;
        }

        .gate-icon {
            font-size: 64px;
        }

        .gate-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .gate-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .gate-input {
            background: var(--bg-card);
            border: 2px solid var(--text-muted);
            border-radius: var(--radius-sm);
            padding: 14px 24px;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
            width: 280px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .gate-input:focus {
            border-color: var(--accent);
        }

        .gate-input.shake {
            animation: shake 0.4s ease;
            border-color: var(--danger);
        }

        .gate-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3);
        }

        .gate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 170, 0.5);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-4px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- DASHBOARD ---- */
        #dashboard {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
            animation: fadeIn 0.6s ease;
        }

        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dash-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dash-actions {
            display: flex;
            gap: 12px;
        }

        .dash-btn {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dash-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .dash-btn.danger {
            border-color: rgba(255, 107, 107, 0.3);
            color: var(--danger);
        }

        .dash-btn.danger:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        /* ---- STAT CARDS GRID ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            border-radius: 4px 0 0 4px;
        }

        .stat-card.danger::before {
            background: var(--danger);
        }

        .stat-card.warning::before {
            background: var(--warning);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stat-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-value.green {
            color: var(--success);
        }

        .stat-value.red {
            color: var(--danger);
        }

        .stat-value.yellow {
            color: var(--warning);
        }

        /* ---- SECTION ---- */
        .section {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: var(--bg-card-hover);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-toggle {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .section-body {
            padding: 20px 24px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }

        .section.open .section-body {
            max-height: 4000px;
            overflow-y: auto;
        }

        .section.open .section-toggle {
            transform: rotate(180deg);
        }

        .section-badge {
            background: var(--accent-glow);
            color: var(--accent);
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        /* ---- TABLE ---- */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .data-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            white-space: nowrap;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            vertical-align: top;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.win {
            background: rgba(0, 212, 170, 0.15);
            color: var(--success);
        }

        .badge.loss {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }

        .badge.open {
            background: rgba(255, 217, 61, 0.15);
            color: var(--warning);
        }

        .badge.buy {
            background: rgba(0, 212, 170, 0.15);
            color: var(--success);
        }

        .badge.sell {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }

        .badge.executed {
            background: rgba(0, 212, 170, 0.15);
            color: var(--success);
        }

        .badge.ignored {
            background: rgba(136, 136, 160, 0.15);
            color: var(--text-muted);
        }

        /* ---- PROMPT CARD ---- */
        .prompt-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .prompt-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            gap: 12px;
        }

        .prompt-card-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .prompt-card-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prompt-card-body {
            display: none;
            padding: 0 16px 16px;
        }

        .prompt-card.open .prompt-card-body {
            display: block;
        }

        .prompt-block {
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 8px;
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .prompt-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-top: 12px;
        }

        /* ---- INDICATOR DETAIL ---- */
        .ind-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }

        .ind-item {
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .ind-item-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .ind-item-value {
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 2px;
        }

        /* ---- DONUT CHART ---- */
        .donut-container {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .donut-chart {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .donut-chart svg {
            transform: rotate(-90deg);
        }

        .donut-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .donut-label-value {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .donut-label-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* ---- PH LOG CARDS ---- */
        .ph-log-card {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .ph-log-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(0, 212, 170, 0.2);
            transform: translateX(4px);
        }

        .ph-log-card::after {
            content: '→';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .ph-log-card:hover::after {
            opacity: 1;
        }

        .ph-card-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .ph-card-name small {
            display: block;
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .ph-card-price {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: right;
            min-width: 80px;
        }

        .ph-card-signal {
            min-width: 60px;
            text-align: center;
        }

        .ph-card-confidence {
            min-width: 50px;
            text-align: center;
        }

        .conf-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 800;
            border: 3px solid;
        }

        .conf-ring.high {
            border-color: var(--success);
            color: var(--success);
        }

        .conf-ring.mid {
            border-color: var(--warning);
            color: var(--warning);
        }

        .conf-ring.low {
            border-color: var(--danger);
            color: var(--danger);
        }

        .ph-card-arrow {
            width: 24px;
            text-align: center;
        }

        /* ---- TRADE LOG CARDS ---- */
        .trade-log-card {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto;
            align-items: center;
            gap: 16px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .trade-log-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(0, 212, 170, 0.2);
            transform: translateX(4px);
        }

        .trade-log-card::after {
            content: '\2192';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .trade-log-card:hover::after {
            opacity: 1;
        }

        .trade-card-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .trade-card-name small {
            display: block;
            font-weight: 400;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .trade-card-entry {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: right;
            min-width: 80px;
        }

        .trade-card-side {
            min-width: 50px;
            text-align: center;
        }

        .trade-card-pnl {
            min-width: 80px;
            text-align: right;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .trade-card-arrow {
            width: 24px;
            text-align: center;
        }

        /* ---- MODAL OVERLAY ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideUp 0.35s ease;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 28px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .modal-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .modal-symbol {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .modal-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }

        .modal-body {
            padding: 20px 28px 28px;
        }

        .modal-section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 10px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-section-label.accent {
            color: var(--accent);
        }

        .modal-section-label.purple {
            color: #a78bfa;
        }

        .modal-section-label.orange {
            color: #fb923c;
        }

        .modal-setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 6px;
        }

        .modal-setup-item {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 14px;
            border-radius: 10px;
        }

        .modal-setup-item .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .modal-setup-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-response-block {
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 0.82rem;
            line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .data-table {
                font-size: 0.75rem;
            }

            .dash-title {
                font-size: 1.3rem;
            }

            .section-body {
                padding: 12px 16px;
            }

            .ph-log-card {
                grid-template-columns: 1fr auto auto;
                gap: 10px;
                padding: 12px 14px;
            }

            .ph-card-price {
                display: none;
            }

            .ph-card-arrow {
                display: none;
            }

            .trade-log-card {
                grid-template-columns: 1fr auto auto;
                gap: 10px;
                padding: 12px 14px;
            }

            .trade-card-entry {
                display: none;
            }

            .trade-card-arrow {
                display: none;
            }

            .modal-content {
                max-width: 100%;
                border-radius: 16px;
            }

            .modal-body {
                padding: 16px 18px 24px;
            }

            .modal-setup-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ACCESS GATE -->
    <div id="access-gate">
        <div class="gate-icon">🔐</div>
        <div class="gate-title">Admin Analytics</div>
        <div class="gate-sub">Enter your access code to continue</div>
        <input type="password" id="access-code-input" class="gate-input" placeholder="••••••••" autocomplete="off">
        <button id="access-btn" class="gate-btn">Unlock Dashboard</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="dash-header">
            <div class="dash-title">📊 ProsperPath Analytics</div>
            <div class="dash-actions">
                <button class="dash-btn" onclick="refreshDashboard()">🔄 Refresh</button>
                <button class="dash-btn" onclick="exportData()">📥 Export JSON</button>
                <button class="dash-btn danger" onclick="clearAllData()">🗑️ Clear Data</button>
            </div>
        </div>

        <!-- STAT CARDS -->
        <div class="stats-grid" id="stats-grid"></div>

        <!-- PATTERN HUNTER ACCURACY -->
        <div class="section open" id="section-ph-accuracy">
            <div class="section-header" onclick="toggleSection('section-ph-accuracy')">
                <div class="section-title">🎯 Pattern Hunter Prediction Accuracy <span class="section-badge"
                        id="ph-accuracy-badge">—</span></div>
                <div class="section-toggle">▼</div>
            </div>
            <div class="section-body" id="ph-accuracy-body"></div>
        </div>

        <!-- PATTERN HUNTER EXECUTION RATE -->
        <div class="section open" id="section-ph-exec">
            <div class="section-header" onclick="toggleSection('section-ph-exec')">
                <div class="section-title">⚡ Pattern Hunter Execution Rate <span class="section-badge"
                        id="ph-exec-badge">—</span></div>
                <div class="section-toggle">▼</div>
            </div>
            <div class="section-body" id="ph-exec-body"></div>
        </div>

        <!-- TRADE PERFORMANCE -->
        <div class="section open" id="section-trades">
            <div class="section-header" onclick="toggleSection('section-trades')">

                </div>
                <div class="section-toggle">▼</div>

            <div class="section-body" id="trades-body"></div>
        </div>

        <!-- PATTERN HUNTER FULL LOGS -->
        <div class="section" id="section-ph-logs">
            <div class="section-header" onclick="toggleSection('section-ph-logs')">
                <div class="section-title">📋 Pattern Hunter Full Logs <span class="section-badge"
                        id="ph-logs-badge">—</span></div>
                <div class="section-toggle">▼</div>
            </div>
            <div class="section-body" id="ph-logs-body"></div>
        </div>

        <!-- AI PROMPTS -->
        <div class="section" id="section-ai-prompts">
            <div class="section-header" onclick="toggleSection('section-ai-prompts')">
                <div class="section-title">🤖 AI Prompts Log <span class="section-badge" id="ai-prompts-badge">—</span>
                </div>
                <div class="section-toggle">▼</div>
            </div>
            <div class="section-body" id="ai-prompts-body"></div>
        </div>

        <!-- FULL TRADE HISTORY -->
        <div class="section" id="section-trade-history">
            <div class="section-header" onclick="toggleSection('section-trade-history')">
                <div class="section-title">📊 Full Trade History <span class="section-badge"
                        id="trade-history-badge">—</span></div>
                <div class="section-toggle">▼</div>

    <!-- PH DETAIL MODAL -->
    <div class="modal-overlay" id="ph-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-left">
                    <div class="modal-symbol" id="modal-symbol">—</div>
                    <div class="modal-meta" id="modal-meta">—</div>
                </div>
                <button class="modal-close" onclick="closePhModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- TRADE DETAIL MODAL -->
    <div class="modal-overlay" id="trade-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-left">
                    <div class="modal-symbol" id="trade-modal-symbol">—</div>
                    <div class="modal-meta" id="trade-modal-meta">—</div>
                </div>
                <button class="modal-close" onclick="closeTradeModal()">✕</button>
            </div>
            <div class="modal-body" id="trade-modal-body"></div>
        </div>
    </div>

    <script>
        const ACCESS_CODE = 'lolxd123';
        const STORAGE_KEY = 'prosperpath_analytics';
        const SESSION_KEY = 'admin_analytics_access';

        // ---- ACCESS GATE ----
        function checkAccess() {
            if (sessionStorage.getItem(SESSION_KEY) === 'granted') {
                showDashboard();
                return;
            }
        }

        document.getElementById('access-btn').addEventListener('click', tryAccess);
        document.getElementById('access-code-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') tryAccess();
        });

        function tryAccess() {
            const input = document.getElementById('access-code-input');
            if (input.value === ACCESS_CODE) {
                sessionStorage.setItem(SESSION_KEY, 'granted');
                showDashboard();
            } else {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                input.value = '';
            }
        }

        function showDashboard() {
            document.getElementById('access-gate').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            refreshDashboard();
        }

        // ---- DATA LOADING ----
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) { console.warn('Load error', e); }
            return { patternHunterLogs: [], aiPromptLogs: [], tradeLogs: [] };
        }

        // ---- HELPERS ----
        function fmtDate(ts) {
            if (!ts) return '—';
            const d = new Date(ts);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        function fmtPrice(v) {
            if (v == null) return '—';
            return '$' + Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
        }
        function fmtPnl(v) {
            if (v == null) return '—';
            const sign = v >= 0 ? '+' : '';
            return sign + '$' + v.toFixed(2);
        }

        function createDonut(percent, label, color1, color2) {
            const r = 48, c = 2 * Math.PI * r;
            const p = isNaN(percent) ? 0 : percent;
            const fill = (p / 100) * c;
            const rest = c - fill;
            return `
            <div class="donut-chart">
                <svg width="120" height="120" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color2}" stroke-width="10" stroke-dasharray="${rest} ${fill}" stroke-dashoffset="0"/>
                    <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color1}" stroke-width="10" stroke-dasharray="${fill} ${rest}" stroke-dashoffset="0"/>
                </svg>
                <div class="donut-label">
                    <div class="donut-label-value" style="color:${color1}">${p}%</div>
                    <div class="donut-label-sub">${label}</div>
                </div>
            </div>`;
        }

        function renderIndicators(ind) {
            if (!ind) return '<span style="color:var(--text-muted)">No data</span>';
            const fp = (v) => v != null ? '$' + Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—';
            const fn = (v, d = 2) => v != null ? Number(v).toFixed(d) : '—';
            const items = [];

            // ---- Core ----
            if (ind.price != null) items.push({ l: 'Price', v: fp(ind.price) });
            if (ind.rsi != null) items.push({ l: 'RSI (14)', v: ind.rsi });
            if (ind.sma20 != null) items.push({ l: 'SMA 20', v: fp(ind.sma20) });
            if (ind.sma50 != null) items.push({ l: 'SMA 50', v: fp(ind.sma50) });
            if (ind.sma200 != null) items.push({ l: 'SMA 200', v: fp(ind.sma200) });
            if (ind.macd) {
                items.push({ l: 'MACD Line', v: fn(ind.macd.macdLine) });
                items.push({ l: 'MACD Signal', v: fn(ind.macd.signal) });
                items.push({ l: 'MACD Hist', v: fn(ind.macd.histogram) });
            }
            if (ind.bollingerBands) {
                items.push({ l: 'BB Upper', v: fp(ind.bollingerBands.upper) });
                items.push({ l: 'BB Middle', v: fp(ind.bollingerBands.middle) });
                items.push({ l: 'BB Lower', v: fp(ind.bollingerBands.lower) });
            }

            // ---- EMA Ribbon ----
            if (ind.emaRibbon) {
                if (ind.emaRibbon.ema9 != null) items.push({ l: 'EMA 9', v: fp(ind.emaRibbon.ema9) });
                if (ind.emaRibbon.ema21 != null) items.push({ l: 'EMA 21', v: fp(ind.emaRibbon.ema21) });
                if (ind.emaRibbon.ema55 != null) items.push({ l: 'EMA 55', v: fp(ind.emaRibbon.ema55) });
                if (ind.emaRibbon.ema100 != null) items.push({ l: 'EMA 100', v: fp(ind.emaRibbon.ema100) });
                if (ind.emaRibbon.ema200 != null) items.push({ l: 'EMA 200', v: fp(ind.emaRibbon.ema200) });
            }

            // ---- Momentum / Oscillators ----
            if (ind.stochastic) {
                items.push({ l: 'Stoch %K', v: fn(ind.stochastic.k) });
                items.push({ l: 'Stoch %D', v: fn(ind.stochastic.d) });
            }
            if (ind.williamsR != null) items.push({ l: 'Williams %R', v: fn(ind.williamsR) });
            if (ind.cci != null) items.push({ l: 'CCI (20)', v: fn(ind.cci, 0) });
            if (ind.roc != null) items.push({ l: 'ROC (12)', v: fn(ind.roc) + '%' });
            if (ind.momentum != null) items.push({ l: 'Momentum', v: fn(ind.momentum) });
            if (ind.awesomeOsc != null) items.push({ l: 'Awesome Osc', v: fn(ind.awesomeOsc) });
            if (ind.ultimateOsc != null) items.push({ l: 'Ultimate Osc', v: fn(ind.ultimateOsc) });
            if (ind.tsi != null) items.push({ l: 'TSI', v: fn(ind.tsi) });

            // ---- Trend ----
            if (ind.adx) items.push({ l: 'ADX (14)', v: fn(ind.adx.adx) });
            if (ind.ichimoku) {
                items.push({ l: 'Tenkan', v: fp(ind.ichimoku.tenkan) });
                items.push({ l: 'Kijun', v: fp(ind.ichimoku.kijun) });
                items.push({ l: 'Senkou A', v: fp(ind.ichimoku.senkouA) });
                items.push({ l: 'Senkou B', v: fp(ind.ichimoku.senkouB) });
            }
            if (ind.hma != null) items.push({ l: 'HMA (9)', v: fp(ind.hma) });
            if (ind.vwma != null) items.push({ l: 'VWMA (20)', v: fp(ind.vwma) });

            // ---- Volatility ----
            if (ind.atr != null) items.push({ l: 'ATR (14)', v: fn(ind.atr) });
            if (ind.stdDev != null) items.push({ l: 'Std Dev', v: fn(ind.stdDev) });
            if (ind.keltnerChannel) {
                items.push({ l: 'Keltner Up', v: fp(ind.keltnerChannel.upper) });
                items.push({ l: 'Keltner Mid', v: fp(ind.keltnerChannel.middle) });
                items.push({ l: 'Keltner Low', v: fp(ind.keltnerChannel.lower) });
            }
            if (ind.donchianChannel) {
                items.push({ l: 'Donchian Up', v: fp(ind.donchianChannel.upper) });
                items.push({ l: 'Donchian Mid', v: fp(ind.donchianChannel.middle) });
                items.push({ l: 'Donchian Low', v: fp(ind.donchianChannel.lower) });
            }
            if (ind.histVol != null) items.push({ l: 'Hist Vol', v: fn(ind.histVol, 1) + '%' });

            // ---- Volume ----
            if (ind.obv != null) items.push({ l: 'OBV', v: Number(ind.obv).toLocaleString() });
            if (ind.adLine != null) items.push({ l: 'A/D Line', v: Number(ind.adLine).toLocaleString() });

            return `<div class="ind-grid">${items.map(i => `<div class="ind-item"><div class="ind-item-label">${i.l}</div><div class="ind-item-value">${i.v}</div></div>`).join('')}</div>`;
        }

        // ---- DASHBOARD RENDERING ----
        function refreshDashboard() {
            const data = loadData();
            const phLogs = data.patternHunterLogs || [];
            const aiLogs = data.aiPromptLogs || [];
            const tradeLogs = data.tradeLogs || [];

            // Calculate Stats
            const totalScans = phLogs.length;
            const executed = phLogs.filter(l => l.wasExecuted);
            const notExecuted = phLogs.filter(l => !l.wasExecuted);
            const withOutcome = executed.filter(l => l.tradeOutcome);
            const phWins = withOutcome.filter(l => l.tradeOutcome === 'win').length;
            const phLosses = withOutcome.filter(l => l.tradeOutcome === 'loss').length;

            const closedTrades = tradeLogs.filter(t => t.result === 'win' || t.result === 'loss');
            const tradeWins = closedTrades.filter(t => t.result === 'win').length;
            const tradeLosses = closedTrades.filter(t => t.result === 'loss').length;
            const totalPnl = closedTrades.reduce((sum, t) => sum + (t.pnl || 0), 0);

            const phAccuracy = withOutcome.length > 0 ? ((phWins / withOutcome.length) * 100).toFixed(1) : 'N/A';
            const execRate = totalScans > 0 ? ((executed.length / totalScans) * 100).toFixed(1) : '0.0';
            const tradeWinRate = closedTrades.length > 0 ? ((tradeWins / closedTrades.length) * 100).toFixed(1) : 'N/A';

            // Stat Cards
            document.getElementById('stats-grid').innerHTML = `
            <div class="stat-card">
                <div class="stat-label">Total PH Scans</div>
                <div class="stat-value">${totalScans}</div>
                <div class="stat-sub">${executed.length} executed</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PH Prediction Accuracy</div>
                <div class="stat-value ${phAccuracy !== 'N/A' && parseFloat(phAccuracy) >= 50 ? 'green' : phAccuracy !== 'N/A' ? 'red' : ''}">${phAccuracy}${phAccuracy !== 'N/A' ? '%' : ''}</div>
                <div class="stat-sub">${phWins}W / ${phLosses}L</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PH Execution Rate</div>
                <div class="stat-value yellow">${execRate}%</div>
                <div class="stat-sub">${executed.length} / ${totalScans} scans</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value">${tradeLogs.length}</div>
                <div class="stat-sub">${closedTrades.length} closed</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Trade Win Rate</div>
                <div class="stat-value ${tradeWinRate !== 'N/A' && parseFloat(tradeWinRate) >= 50 ? 'green' : tradeWinRate !== 'N/A' ? 'red' : ''}">${tradeWinRate}${tradeWinRate !== 'N/A' ? '%' : ''}</div>
                <div class="stat-sub">${tradeWins}W / ${tradeLosses}L</div>
            </div>
            <div class="stat-card ${totalPnl >= 0 ? '' : 'danger'}">
                <div class="stat-label">Total P&L</div>
                <div class="stat-value ${totalPnl >= 0 ? 'green' : 'red'}">${fmtPnl(totalPnl)}</div>
                <div class="stat-sub">All closed trades</div>
            </div>
        `;

            // Badges
            document.getElementById('ph-accuracy-badge').textContent = phAccuracy !== 'N/A' ? phAccuracy + '%' : 'N/A';
            document.getElementById('ph-exec-badge').textContent = execRate + '%';
            document.getElementById('trades-badge').textContent = tradeWinRate !== 'N/A' ? tradeWinRate + '% win' : 'N/A';
            document.getElementById('ph-logs-badge').textContent = totalScans + ' scans';
            document.getElementById('ai-prompts-badge').textContent = aiLogs.length + ' prompts';
            document.getElementById('trade-history-badge').textContent = tradeLogs.length + ' trades';

            // ---- PH ACCURACY SECTION ----
            if (withOutcome.length === 0) {
                document.getElementById('ph-accuracy-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📉</div>No Pattern Hunter trades with outcomes yet.<br>Execute a trade from Pattern Hunter and close it to see accuracy.</div>`;
            } else {
                const pct = parseFloat(phAccuracy);
                document.getElementById('ph-accuracy-body').innerHTML = `
                <div class="donut-container">
                    ${createDonut(pct, 'Accuracy', 'var(--success)', 'var(--danger)')}
                    <div class="donut-legend">
                        <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Winning Predictions: ${phWins}</div>
                        <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Losing Predictions: ${phLosses}</div>
                        <div class="legend-item"><div class="legend-dot" style="background:var(--text-muted)"></div> Total Evaluated: ${withOutcome.length}</div>
                    </div>
                </div>`;
            }

            // ---- PH EXECUTION SECTION ----
            if (totalScans === 0) {
                document.getElementById('ph-exec-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div>No Pattern Hunter scans yet.</div>`;
            } else {
                const ePct = parseFloat(execRate);
                document.getElementById('ph-exec-body').innerHTML = `
                <div class="donut-container">
                    ${createDonut(ePct, 'Executed', 'var(--success)', 'var(--text-muted)')}
                    <div class="donut-legend">
                        <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Executed by User: ${executed.length} (${ePct}%)</div>
                        <div class="legend-item"><div class="legend-dot" style="background:var(--text-muted)"></div> Not Executed: ${notExecuted.length} (${(100 - ePct).toFixed(1)}%)</div>
                        <div class="legend-item" style="opacity:0.6">Total Scans: ${totalScans}</div>
                    </div>
                </div>`;
            }

            // ---- TRADES SECTION ----
            if (closedTrades.length === 0) {
                document.getElementById('trades-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">💹</div>No closed trades yet. Close some positions to see win/loss stats.</div>`;
            } else {
                const wr = parseFloat(tradeWinRate);
                document.getElementById('trades-body').innerHTML = `
                <div class="donut-container">
                    ${createDonut(wr, 'Win Rate', 'var(--success)', 'var(--danger)')}
                    <div class="donut-legend">
                        <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Wins: ${tradeWins} (${wr}%)</div>
                        <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Losses: ${tradeLosses} (${(100 - wr).toFixed(1)}%)</div>
                        <div class="legend-item" style="color:${totalPnl >= 0 ? 'var(--success)' : 'var(--danger)'}">Total P&L: ${fmtPnl(totalPnl)}</div>
                    </div>
                </div>`;
            }

            // ---- PH FULL LOGS (Card Layout) ----
            // Store data globally for modal access
            window._phLogsData = phLogs;
            window._aiLogsData = aiLogs;

            if (phLogs.length === 0) {
                document.getElementById('ph-logs-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div>No Pattern Hunter logs yet.</div>`;
            } else {
                let html = '';
                phLogs.slice().reverse().forEach((log, idx) => {
                    const ai = log.aiResult || {};
                    const conf = ai.confidence ? parseInt(ai.confidence) : 0;
                    const confClass = conf >= 70 ? 'high' : conf >= 40 ? 'mid' : 'low';
                    const sideBadge = ai.side ? `<span class="badge ${ai.side.toLowerCase()}">${ai.side}</span>` : '<span class="badge" style="opacity:0.4">—</span>';
                    const realIdx = phLogs.length - 1 - idx; // index in original (non-reversed) array

                    html += `
                    <div class="ph-log-card" onclick="openPhModal(${realIdx})">
                        <div class="ph-card-name">
                            ${escapeHtml(log.symbol)}
                            <small>${fmtDate(log.timestamp)}</small>
                        </div>
                        <div class="ph-card-price">${log.price || '—'}</div>
                        <div class="ph-card-signal">${sideBadge}</div>
                        <div class="ph-card-confidence">
                            <div class="conf-ring ${confClass}">${conf || '—'}</div>
                        </div>
                        <div class="ph-card-arrow"></div>
                    </div>`;
                });
                document.getElementById('ph-logs-body').innerHTML = html;
            }

            // ---- AI PROMPTS ----
            if (aiLogs.length === 0) {
                document.getElementById('ai-prompts-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">🤖</div>No AI prompts logged yet. Trigger Pattern Hunter to see prompts.</div>`;
            } else {
                let html = '';
                aiLogs.slice().reverse().forEach((log, i) => {
                    html += `
                    <div class="prompt-card" id="prompt-${i}">
                        <div class="prompt-card-header" onclick="document.getElementById('prompt-${i}').classList.toggle('open')">
                            <div>
                                <strong style="color:var(--text-primary)">${log.symbol}</strong>
                                <span class="prompt-card-meta">${fmtDate(log.timestamp)}</span>
                            </div>
                            <span style="color:var(--text-muted)">▶</span>
                        </div>
                        <div class="prompt-card-body">
                            <div class="prompt-label">📨 Prompt Sent</div>
                            <div class="prompt-block">${escapeHtml(log.prompt || '')}</div>
                            <div class="prompt-label" style="margin-top:16px">🤖 AI Response</div>
                            <div class="prompt-block">${escapeHtml(log.aiResponse || '')}</div>
                        </div>
                    </div>`;
                });
                document.getElementById('ai-prompts-body').innerHTML = html;
            }

            // ---- FULL TRADE HISTORY (Card Layout) ----
            window._tradeLogsData = tradeLogs;

            if (tradeLogs.length === 0) {
                document.getElementById('trade-history-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📊</div>No trades logged yet.</div>`;
            } else {
                let html = '';
                tradeLogs.slice().reverse().forEach((t, idx) => {
                    const realIdx = tradeLogs.length - 1 - idx;
                    const sideBadge = t.side ? `<span class="badge ${t.side.toLowerCase()}">${t.side.toUpperCase()}</span>` : '<span class="badge" style="opacity:0.4">—</span>';
                    const pnlColor = t.pnl != null ? (t.pnl >= 0 ? 'var(--success)' : 'var(--danger)') : 'var(--text-muted)';
                    const pnlText = t.pnl != null ? fmtPnl(t.pnl) : (t.result === 'open' ? 'OPEN' : '—');

                    html += `
                    <div class="trade-log-card" onclick="openTradeModal(${realIdx})">
                        <div class="trade-card-name">
                            ${escapeHtml(t.symbol || t.name || 'Unknown')}
                            <small>${fmtDate(t.timestamp)}</small>
                        </div>
                        <div class="trade-card-side">${sideBadge}</div>
                        <div class="trade-card-entry">${fmtPrice(t.entryPrice)}</div>
                        <div class="trade-card-pnl" style="color:${pnlColor}">${pnlText}</div>
                        <div class="trade-card-arrow"></div>
                    </div>`;
                });
                document.getElementById('trade-history-body').innerHTML = html;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ---- PH DETAIL MODAL ----
        function openPhModal(idx) {
            const phLogs = window._phLogsData || [];
            const aiLogs = window._aiLogsData || [];
            const log = phLogs[idx];
            if (!log) return;

            const ai = log.aiResult || {};
            const modal = document.getElementById('ph-modal');
            const sideColor = (ai.side || '').toUpperCase() === 'SELL' ? 'var(--danger)' : 'var(--success)';

            document.getElementById('modal-symbol').textContent = log.symbol;
            document.getElementById('modal-meta').textContent = fmtDate(log.timestamp) + ' • ' + (log.type || 'Market');

            // Find matching AI prompt log (closest timestamp to this PH scan)
            let matchedPrompt = null;
            if (aiLogs.length > 0) {
                const logTs = log.timestamp;
                matchedPrompt = aiLogs.reduce((best, curr) => {
                    const bestDiff = best ? Math.abs(best.timestamp - logTs) : Infinity;
                    const currDiff = Math.abs(curr.timestamp - logTs);
                    return currDiff < bestDiff ? curr : best;
                }, null);
                // Only use if within 5 minutes
                if (matchedPrompt && Math.abs(matchedPrompt.timestamp - logTs) > 300000) {
                    matchedPrompt = null;
                }
            }

            let bodyHtml = '';

            // ---- AI Trade Setup ----
            bodyHtml += `<div class="modal-section-label accent">🎯 AI Trade Setup</div>`;
            bodyHtml += `<div class="modal-setup-grid">
                <div class="modal-setup-item"><div class="label">Signal</div><div class="value" style="color:${sideColor}">${ai.side || '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Entry Zone</div><div class="value">${ai.entry || '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Stop Loss</div><div class="value" style="color:var(--danger)">${ai.stopLoss || '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Take Profit</div><div class="value" style="color:var(--success)">${ai.takeProfit || '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Confidence</div><div class="value">${ai.confidence || '—'}${ai.confidence ? '%' : ''}</div></div>
                <div class="modal-setup-item"><div class="label">Price at Scan</div><div class="value">${log.price || '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Executed</div><div class="value" style="color:${log.wasExecuted ? 'var(--success)' : 'var(--text-muted)'}">${log.wasExecuted ? '✓ Yes' : '✗ No'}</div></div>
                ${log.tradeOutcome ? `<div class="modal-setup-item"><div class="label">Outcome</div><div class="value" style="color:${log.tradeOutcome === 'win' ? 'var(--success)' : 'var(--danger)'}">${log.tradeOutcome.toUpperCase()}</div></div>` : ''}
            </div>`;

            // ---- Indicators ----
            if (log.indicators) {
                bodyHtml += `<div class="modal-section-label orange">📊 Indicators at Scan Time</div>`;
                bodyHtml += renderIndicators(log.indicators);
            }

            // ---- Full AI Response ----
            if (matchedPrompt && matchedPrompt.aiResponse) {
                bodyHtml += `<div class="modal-section-label accent" style="margin-top:24px">🤖 Full AI Analysis</div>`;
                bodyHtml += `<div class="modal-response-block">${escapeHtml(matchedPrompt.aiResponse)}</div>`;
            }

            // ---- AI Prompt ----
            if (matchedPrompt && matchedPrompt.prompt) {
                bodyHtml += `<div class="modal-section-label purple" style="margin-top:24px">📨 Prompt Sent to AI</div>`;
                bodyHtml += `<div class="modal-response-block" style="max-height:250px">${escapeHtml(matchedPrompt.prompt)}</div>`;
            }

            document.getElementById('modal-body').innerHTML = bodyHtml;
            modal.classList.add('active');

            // Close on overlay click (not content)
            modal.onclick = (e) => { if (e.target === modal) closePhModal(); };
        }

        function closePhModal() {
            document.getElementById('ph-modal').classList.remove('active');
        }

        // ---- TRADE DETAIL MODAL ----
        function openTradeModal(idx) {
            const tradeLogs = window._tradeLogsData || [];
            const t = tradeLogs[idx];
            if (!t) return;

            const modal = document.getElementById('trade-modal');
            const sideColor = (t.side || '').toLowerCase() === 'sell' ? 'var(--danger)' : 'var(--success)';
            const pnlColor = t.pnl != null ? (t.pnl >= 0 ? 'var(--success)' : 'var(--danger)') : 'var(--text-muted)';

            document.getElementById('trade-modal-symbol').textContent = t.symbol || t.name || 'Unknown';
            document.getElementById('trade-modal-meta').textContent = fmtDate(t.timestamp) + (t.source ? ' • ' + t.source : '');

            let bodyHtml = '';

            // ---- Trade Details ----
            bodyHtml += `<div class="modal-section-label accent">💹 Trade Details</div>`;
            bodyHtml += `<div class="modal-setup-grid">
                <div class="modal-setup-item"><div class="label">Side</div><div class="value" style="color:${sideColor}">${(t.side || '—').toUpperCase()}</div></div>
                <div class="modal-setup-item"><div class="label">Quantity</div><div class="value">${t.qty ? Number(t.qty).toFixed(6) : '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Entry Price</div><div class="value">${fmtPrice(t.entryPrice)}</div></div>
                <div class="modal-setup-item"><div class="label">Exit Price</div><div class="value">${t.exitPrice != null ? fmtPrice(t.exitPrice) : '—'}</div></div>
                <div class="modal-setup-item"><div class="label">P&L</div><div class="value" style="color:${pnlColor}">${t.pnl != null ? fmtPnl(t.pnl) : '—'}</div></div>
                <div class="modal-setup-item"><div class="label">Result</div><div class="value" style="color:${t.result === 'win' ? 'var(--success)' : t.result === 'loss' ? 'var(--danger)' : 'var(--warning)'}">${t.result ? t.result.toUpperCase() : 'OPEN'}</div></div>
                <div class="modal-setup-item"><div class="label">Source</div><div class="value">${t.source === 'pattern-hunter' ? '🎯 Pattern Hunter' : '✋ Manual'}</div></div>
                ${t.closedAt ? `<div class="modal-setup-item"><div class="label">Closed At</div><div class="value" style="font-size:0.85rem">${fmtDate(t.closedAt)}</div></div>` : ''}
            </div>`;

            // ---- Indicators ----
            if (t.indicators) {
                bodyHtml += `<div class="modal-section-label orange" style="margin-top:20px">📊 Indicators at Trade Time</div>`;
                bodyHtml += renderIndicators(t.indicators);
            }

            document.getElementById('trade-modal-body').innerHTML = bodyHtml;
            modal.classList.add('active');
            modal.onclick = (e) => { if (e.target === modal) closeTradeModal(); };
        }

        function closeTradeModal() {
            document.getElementById('trade-modal').classList.remove('active');
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closePhModal(); closeTradeModal(); }
        });


        // ---- SECTION TOGGLE ----
        function toggleSection(id) {
            document.getElementById(id).classList.toggle('open');
        }

        // ---- EXPORT ----
        function exportData() {
            const data = loadData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `prosperpath-analytics-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ---- CLEAR ALL DATA ----
        function clearAllData() {
            if (confirm('⚠️ This will permanently delete ALL analytics data. Are you sure?')) {
                localStorage.removeItem(STORAGE_KEY);
                refreshDashboard();
            }
        }

        // ---- INIT ----
        checkAccess();
    </script>

</body>

</html>
