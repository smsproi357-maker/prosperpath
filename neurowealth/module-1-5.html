<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Module 1.5 — The Full Mechanism | ProsperPath Market Mechanics">
    <title>The Full Mechanism | ProsperPath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --m-bg: #0d0e10;
            --m-surf: #141618;
            --m-surf2: #18191c;
            --m-bdr: #1e2023;
            --m-bdrhi: #2e3035;
            --m-txt: #e0e1e3;
            --m-muted: #5e626a;
            --m-muted2: #3a3d44;
            --m-gold: #a07c2e;
            --m-gold-dim: rgba(160, 124, 46, .13);
            --m-gold-line: rgba(160, 124, 46, .38);
            --m-green: rgba(120, 210, 160, .15);
            --m-green-txt: #7ed8a8;
            --m-red: rgba(220, 100, 80, .15);
            --m-red-txt: #e08070;
            --m-blue: rgba(100, 160, 255, .1);
            --m-blue-txt: #7eb3ff;
            --m-rad: 6px;
            --m-tr: 150ms ease
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--m-bg);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            min-height: 100vh
        }

        #ai-chat-fab,
        .ai-fab-btn,
        .floating-action-btn,
        [class*="fab"],
        [id*="fab"] {
            display: none !important
        }

        #module-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .75rem 1.25rem;
            border-bottom: 1px solid var(--m-bdr);
            background: var(--m-surf);
            flex-shrink: 0;
            gap: 1rem
        }

        #topbar-left {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        #back-btn {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-size: .78rem;
            padding: .38rem .85rem;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #back-btn:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        #back-btn:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        #topbar-title {
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            color: var(--m-txt)
        }

        #progress-label {
            font-size: .75rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            white-space: nowrap
        }

        #progress-bar-wrap {
            width: 80px;
            height: 2px;
            background: var(--m-bdr);
            border-radius: 1px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: var(--m-gold);
            border-radius: 1px;
            transition: width .4s ease
        }

        #shell-body {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        #section-nav {
            width: 200px;
            flex-shrink: 0;
            border-right: 1px solid var(--m-bdr);
            background: var(--m-surf);
            overflow-y: auto;
            padding: 1rem 0
        }

        .sn-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem 1rem;
            font-size: .75rem;
            color: var(--m-muted);
            cursor: pointer;
            transition: color var(--m-tr), background var(--m-tr);
            border-left: 2px solid transparent;
            line-height: 1.3
        }

        .sn-item:hover {
            color: var(--m-txt);
            background: rgba(255, 255, 255, .025)
        }

        .sn-item:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: -2px
        }

        .sn-item.visited {
            color: var(--m-txt)
        }

        .sn-item.current {
            color: var(--m-gold);
            border-left-color: var(--m-gold);
            background: var(--m-gold-dim)
        }

        .sn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--m-muted2);
            flex-shrink: 0;
            transition: background var(--m-tr)
        }

        .sn-item.visited .sn-dot {
            background: var(--m-muted)
        }

        .sn-item.current .sn-dot {
            background: var(--m-gold)
        }

        #main-stage {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1.5rem
        }

        .screen {
            width: 100%;
            max-width: 640px;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .scr-eyebrow {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: 1.2rem
        }

        .scr-h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 700;
            color: var(--m-txt);
            letter-spacing: -.02em;
            line-height: 1.15;
            margin-bottom: .75rem
        }

        .scr-h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .9rem
        }

        .scr-meta {
            font-size: .78rem;
            color: var(--m-muted);
            letter-spacing: .04em;
            margin-bottom: 2rem
        }

        .scr-body {
            font-size: .95rem;
            color: var(--m-muted);
            line-height: 1.7;
            margin-bottom: 1.5rem
        }

        .scr-body p {
            margin-bottom: .55rem
        }

        .scr-body p:last-child {
            margin-bottom: 0
        }

        .concept-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--m-muted);
            padding: .55rem 0;
            border-bottom: 1px solid var(--m-bdr);
            opacity: 0;
            transition: opacity .4s ease, color .3s ease
        }

        .concept-line:last-child {
            border-bottom: none
        }

        .concept-line.revealed {
            opacity: 1
        }

        .concept-line.primary {
            color: var(--m-txt)
        }

        .anchor-line {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--m-txt);
            padding: .7rem 1rem;
            border-left: 2px solid var(--m-gold);
            background: var(--m-gold-dim);
            border-radius: 0 4px 4px 0;
            margin: 1.5rem 0;
            line-height: 1.5
        }

        .chain-diagram {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: .3rem;
            margin: 1.5rem 0;
            padding: 1.25rem;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            border-radius: 4px
        }

        .chain-node {
            font-size: .78rem;
            font-weight: 600;
            color: var(--m-txt);
            padding: .35rem .7rem;
            border: 1px solid var(--m-bdr);
            border-radius: 3px;
            background: var(--m-surf)
        }

        .chain-arrow {
            font-size: .75rem;
            color: var(--m-muted)
        }

        /* Scenario chart — reused from 1.4 pattern */
        .sim-chart {
            position: relative;
            margin: 1.25rem 0;
            background: var(--m-surf2);
            border: 1px solid var(--m-bdr);
            border-radius: 4px;
            overflow: hidden;
            height: 160px;
            padding: 1rem .75rem 0
        }

        .sim-candles {
            display: flex;
            align-items: flex-end;
            gap: 5px;
            height: 100%
        }

        .sim-candle {
            border-radius: 2px;
            position: relative;
            flex-shrink: 0;
            transition: height .35s ease, background .35s ease
        }

        .sim-eq-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--m-gold-line);
            top: 52px
        }

        .sim-cluster-band {
            position: absolute;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(160, 124, 46, .07);
            border-top: 1px dashed rgba(160, 124, 46, .22);
            top: 42px;
            transition: opacity .5s ease
        }

        .overlay-tags {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin: .5rem 0 .75rem
        }

        .overlay-tag {
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .05em;
            padding: .2rem .55rem;
            border-radius: 2px;
            background: rgba(160, 124, 46, .1);
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold)
        }

        .checklist-item {
            font-size: .95rem;
            color: var(--m-txt);
            padding: .55rem .75rem;
            border-left: 2px solid var(--m-bdr);
            margin-bottom: .5rem;
            transition: border-color .2s
        }

        .checklist-item:hover {
            border-left-color: var(--m-gold)
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--m-gold-line);
            color: var(--m-gold);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: .65rem 1.5rem;
            border-radius: 3px;
            cursor: pointer;
            transition: background var(--m-tr), border-color var(--m-tr);
            margin-right: .6rem
        }

        .btn-primary:hover {
            background: var(--m-gold-dim);
            border-color: var(--m-gold)
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        .btn-primary:disabled {
            opacity: .42;
            cursor: not-allowed
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .04em;
            padding: .62rem 1.2rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        .btn-ghost:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .btn-ghost:focus-visible {
            outline: 2px solid var(--m-bdrhi);
            outline-offset: 2px
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-top: 1.75rem
        }

        .clarify-btn {
            background: none;
            border: none;
            color: var(--m-gold);
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .04em;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            padding: 0;
            font-family: 'Inter', sans-serif
        }

        .clarify-btn:focus-visible {
            outline: 2px solid var(--m-gold);
            outline-offset: 2px
        }

        .opt-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-txt);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            text-align: left;
            padding: .75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: .5rem;
            transition: border-color var(--m-tr), background var(--m-tr)
        }

        .opt-btn:hover {
            border-color: var(--m-bdrhi);
            background: rgba(255, 255, 255, .025)
        }

        .opt-btn.selected {
            border-color: var(--m-gold-line);
            background: var(--m-gold-dim);
            color: var(--m-gold)
        }

        .opt-btn.correct-ans {
            border-color: rgba(120, 210, 160, .5);
            background: rgba(120, 210, 160, .1);
            color: var(--m-green-txt)
        }

        .opt-btn.wrong-ans {
            border-color: rgba(220, 100, 80, .4);
            background: rgba(220, 100, 80, .1);
            color: var(--m-red-txt)
        }

        .opt-btn:disabled {
            cursor: default
        }

        .assessment-prog {
            font-size: .72rem;
            color: var(--m-muted);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-bottom: 1.5rem
        }

        .assessment-q {
            font-size: 1rem;
            color: var(--m-txt);
            margin-bottom: 1.25rem;
            line-height: 1.55
        }

        .result-box {
            text-align: center;
            padding: 2rem 1rem
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--m-txt);
            margin-bottom: .5rem
        }

        .result-gold {
            color: var(--m-gold)
        }

        .result-body {
            font-size: .9rem;
            color: var(--m-muted);
            line-height: 1.6;
            margin-bottom: 1.75rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto
        }

        /* ClarifyPanel */
        #clarify-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 900;
            display: none;
            align-items: flex-start;
            justify-content: flex-end
        }

        #clarify-overlay.open {
            display: flex
        }

        #clarify-panel {
            width: 340px;
            max-width: 90vw;
            height: 100%;
            background: #16181b;
            border-left: 1px solid var(--m-bdr);
            overflow-y: auto;
            padding: 2rem 1.5rem;
            animation: slideInRight .22s ease
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        .cp-term {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--m-txt);
            margin-bottom: .25rem
        }

        .cp-section {
            margin-top: 1.25rem
        }

        .cp-label {
            font-size: .65rem;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--m-muted);
            margin-bottom: .4rem
        }

        .cp-text {
            font-size: .85rem;
            color: var(--m-muted);
            line-height: 1.55
        }

        .cp-text strong {
            color: var(--m-txt);
            font-weight: 500
        }

        #cp-close {
            margin-top: 2rem;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            font-family: 'Inter', sans-serif;
            font-size: .78rem;
            padding: .5rem 1rem;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color var(--m-tr), color var(--m-tr)
        }

        #cp-close:hover {
            border-color: var(--m-bdrhi);
            color: var(--m-txt)
        }

        .nav-toggle {
            display: none;
            background: transparent;
            border: 1px solid var(--m-bdr);
            color: var(--m-muted);
            padding: .36rem .7rem;
            border-radius: 3px;
            cursor: pointer;
            font-size: .75rem
        }

        @media(max-width:700px) {
            #section-nav {
                position: fixed;
                inset: 0 auto 0 0;
                z-index: 800;
                transform: translateX(-100%);
                transition: transform .3s ease;
                width: 240px
            }

            #section-nav.open {
                transform: translateX(0)
            }

            #nav-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                z-index: 799;
                display: none
            }

            #nav-backdrop.open {
                display: block
            }

            #clarify-panel {
                width: 100%;
                height: 60vh;
                border-left: none;
                border-top: 1px solid var(--m-bdr);
                position: fixed;
                bottom: 0;
                left: 0
            }

            #clarify-overlay {
                align-items: flex-end;
                justify-content: center
            }

            #main-stage {
                padding: 1.5rem 1rem
            }

            .nav-toggle {
                display: inline-flex;
                align-items: center;
                gap: .4rem
            }
        }
    </style>
</head>

<body>
    <div id="module-shell">
        <div id="topbar">
            <div id="topbar-left">
                <button class="nav-toggle" id="nav-toggle-btn" onclick="toggleNavDrawer()"
                    aria-label="Open section navigator">&#9776; Sections</button>
                <button id="back-btn" onclick="goBack()">&#8592; Market Mechanics</button>
                <span id="topbar-title">The Full Mechanism</span>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem">
                <span id="progress-label">Progress 0%</span>
                <div id="progress-bar-wrap">
                    <div id="progress-bar-fill" style="width:0%"></div>
                </div>
            </div>
        </div>
        <div id="nav-backdrop" onclick="toggleNavDrawer()"></div>
        <div id="shell-body">
            <nav id="section-nav" aria-label="Module sections">
                <div id="sn-items"></div>
            </nav>
            <main id="main-stage">
                <div class="screen" id="screen-container"></div>
            </main>
        </div>
    </div>
    <div id="clarify-overlay" onclick="handleClarifyOverlayClick(event)" role="dialog" aria-modal="true"
        aria-label="Clarify">
        <div id="clarify-panel">
            <div class="cp-term" id="cp-term"></div>
            <div class="cp-section">
                <div class="cp-label">Explanation</div>
                <div class="cp-text" id="cp-explanation"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Example</div>
                <div class="cp-text" id="cp-example"></div>
            </div>
            <div class="cp-section">
                <div class="cp-label">Common Misconception</div>
                <div class="cp-text" id="cp-misconception"></div>
            </div>
            <button id="cp-close" onclick="closeClarify()">Close</button>
        </div>
    </div>
    <script src="script.js?v=m15"></script>
    <script src="ai-widget.js"></script>
    <script src="google-auth.js"></script>
    <script>
        window.addEventListener('load', () => { if (typeof initGoogleAuth === 'function') initGoogleAuth(); });

        /* ═══════════════════════════════════════════════════════
           STATE
        ═══════════════════════════════════════════════════════ */
        const STATE = {
            currentSectionId: 0,
            currentScreenIndex: 0,
            visitedSections: new Set(),
            sectionLastScreenIndex: {},
            navHistory: [],
            pillarsRevealed: false,
            assessment: {
                answers: [null, null, null, null, null],
                isSubmitted: false,
                scorePercent: null,
                passed: null,
                currentQ: 0
            },
            showReview: false,
            verified: false
        };

        const SECTIONS = [
            { id: 0, label: 'Entry' },
            { id: 1, label: 'Section I \u2014 The Chain' },
            { id: 2, label: 'Section II \u2014 One Scenario' },
            { id: 3, label: 'Section III \u2014 What It Is Not' },
            { id: 4, label: 'Section IV \u2014 The Checklist' },
            { id: 5, label: 'Section V \u2014 Final Assessment' }
        ];

        /* ═══════════════════════════════════════════════════════
           PROGRESS
        ═══════════════════════════════════════════════════════ */
        function computeProgress() {
            const v = STATE.visitedSections.size;
            const base = Math.min(v, 5);
            let pct = Math.round((base / 5) * 85);
            if (STATE.assessment.passed) pct = 100;
            else if (STATE.assessment.scorePercent !== null && STATE.assessment.scorePercent > 0) pct = Math.max(pct, 90);
            return pct;
        }
        function updateProgress() {
            const pct = computeProgress();
            document.getElementById('progress-label').textContent = 'Progress ' + pct + '%';
            document.getElementById('progress-bar-fill').style.width = pct + '%';
        }
        function visit(sid) {
            if (!STATE.visitedSections.has(sid)) { STATE.visitedSections.add(sid); updateProgress(); }
            renderNav();
        }

        /* ═══════════════════════════════════════════════════════
           NAVIGATION
        ═══════════════════════════════════════════════════════ */
        function goToSection(sid, screenIndex, pushHistory) {
            const maxVisited = STATE.visitedSections.size > 0 ? Math.max(...[...STATE.visitedSections]) : 0;
            const allowed = STATE.visitedSections.has(sid) || sid <= maxVisited + 1 || sid === 0;
            if (!allowed) return;
            if (pushHistory !== false) STATE.navHistory.push({ sectionId: STATE.currentSectionId, screenIndex: STATE.currentScreenIndex });
            STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
            STATE.currentSectionId = sid;
            STATE.currentScreenIndex = (screenIndex !== undefined && screenIndex !== null) ? screenIndex : 0;
            STATE.showReview = false;
            visit(sid); renderNav(); renderScreen();
            const nav = document.getElementById('section-nav');
            if (nav.classList.contains('open')) toggleNavDrawer();
        }
        function goBack() {
            if (STATE.showReview) { STATE.showReview = false; renderScreen(); return; }
            if (STATE.navHistory.length > 0) {
                const prev = STATE.navHistory.pop();
                STATE.sectionLastScreenIndex[STATE.currentSectionId] = STATE.currentScreenIndex;
                STATE.currentSectionId = prev.sectionId;
                STATE.currentScreenIndex = prev.screenIndex;
                STATE.showReview = false;
                visit(prev.sectionId); renderNav(); renderScreen(); return;
            }
            window.location.href = 'market-mechanics.html';
        }
        function toggleNavDrawer() {
            document.getElementById('section-nav').classList.toggle('open');
            document.getElementById('nav-backdrop').classList.toggle('open');
        }

        /* ═══════════════════════════════════════════════════════
           NAV RENDER
        ═══════════════════════════════════════════════════════ */
        function renderNav() {
            const c = document.getElementById('sn-items'); c.innerHTML = '';
            SECTIONS.forEach(s => {
                if (s.id === 0) return;
                const isCurrent = STATE.currentSectionId === s.id;
                const isVisited = STATE.visitedSections.has(s.id);
                const maxVisited = STATE.visitedSections.size > 0 ? Math.max(...[...STATE.visitedSections]) : 0;
                const isAccessible = isVisited || s.id <= maxVisited + 1;
                const div = document.createElement('div');
                div.className = 'sn-item' + (isCurrent ? ' current' : '') + (isVisited ? ' visited' : '');
                div.setAttribute('tabindex', isAccessible ? '0' : '-1');
                div.setAttribute('role', 'button');
                div.setAttribute('aria-label', s.label + (isCurrent ? ', current' : isVisited ? ', visited' : ', not visited'));
                div.innerHTML = `<span class="sn-dot"></span><span>${s.label}</span>`;
                if (isAccessible) {
                    div.onclick = () => { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); };
                    div.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') { const lsi = STATE.sectionLastScreenIndex[s.id]; goToSection(s.id, lsi !== undefined ? lsi : 0); } };
                } else { div.style.opacity = '.35'; div.style.cursor = 'not-allowed'; }
                c.appendChild(div);
            });
        }

        /* ═══════════════════════════════════════════════════════
           CLARIFY DATA
        ═══════════════════════════════════════════════════════ */
        const CLARIFY_DATA = {
            aggression: {
                term: 'Aggression',
                explanation: 'Aggressive order flow is buying or selling that actively crosses the spread, taking liquidity rather than providing it. It drives price movement.',
                example: 'When price breaks above a level and keeps expanding without pullback, that is sustained aggression — buyers are continuously lifting offers.',
                misconception: '<strong>"Aggression means large candles."</strong> Aggression is about intent and order flow, not candle size. Small candles in the direction of the move can still reflect sustained aggressive pressure.'
            },
            liquidity: {
                term: 'Liquidity',
                explanation: 'Liquidity is resting orders available at specific prices — limit orders, stop orders, and other pending orders that exist before a trade occurs.',
                example: 'Equal highs attract stop orders from short sellers and limit orders from buyers. Those resting orders are liquidity.',
                misconception: '<strong>"Liquidity means there are buyers."</strong> Liquidity refers to resting orders on both sides. Consuming liquidity only means those orders were filled — not that direction has been determined.'
            },
            context: {
                term: 'Context',
                explanation: 'Context is the surrounding structure and conditions — trend, prior range, order flow pattern — that determines how price is likely to respond after a liquidity event.',
                example: 'A breakout in a strong uptrend with expanding volume is a different context than the same breakout in a contracting range near prior highs.',
                misconception: '<strong>"Context means indicators."</strong> Context is structural and conditional — derived from price action, market structure, and order flow state — not from oscillators or signals.'
            },
            execution: {
                term: 'Execution',
                explanation: 'Execution is the fill of a resting order when price reaches it. Orders are executed against, not because of, directional intent.',
                example: 'Stops above a high are executed when price trades through that level. The fill is guaranteed. The direction that follows is not.',
                misconception: '<strong>"Execution confirms direction."</strong> Execution only means the order was filled. It carries no information about where price moves next.'
            },
            imbalance: {
                term: 'Imbalance',
                explanation: 'Imbalance is the condition where aggressive order flow on one side significantly outweighs the other, causing price to move directionally rather than oscillate.',
                example: 'After a breakout, if price continues to make higher lows and does not revisit the breakout candle, that sustained imbalance shows buyers remain in control.',
                misconception: '<strong>"Imbalance means gaps."</strong> While gaps visually show imbalance, sustained imbalance is about the ongoing preponderance of aggressive flow in one direction, not just a single candle gap.'
            },
            conditionalsystems: {
                term: 'Conditional Systems',
                explanation: 'Markets are conditional systems: outcomes depend on the conditions present at the time of a setup, not on the pattern itself. The same setup can produce different outcomes depending on context.',
                example: 'Equal highs broken in a trending market may continue upward. The same equal highs broken in an exhausted, range-bound structure may reverse. Same event, different conditions.',
                misconception: '<strong>"Patterns have fixed outcomes."</strong> In a conditional system, no pattern guarantees an outcome. The outcome is always filtered through conditions — trend, liquidity, imbalance, and context.'
            }
        };

        function openClarify(topicId) {
            const d = CLARIFY_DATA[topicId]; if (!d) return;
            document.getElementById('cp-term').textContent = d.term;
            document.getElementById('cp-explanation').textContent = d.explanation;
            document.getElementById('cp-example').textContent = d.example;
            document.getElementById('cp-misconception').innerHTML = d.misconception;
            document.getElementById('clarify-overlay').classList.add('open');
            document.getElementById('cp-close').focus();
        }
        function closeClarify() { document.getElementById('clarify-overlay').classList.remove('open'); }
        function handleClarifyOverlayClick(e) { if (e.target === document.getElementById('clarify-overlay')) closeClarify(); }
        function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }

        /* ═══════════════════════════════════════════════════════
           SCREEN RENDERERS
        ═══════════════════════════════════════════════════════ */
        function renderScreen() {
            const c = document.getElementById('screen-container');
            c.innerHTML = '';
            const s = STATE.currentSectionId;
            let html = '';
            if (s === 0) html = buildEntry();
            else if (s === 1) html = buildS1(STATE.currentScreenIndex);
            else if (s === 2) html = buildS2(STATE.currentScreenIndex);
            else if (s === 3) html = buildS3();

            c.innerHTML = html;
            c.scrollTop = 0;
            document.getElementById('main-stage').scrollTop = 0;
            attachHandlers();
            // Trigger pillar reveal if on S1 screen 0
            if (s === 1 && STATE.currentScreenIndex === 0) {

        /* ── Section V — Assessment ── */

        function buildS5() {

            return `

        /* ── Review Answers ── */
        const A_REVIEW_DATA = [

        function buildReviewAnswers() {

        /* ── Score ── */
        function computeScore() {
            let correct = 0;
            A_QUESTIONS.forEach((q, i) => { if (STATE.assessment.answers[i] === q.correct) correct++; });
            const pct = Math.round((correct / A_QUESTIONS.length) * 100);
            STATE.assessment.scorePercent = pct;
            STATE.assessment.passed = pct >= 70;
            STATE.assessment.isSubmitted = true;
            if (STATE.assessment.passed) {
                STATE.verified = true;
                try {
                    const saved = JSON.parse(localStorage.getItem('pp_mm_modules') || '{}');
                    saved['1.5'] = { verified: true, mastery: pct, mastery_percent: pct, status: 'Verified', progress: 100 };
                    localStorage.setItem('pp_mm_modules', JSON.stringify(saved));
                } catch (e) { }
            }
            updateProgress();
        }

        /* ── Pillar Reveal ── */
        function revealPillars() {
            const ids = ['p1', 'p2', 'p3', 'p4'];
            ids.forEach((id, i) => {
                setTimeout(() => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('revealed');
                    if (i === ids.length - 1) {
                        setTimeout(() => {
                            const anchor = document.getElementById('anchor-line');
                            const btnRow = document.getElementById('s1-btn-row');
                            if (anchor) anchor.style.opacity = '1';
                            if (btnRow) btnRow.style.display = 'flex';
                        }, 350);
                    }
                }, 300 + i * 450);
            });
        }

        /* ═══════════════════════════════════════════════════════
           EVENT HANDLERS
        ═══════════════════════════════════════════════════════ */
        function attachHandlers() {
            const $ = id => document.getElementById(id);
            const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

            // Entry
            on('begin-btn', 'click', () => goToSection(1, 0));

            // S1
            on('s1-next', 'click', () => {
                STATE.currentScreenIndex = 1;
                STATE.sectionLastScreenIndex[1] = 1;
                renderScreen();
            });
            on('s1-to-s2', 'click', () => goToSection(2, 0));

            // S2 screens
            on('s2-p1', 'click', () => { STATE.currentScreenIndex = 1; STATE.sectionLastScreenIndex[2] = 1; renderScreen(); });
            on('s2-p2', 'click', () => { STATE.currentScreenIndex = 2; STATE.sectionLastScreenIndex[2] = 2; renderScreen(); });
            on('s2-p3', 'click', () => { STATE.currentScreenIndex = 3; STATE.sectionLastScreenIndex[2] = 3; renderScreen(); });
            on('s2-to-s3', 'click', () => goToSection(3, 0));

            // S3
            on('s3-to-s4', 'click', () => goToSection(4, 0));

            // S4
            on('s4-to-s5', 'click', () => goToSection(5, 0));

            // S5 — assessment
            document.querySelectorAll('[data-ans]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (STATE.assessment.isSubmitted) return;
                    const qi = STATE.assessment.currentQ;
                    if (STATE.assessment.answers[qi] === btn.dataset.ans) { STATE.assessment.answers[qi] = null; }
                    else { STATE.assessment.answers[qi] = btn.dataset.ans; }
                    renderScreen();
                });
            });
            on('assess-back', 'click', () => { if (STATE.assessment.currentQ > 0) { STATE.assessment.currentQ--; renderScreen(); } });
            on('assess-next', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                STATE.assessment.currentQ++; renderScreen();
            });
            on('assess-submit', 'click', () => {
                const qi = STATE.assessment.currentQ;
                if (STATE.assessment.answers[qi] === null || STATE.assessment.answers[qi] === undefined) return;
                computeScore(); renderScreen();
            });
            on('result-return', 'click', () => { window.location.href = 'market-mechanics.html'; });
            on('result-retry', 'click', () => {
                STATE.assessment.answers = [null, null, null, null, null];
                STATE.assessment.isSubmitted = false;
                STATE.assessment.scorePercent = null;
                STATE.assessment.passed = null;
                STATE.assessment.currentQ = 0;
                STATE.showReview = false;
                renderScreen();
            });
            on('result-review-answers', 'click', () => { if (STATE.assessment.isSubmitted) { STATE.showReview = true; renderScreen(); } });
            on('review-back-results', 'click', () => { STATE.showReview = false; renderScreen(); });

            // Clarify
            document.querySelectorAll('.clarify-btn').forEach(btn => {
                btn.addEventListener('click', () => openClarify(btn.dataset.topic));
            });
        }

        /* ═══════════════════════════════════════════════════════
           INIT
        ═══════════════════════════════════════════════════════ */
        (function init() {
            STATE.navHistory = [];
            STATE.currentSectionId = 0;
            STATE.currentScreenIndex = 0;
            visit(0); renderNav(); renderScreen();
        })();
    </script>
</body>

</html>
